<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Whack-a-Mole - Caleb's Arcade</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 0.5vh 1vw;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 0.3vh;
      flex-shrink: 0;
    }

    h1 {
      font-size: clamp(1.2rem, 3vw, 2rem);
      font-weight: 800;
      color: #fff;
      text-shadow: 0 0 20px rgba(255, 200, 50, 0.5);
    }

    .hud {
      display: flex;
      gap: 0.8vw;
      width: 100%;
      margin-bottom: 0.3vh;
      flex-shrink: 0;
    }

    .hud-box {
      background: rgba(255,255,255,0.12);
      border-radius: 0.5rem;
      padding: 0.2rem 0.6rem;
      text-align: center;
      flex: 1;
    }

    .hud-label {
      font-size: clamp(0.5rem, 1vw, 0.7rem);
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .hud-value {
      font-size: clamp(1rem, 2.5vw, 1.6rem);
      font-weight: 700;
      color: #fff;
    }

    #gameCanvas {
      border-radius: 1rem;
      flex: 1;
      min-height: 0;
      cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><circle cx="16" cy="16" r="14" fill="%23654321" stroke="%23432100" stroke-width="2"/><rect x="14" y="2" width="4" height="12" rx="2" fill="%23876543"/></svg>') 16 16, pointer;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .overlay.hidden { display: none; }

    .overlay-box {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 1.5rem;
      padding: 2rem;
      text-align: center;
      color: #fff;
      max-width: 400px;
      width: 90%;
    }

    .overlay-box h2 {
      font-size: 1.8rem;
      margin-bottom: 1rem;
      text-shadow: 0 0 15px rgba(255, 200, 50, 0.5);
    }

    .overlay-box p {
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 0.5rem;
      color: rgba(255,255,255,0.85);
    }

    .overlay-box .final-score {
      font-size: 2.5rem;
      font-weight: 800;
      color: #ffd700;
      margin: 0.5rem 0;
    }

    .play-btn {
      background: linear-gradient(135deg, #e94560, #c23152);
      color: #fff;
      border: none;
      border-radius: 1rem;
      padding: 0.85rem 2.5rem;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 1rem;
      box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
    }

    .play-btn:active { transform: scale(0.95); }
    #backBtn {
    position: fixed;
    top: 10px;
    left: 10px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    text-decoration: none;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 14px;
    z-index: 9999;
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.2);
    transition: background 0.2s;
  }
  #backBtn:hover, #backBtn:active {
    background: rgba(255,255,255,0.3);
  }
    </style>
</head>
<body>
  <div class="top-bar">
    <a id="backBtn" href="../../index.html">&larr; Games</a>
    <h1>Whack-a-Mole</h1>
  </div>

  <div class="hud">
    <div class="hud-box">
      <div class="hud-label">Score</div>
      <div class="hud-value" id="scoreDisplay">0</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">Level</div>
      <div class="hud-value" id="levelDisplay">1</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">Time</div>
      <div class="hud-value" id="timeDisplay">60</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">Best</div>
      <div class="hud-value" id="bestDisplay">0</div>
    </div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div class="overlay" id="startOverlay">
    <div class="overlay-box">
      <h2>Whack-a-Mole</h2>
      <p>Tap the moles to whack them!</p>
      <p>Brown moles = <strong>+10 pts</strong></p>
      <p style="color: #ffd700;">Golden moles = <strong>+25 pts</strong></p>
      <p style="color: #ff4444;">Red bombs = <strong>-15 pts</strong> (avoid!)</p>
      <p>Levels get harder as you score more!</p>
      <button class="play-btn" id="startBtn">Play!</button>
    </div>
  </div>

  <div class="overlay hidden" id="endOverlay">
    <div class="overlay-box">
      <h2>Time's Up!</h2>
      <div class="final-score" id="finalScore">0</div>
      <p id="endMessage"></p>
      <p id="endLevel"></p>
      <button class="play-btn" id="restartBtn">Play Again</button>
    </div>
  </div>

  <script>
    // ===== Web Audio API Sound System =====
    let audioCtx = null;
    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }
    document.addEventListener('pointerdown', ensureAudio, { once: true });

    function playTone(freq, duration, type = 'sine', volume = 0.1, startTime = 0) {
      const ctx = ensureAudio();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(volume, ctx.currentTime + startTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startTime + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime + startTime);
      osc.stop(ctx.currentTime + startTime + duration);
    }

    function playSweep(startFreq, endFreq, duration, type = 'sine', volume = 0.1) {
      const ctx = ensureAudio();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(startFreq, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(endFreq, ctx.currentTime + duration);
      gain.gain.setValueAtTime(volume, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + duration);
    }

    function playNoise(duration, volume = 0.08, filterFreq = 800) {
      const ctx = ensureAudio();
      const bufferSize = ctx.sampleRate * duration;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
      const src = ctx.createBufferSource();
      src.buffer = buffer;
      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = filterFreq;
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(volume, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      src.connect(filter);
      filter.connect(gain);
      gain.connect(ctx.destination);
      src.start();
      src.stop(ctx.currentTime + duration);
    }

    // Sound: Mole appears - soft pop
    function soundMoleAppear() {
      playSweep(200, 600, 0.12, 'sine', 0.08);
    }

    // Sound: Whack hit (regular mole) - satisfying bonk/thwack
    function soundWhackHit() {
      playNoise(0.12, 0.12, 600);
      playSweep(300, 100, 0.15, 'triangle', 0.1);
    }

    // Sound: Whack hit (golden mole) - sparkly chime + bonk
    function soundWhackGolden() {
      playNoise(0.1, 0.08, 500);
      playSweep(400, 150, 0.12, 'triangle', 0.08);
      playTone(880, 0.15, 'sine', 0.1, 0.0);
      playTone(1100, 0.15, 'sine', 0.09, 0.06);
      playTone(1320, 0.2, 'sine', 0.08, 0.12);
      playTone(1760, 0.25, 'sine', 0.07, 0.18);
    }

    // Sound: Whack hit (bomb) - explosion boom
    function soundWhackBomb() {
      playNoise(0.4, 0.15, 300);
      playSweep(150, 30, 0.5, 'sawtooth', 0.1);
      playSweep(100, 20, 0.6, 'square', 0.06);
    }

    // Sound: Miss (tap empty hole) - dull thud
    function soundMiss() {
      playNoise(0.08, 0.08, 200);
      playSweep(120, 60, 0.1, 'sine', 0.06);
    }

    // Sound: Timer warning tick
    function soundTick() {
      playTone(800, 0.05, 'square', 0.08);
    }

    // Sound: Game over - descending tones
    function soundGameOver() {
      playTone(440, 0.3, 'triangle', 0.1, 0.0);
      playTone(370, 0.3, 'triangle', 0.1, 0.25);
      playTone(311, 0.3, 'triangle', 0.1, 0.5);
      playTone(262, 0.5, 'triangle', 0.12, 0.75);
    }

    // Sound: New high score - celebratory ascending notes
    function soundNewHighScore() {
      playTone(523, 0.15, 'square', 0.08, 0.0);
      playTone(659, 0.15, 'square', 0.08, 0.12);
      playTone(784, 0.15, 'square', 0.08, 0.24);
      playTone(1047, 0.25, 'sine', 0.1, 0.36);
      playTone(1319, 0.15, 'sine', 0.08, 0.5);
      playTone(1568, 0.15, 'sine', 0.08, 0.6);
      playTone(2093, 0.4, 'sine', 0.1, 0.72);
    }

    // ===== End Sound System =====

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const timeDisplay = document.getElementById('timeDisplay');
    const levelDisplay = document.getElementById('levelDisplay');
    const bestDisplay = document.getElementById('bestDisplay');
    const startOverlay = document.getElementById('startOverlay');
    const endOverlay = document.getElementById('endOverlay');
    const finalScoreEl = document.getElementById('finalScore');
    const endMessage = document.getElementById('endMessage');
    const endLevel = document.getElementById('endLevel');

    const COLS = 4;
    const ROWS = 3;
    const ROUND_TIME = 60;

    // --- Shared localStorage under calebArcadeData ---
    function loadArcadeData() {
      try {
        return JSON.parse(localStorage.getItem('calebArcadeData')) || {};
      } catch (e) {
        return {};
      }
    }

    function saveHighScore(score) {
      const data = loadArcadeData();
      if (!data.whackamole) data.whackamole = {};
      data.whackamole.highScore = score;
      localStorage.setItem('calebArcadeData', JSON.stringify(data));
    }

    function getHighScore() {
      const data = loadArcadeData();
      return (data.whackamole && data.whackamole.highScore) || 0;
    }

    // --- Level definitions ---
    // Each level specifies: scoreThreshold, moleShowTime, spawnDelay, maxMoles, bombChance
    const LEVELS = [
      { level: 1,  scoreThreshold: 0,   moleShowTime: 2400, spawnDelay: 1400, maxMoles: 1, bombChance: 0.08 },
      { level: 2,  scoreThreshold: 30,  moleShowTime: 2100, spawnDelay: 1200, maxMoles: 2, bombChance: 0.10 },
      { level: 3,  scoreThreshold: 80,  moleShowTime: 1800, spawnDelay: 1050, maxMoles: 2, bombChance: 0.13 },
      { level: 4,  scoreThreshold: 150, moleShowTime: 1500, spawnDelay: 900,  maxMoles: 3, bombChance: 0.15 },
      { level: 5,  scoreThreshold: 250, moleShowTime: 1300, spawnDelay: 780,  maxMoles: 3, bombChance: 0.18 },
      { level: 6,  scoreThreshold: 380, moleShowTime: 1100, spawnDelay: 650,  maxMoles: 4, bombChance: 0.20 },
      { level: 7,  scoreThreshold: 520, moleShowTime: 950,  spawnDelay: 550,  maxMoles: 4, bombChance: 0.22 },
      { level: 8,  scoreThreshold: 700, moleShowTime: 800,  spawnDelay: 450,  maxMoles: 5, bombChance: 0.25 },
      { level: 9,  scoreThreshold: 900, moleShowTime: 680,  spawnDelay: 380,  maxMoles: 5, bombChance: 0.27 },
      { level: 10, scoreThreshold: 1200, moleShowTime: 580, spawnDelay: 320,  maxMoles: 6, bombChance: 0.30 },
    ];

    function getCurrentLevel(score) {
      let current = LEVELS[0];
      for (const lvl of LEVELS) {
        if (score >= lvl.scoreThreshold) current = lvl;
        else break;
      }
      return current;
    }

    let holes = [];
    let score = 0;
    let currentLevel = 1;
    let timeLeft = ROUND_TIME;
    let bestScore = getHighScore();
    let gameRunning = false;
    let gameTimer = null;
    let spawnTimer = null;
    let animFrame = null;
    let effects = [];
    let levelUpEffect = 0;

    bestDisplay.textContent = bestScore;

    function resize() {
      const padX = 16;
      const topBarH = document.querySelector('.top-bar').offsetHeight;
      const hudH = document.querySelector('.hud').offsetHeight;
      const usedH = topBarH + hudH + 12; // small gap
      const availW = window.innerWidth - padX * 2;
      const availH = window.innerHeight - usedH - 8;

      const aspect = COLS / ROWS;
      let w = availW;
      let h = w / aspect;
      if (h > availH) { h = availH; w = h * aspect; }

      canvas.width = w * devicePixelRatio;
      canvas.height = h * devicePixelRatio;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
      initHoles(w, h);
    }

    function initHoles(w, h) {
      holes = [];
      const cellW = w / COLS;
      const cellH = h / ROWS;
      const holeR = Math.min(cellW, cellH) * 0.34;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          holes.push({
            x: cellW * (c + 0.5),
            y: cellH * (r + 0.5) + holeR * 0.3,
            r: holeR,
            mole: null,
            timer: 0
          });
        }
      }
    }

    const MOLE_TYPES = {
      regular: { color: '#8B4513', eyeColor: '#fff', noseColor: '#654321', points: 10 },
      golden:  { color: '#FFD700', eyeColor: '#fff', noseColor: '#DAA520', points: 25 },
      bomb:    { color: '#333',    eyeColor: '#ff0',  noseColor: '#ff0000', points: -15 }
    };

    function spawnMole() {
      if (!gameRunning) return;
      const lvl = getCurrentLevel(score);
      const activeMoles = holes.filter(h => h.mole).length;
      if (activeMoles >= lvl.maxMoles) return;
      const empty = holes.filter(h => !h.mole);
      if (empty.length === 0) return;
      const hole = empty[Math.floor(Math.random() * empty.length)];

      const rand = Math.random();
      let type;
      const goldenChance = 0.12;
      if (rand < goldenChance) type = 'golden';
      else if (rand < goldenChance + lvl.bombChance) type = 'bomb';
      else type = 'regular';

      const showTime = lvl.moleShowTime + Math.random() * 400 - 200;
      hole.mole = { type, phase: 'rising', progress: 0, showTime, elapsed: 0 };
      soundMoleAppear();
    }

    function scheduleSpawn() {
      if (!gameRunning) return;
      const lvl = getCurrentLevel(score);
      const delay = lvl.spawnDelay + Math.random() * 300;
      spawnTimer = setTimeout(() => {
        spawnMole();
        scheduleSpawn();
      }, delay);
    }

    function addEffect(x, y, type) {
      if (type === 'hit') {
        for (let i = 0; i < 6; i++) {
          const angle = (Math.PI * 2 / 6) * i + Math.random() * 0.5;
          const speed = 2 + Math.random() * 3;
          effects.push({
            type: 'star', x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 2,
            life: 1, decay: 0.02 + Math.random() * 0.02,
            size: 4 + Math.random() * 4,
            color: '#ffd700'
          });
        }
        effects.push({ type: 'text', x, y: y - 20, text: '+10', life: 1, decay: 0.025, color: '#fff' });
      } else if (type === 'golden') {
        for (let i = 0; i < 10; i++) {
          const angle = (Math.PI * 2 / 10) * i;
          const speed = 3 + Math.random() * 3;
          effects.push({
            type: 'star', x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 2,
            life: 1, decay: 0.015,
            size: 5 + Math.random() * 5,
            color: '#ffd700'
          });
        }
        effects.push({ type: 'text', x, y: y - 20, text: '+25', life: 1, decay: 0.02, color: '#ffd700' });
      } else if (type === 'bomb') {
        effects.push({ type: 'ring', x, y, life: 1, decay: 0.03, size: 10, color: '#ff4444' });
        effects.push({ type: 'text', x, y: y - 20, text: '-15', life: 1, decay: 0.025, color: '#ff4444' });
      } else if (type === 'levelup') {
        effects.push({ type: 'text', x, y, text: 'LEVEL UP!', life: 1, decay: 0.012, color: '#00ff88', big: true });
      }
    }

    function handleTap(px, py) {
      if (!gameRunning) return;
      const rect = canvas.getBoundingClientRect();
      const x = px - rect.left;
      const y = py - rect.top;

      for (const hole of holes) {
        if (!hole.mole || hole.mole.phase === 'sinking') continue;
        const riseH = hole.r * 1.4;
        const moleY = hole.y - riseH * hole.mole.progress;
        const bodyR = hole.r * 0.7;
        const distToMole = Math.hypot(x - hole.x, y - moleY);
        const distToHole = Math.hypot(x - hole.x, y - hole.y);
        if (distToMole < bodyR * 1.5 || distToHole < hole.r * 1.5) {
          const mole = hole.mole;
          const typeInfo = MOLE_TYPES[mole.type];
          const oldLevel = getCurrentLevel(score).level;
          score = Math.max(0, score + typeInfo.points);
          scoreDisplay.textContent = score;

          const newLvl = getCurrentLevel(score);
          if (newLvl.level > oldLevel) {
            currentLevel = newLvl.level;
            levelDisplay.textContent = currentLevel;
            levelUpEffect = 60;
            const w = canvas.width / devicePixelRatio;
            const h = canvas.height / devicePixelRatio;
            addEffect(w / 2, h / 2, 'levelup');
          } else {
            currentLevel = newLvl.level;
            levelDisplay.textContent = currentLevel;
          }

          addEffect(hole.x, hole.y, mole.type === 'golden' ? 'golden' : mole.type === 'bomb' ? 'bomb' : 'hit');
          if (mole.type === 'golden') soundWhackGolden();
          else if (mole.type === 'bomb') soundWhackBomb();
          else soundWhackHit();
          mole.phase = 'sinking';
          mole.progress = 1;
          return;
        }
      }
      // No mole was hit — check if tap was near any hole for miss sound
      for (const hole of holes) {
        const distToHole = Math.hypot(x - hole.x, y - hole.y);
        if (distToHole < hole.r * 1.5) {
          soundMiss();
          break;
        }
      }
    }

    canvas.addEventListener('pointerdown', e => {
      e.preventDefault();
      handleTap(e.clientX, e.clientY);
    });

    function drawHole(hole) {
      const { x, y, r } = hole;

      // Shadow under hole
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.beginPath();
      ctx.ellipse(x, y + r * 0.15, r * 1.1, r * 0.45, 0, 0, Math.PI * 2);
      ctx.fill();

      // Hole
      ctx.fillStyle = '#1a0a00';
      ctx.beginPath();
      ctx.ellipse(x, y, r, r * 0.4, 0, 0, Math.PI * 2);
      ctx.fill();

      // Hole rim
      ctx.strokeStyle = '#3a2a10';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.ellipse(x, y, r, r * 0.4, 0, 0, Math.PI * 2);
      ctx.stroke();

      // Grass tufts on rim
      ctx.fillStyle = '#2a6e2a';
      for (let i = 0; i < 5; i++) {
        const angle = Math.PI + (Math.PI / 6) * (i - 2);
        const gx = x + Math.cos(angle) * r * 0.9;
        const gy = y + Math.sin(angle) * r * 0.35;
        ctx.beginPath();
        ctx.moveTo(gx - 4, gy);
        ctx.quadraticCurveTo(gx, gy - 10 - Math.sin(Date.now() / 500 + i) * 2, gx + 4, gy);
        ctx.fill();
      }

      if (hole.mole) {
        const mole = hole.mole;
        const typeInfo = MOLE_TYPES[mole.type];
        const riseH = r * 1.4;
        let moleY;

        if (mole.phase === 'rising') {
          moleY = y - riseH * mole.progress;
        } else if (mole.phase === 'showing') {
          moleY = y - riseH;
        } else {
          moleY = y - riseH * mole.progress;
        }

        // Clip to hole region
        ctx.save();
        ctx.beginPath();
        ctx.rect(x - r * 1.2, 0, r * 2.4, y + r * 0.2);
        ctx.clip();

        // Mole body
        const bodyR = r * 0.7;
        ctx.fillStyle = typeInfo.color;
        ctx.beginPath();
        ctx.arc(x, moleY, bodyR, 0, Math.PI * 2);
        ctx.fill();

        // Mole body shading
        const grad = ctx.createRadialGradient(x - bodyR * 0.3, moleY - bodyR * 0.3, 0, x, moleY, bodyR);
        grad.addColorStop(0, 'rgba(255,255,255,0.2)');
        grad.addColorStop(1, 'rgba(0,0,0,0.3)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(x, moleY, bodyR, 0, Math.PI * 2);
        ctx.fill();

        // Eyes
        const eyeOff = bodyR * 0.28;
        const eyeR = bodyR * 0.18;
        ctx.fillStyle = typeInfo.eyeColor;
        ctx.beginPath();
        ctx.arc(x - eyeOff, moleY - bodyR * 0.15, eyeR, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x + eyeOff, moleY - bodyR * 0.15, eyeR, 0, Math.PI * 2);
        ctx.fill();

        // Pupils
        const pupR = eyeR * 0.5;
        ctx.fillStyle = mole.type === 'bomb' ? '#f00' : '#222';
        ctx.beginPath();
        ctx.arc(x - eyeOff, moleY - bodyR * 0.12, pupR, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x + eyeOff, moleY - bodyR * 0.12, pupR, 0, Math.PI * 2);
        ctx.fill();

        // Nose
        ctx.fillStyle = typeInfo.noseColor;
        ctx.beginPath();
        ctx.arc(x, moleY + bodyR * 0.1, bodyR * 0.12, 0, Math.PI * 2);
        ctx.fill();

        // Mouth
        ctx.strokeStyle = 'rgba(0,0,0,0.5)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(x, moleY + bodyR * 0.15, bodyR * 0.2, 0.1 * Math.PI, 0.9 * Math.PI);
        ctx.stroke();

        // Cheeks
        if (mole.type !== 'bomb') {
          ctx.fillStyle = 'rgba(255,150,150,0.3)';
          ctx.beginPath();
          ctx.ellipse(x - bodyR * 0.5, moleY + bodyR * 0.05, bodyR * 0.15, bodyR * 0.1, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(x + bodyR * 0.5, moleY + bodyR * 0.05, bodyR * 0.15, bodyR * 0.1, 0, 0, Math.PI * 2);
          ctx.fill();
        }

        // Bomb fuse
        if (mole.type === 'bomb') {
          ctx.strokeStyle = '#888';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(x, moleY - bodyR);
          ctx.quadraticCurveTo(x + bodyR * 0.5, moleY - bodyR * 1.3, x + bodyR * 0.3, moleY - bodyR * 1.5);
          ctx.stroke();
          const sparkT = Date.now() / 100;
          ctx.fillStyle = `hsl(${(sparkT * 30) % 60}, 100%, 60%)`;
          ctx.beginPath();
          ctx.arc(x + bodyR * 0.3, moleY - bodyR * 1.5, 3 + Math.sin(sparkT) * 2, 0, Math.PI * 2);
          ctx.fill();
        }

        // Golden sparkle
        if (mole.type === 'golden') {
          const t = Date.now() / 200;
          for (let i = 0; i < 3; i++) {
            const angle = t + (Math.PI * 2 / 3) * i;
            const sx = x + Math.cos(angle) * bodyR * 0.8;
            const sy = moleY + Math.sin(angle) * bodyR * 0.6;
            const sparkSize = 2 + Math.sin(t * 2 + i) * 1.5;
            ctx.fillStyle = 'rgba(255,255,200,0.8)';
            drawStar(sx, sy, sparkSize);
          }
        }

        ctx.restore();

        // Redraw hole rim on top to cover mole base
        ctx.fillStyle = '#1a0a00';
        ctx.beginPath();
        ctx.ellipse(x, y, r, r * 0.4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#3a2a10';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.ellipse(x, y, r, r * 0.4, 0, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function drawStar(x, y, size) {
      const spikes = 4;
      const outerR = size;
      const innerR = size * 0.4;
      ctx.beginPath();
      for (let i = 0; i < spikes * 2; i++) {
        const angle = (Math.PI / spikes) * i - Math.PI / 2;
        const r = i % 2 === 0 ? outerR : innerR;
        const sx = x + Math.cos(angle) * r;
        const sy = y + Math.sin(angle) * r;
        if (i === 0) ctx.moveTo(sx, sy);
        else ctx.lineTo(sx, sy);
      }
      ctx.closePath();
      ctx.fill();
    }

    function drawEffects() {
      for (let i = effects.length - 1; i >= 0; i--) {
        const e = effects[i];
        e.life -= e.decay;
        if (e.life <= 0) { effects.splice(i, 1); continue; }

        ctx.globalAlpha = e.life;

        if (e.type === 'star') {
          e.x += e.vx;
          e.y += e.vy;
          e.vy += 0.1;
          ctx.fillStyle = e.color;
          drawStar(e.x, e.y, e.size * e.life);
        } else if (e.type === 'text') {
          e.y -= 1;
          ctx.fillStyle = e.color;
          const fontSize = e.big ? 36 + (1 - e.life) * 12 : 18 + (1 - e.life) * 8;
          ctx.font = `bold ${fontSize}px system-ui`;
          ctx.textAlign = 'center';
          ctx.fillText(e.text, e.x, e.y);
        } else if (e.type === 'ring') {
          e.size += 3;
          ctx.strokeStyle = e.color;
          ctx.lineWidth = 3 * e.life;
          ctx.beginPath();
          ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
          ctx.stroke();
        }

        ctx.globalAlpha = 1;
      }
    }

    function drawBackground() {
      const w = canvas.width / devicePixelRatio;
      const h = canvas.height / devicePixelRatio;

      // Ground gradient
      const bg = ctx.createLinearGradient(0, 0, 0, h);
      bg.addColorStop(0, '#2d5a1e');
      bg.addColorStop(0.3, '#3a7a28');
      bg.addColorStop(1, '#2a5a1a');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);

      // Subtle grass texture
      ctx.fillStyle = 'rgba(0,0,0,0.05)';
      for (let i = 0; i < 40; i++) {
        const gx = (i * 37 + 13) % w;
        const gy = (i * 53 + 7) % h;
        ctx.beginPath();
        ctx.ellipse(gx, gy, 15, 4, (i * 0.7) % Math.PI, 0, Math.PI * 2);
        ctx.fill();
      }

      // Level-up screen flash
      if (levelUpEffect > 0) {
        ctx.fillStyle = `rgba(0, 255, 136, ${levelUpEffect / 300})`;
        ctx.fillRect(0, 0, w, h);
        levelUpEffect--;
      }
    }

    function update(dt) {
      for (const hole of holes) {
        if (!hole.mole) continue;
        const mole = hole.mole;
        const speed = 0.06;

        if (mole.phase === 'rising') {
          mole.progress = Math.min(1, mole.progress + speed);
          if (mole.progress >= 1) mole.phase = 'showing';
        } else if (mole.phase === 'showing') {
          mole.elapsed += dt;
          if (mole.elapsed >= mole.showTime) {
            mole.phase = 'sinking';
          }
        } else if (mole.phase === 'sinking') {
          mole.progress = Math.max(0, mole.progress - speed * 1.5);
          if (mole.progress <= 0) hole.mole = null;
        }
      }
    }

    let lastTime = 0;
    function gameLoop(timestamp) {
      const dt = lastTime ? timestamp - lastTime : 16;
      lastTime = timestamp;

      drawBackground();

      for (const hole of holes) {
        drawHole(hole);
      }

      drawEffects();
      update(dt);

      if (gameRunning || effects.length > 0) {
        animFrame = requestAnimationFrame(gameLoop);
      }
    }

    function startGame() {
      score = 0;
      currentLevel = 1;
      timeLeft = ROUND_TIME;
      scoreDisplay.textContent = '0';
      levelDisplay.textContent = '1';
      timeDisplay.textContent = ROUND_TIME;
      effects = [];
      levelUpEffect = 0;
      for (const hole of holes) hole.mole = null;

      startOverlay.classList.add('hidden');
      endOverlay.classList.add('hidden');
      gameRunning = true;
      lastTime = 0;

      gameTimer = setInterval(() => {
        timeLeft--;
        timeDisplay.textContent = timeLeft;
        if (timeLeft <= 10 && timeLeft > 0) soundTick();
        if (timeLeft <= 0) endGame();
      }, 1000);

      scheduleSpawn();
      // Spawn one immediately
      spawnMole();
      setTimeout(() => spawnMole(), 600);

      animFrame = requestAnimationFrame(gameLoop);
    }

    function endGame() {
      gameRunning = false;
      clearInterval(gameTimer);
      clearTimeout(spawnTimer);

      const isNewHighScore = score > bestScore;
      if (isNewHighScore) {
        bestScore = score;
        saveHighScore(bestScore);
        bestDisplay.textContent = bestScore;
      }

      soundGameOver();
      if (isNewHighScore) setTimeout(soundNewHighScore, 1300);

      finalScoreEl.textContent = score;
      endLevel.textContent = 'Reached Level ' + currentLevel;
      if (score >= 300) endMessage.textContent = 'Amazing! You are a mole-whacking master!';
      else if (score >= 150) endMessage.textContent = 'Great job! Keep practicing!';
      else endMessage.textContent = 'Nice try! You can do better!';

      endOverlay.classList.remove('hidden');
    }

    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('restartBtn').addEventListener('click', startGame);

    window.addEventListener('resize', resize);
    resize();

    // Draw initial state
    drawBackground();
    for (const hole of holes) drawHole(hole);
  </script>
</body>
</html>
