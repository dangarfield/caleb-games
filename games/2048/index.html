<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <title>2048 - Caleb's Arcade</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .game-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 0.75rem;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 520px;
      margin-bottom: 0.5rem;
      flex-shrink: 0;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 0 20px rgba(255, 200, 50, 0.5);
    }

    .scores {
      display: flex;
      gap: 0.75rem;
    }

    .score-box {
      background: rgba(255,255,255,0.12);
      border-radius: 0.5rem;
      padding: 0.3rem 0.75rem;
      text-align: center;
      min-width: 70px;
    }

    .score-label {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .score-value {
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
    }

    .controls-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 520px;
      margin-bottom: 0.5rem;
      flex-shrink: 0;
    }

    .mode-toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .mode-toggle label {
      color: rgba(255,255,255,0.7);
      font-size: 0.85rem;
      cursor: pointer;
    }

    .mode-indicator {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.25rem 0.6rem;
      border-radius: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .mode-indicator.normal {
      background: rgba(231, 76, 60, 0.3);
      color: #e74c3c;
    }

    .mode-indicator.easy {
      background: rgba(46, 204, 113, 0.3);
      color: #2ecc71;
    }

    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: rgba(255,255,255,0.2);
      border-radius: 24px;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle-switch input:checked + .toggle-slider {
      background: rgba(46, 204, 113, 0.6);
    }

    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(20px);
    }

    .board-container {
      position: relative;
      flex-shrink: 0;
    }

    .board {
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.08);
      border-radius: 1rem;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 8px;
      padding: 8px;
    }

    .cell {
      background: rgba(255,255,255,0.06);
      border-radius: 0.5rem;
    }

    .tile {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      border-radius: 0.5rem;
      transition: top 0.12s ease, left 0.12s ease;
      z-index: 1;
    }

    .tile.merged {
      animation: pop 0.2s ease;
    }

    .tile.new-tile {
      animation: appear 0.2s ease;
    }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    @keyframes appear {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .game-over-overlay, .win-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      border-radius: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      backdrop-filter: blur(4px);
    }

    .game-over-overlay h2, .win-overlay h2 {
      font-size: 2.5rem;
      color: #fff;
      margin-bottom: 1rem;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .overlay-btn {
      background: linear-gradient(145deg, #f39c12, #e67e22);
      color: #fff;
      border: none;
      border-radius: 0.75rem;
      padding: 0.75rem 2rem;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(243, 156, 18, 0.4);
      margin-top: 0.5rem;
    }

    .overlay-btn:active { transform: scale(0.95); }

    .controls-hint {
      color: rgba(255,255,255,0.4);
      font-size: 0.8rem;
      margin-top: 0.5rem;
      text-align: center;
      flex-shrink: 0;
    }

    .new-game-btn {
      background: linear-gradient(145deg, #e74c3c, #c0392b);
      color: #fff;
      border: none;
      border-radius: 0.75rem;
      padding: 0.5rem 1.25rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
    }

    .new-game-btn:active { transform: scale(0.95); }
    #backBtn {
    position: fixed;
    top: 10px;
    left: 10px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    text-decoration: none;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 14px;
    z-index: 9999;
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.2);
    transition: background 0.2s;
  }
  #backBtn:hover, #backBtn:active {
    background: rgba(255,255,255,0.3);
  }
    </style>
</head>
<body>
  <div class="game-wrapper">
    <div class="top-bar">
      <a id="backBtn" href="../../index.html">&larr; Games</a>
      <h1>2048</h1>
      <div class="scores">
        <div class="score-box">
          <div class="score-label">Score</div>
          <div class="score-value" id="score">0</div>
        </div>
        <div class="score-box">
          <div class="score-label">Best</div>
          <div class="score-value" id="best">0</div>
        </div>
      </div>
    </div>

    <div class="controls-row">
      <div class="mode-toggle">
        <span class="mode-indicator normal" id="modeIndicator">Normal</span>
        <label class="toggle-switch">
          <input type="checkbox" id="easyToggle">
          <span class="toggle-slider"></span>
        </label>
        <label for="easyToggle" style="color:rgba(255,255,255,0.7);font-size:0.85rem;cursor:pointer;">Easy Mode</label>
      </div>
      <button class="new-game-btn" id="newGameBtn">New Game</button>
    </div>

    <div class="board-container" id="boardContainer">
      <div class="board" id="board"></div>
    </div>

    <p class="controls-hint">Swipe or use arrow keys to slide tiles</p>
  </div>

  <script>
  (function() {
    // ============ Web Audio API Sound System ============
    var audioCtx = null;
    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      return audioCtx;
    }

    // Resume audio context on first user interaction
    ['click', 'touchstart', 'keydown'].forEach(function(evt) {
      document.addEventListener(evt, function() { ensureAudio(); }, { once: true });
    });

    function playTone(freq, duration, volume, type, rampDown) {
      try {
        var ctx = ensureAudio();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.type = type || 'sine';
        osc.frequency.setValueAtTime(freq, ctx.currentTime);
        gain.gain.setValueAtTime(volume || 0.1, ctx.currentTime);
        if (rampDown !== false) {
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
        }
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + duration);
      } catch(e) {}
    }

    function playSweep(startFreq, endFreq, duration, volume, type) {
      try {
        var ctx = ensureAudio();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.type = type || 'sine';
        osc.frequency.setValueAtTime(startFreq, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(endFreq, ctx.currentTime + duration);
        gain.gain.setValueAtTime(volume || 0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + duration);
      } catch(e) {}
    }

    function playNoise(duration, volume) {
      try {
        var ctx = ensureAudio();
        var bufferSize = ctx.sampleRate * duration;
        var buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        var data = buffer.getChannelData(0);
        for (var i = 0; i < bufferSize; i++) {
          data[i] = (Math.random() * 2 - 1);
        }
        var source = ctx.createBufferSource();
        source.buffer = buffer;
        var gain = ctx.createGain();
        gain.gain.setValueAtTime(volume || 0.08, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
        // Bandpass filter for whoosh character
        var filter = ctx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.setValueAtTime(1200, ctx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + duration);
        filter.Q.value = 0.8;
        source.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);
        source.start(ctx.currentTime);
        source.stop(ctx.currentTime + duration);
      } catch(e) {}
    }

    // Sound: tile slide/move - short soft whoosh
    function soundSlide() {
      playNoise(0.08, 0.06);
      playSweep(500, 300, 0.08, 0.04, 'sine');
    }

    // Sound: tile merge - satisfying pop, pitch varies with tile value
    function soundMerge(tileValue) {
      var baseFreq = 300 + Math.min(Math.log2(tileValue || 2), 12) * 80;
      playTone(baseFreq, 0.12, 0.12, 'sine');
      playTone(baseFreq * 1.5, 0.08, 0.08, 'triangle');
    }

    // Sound: new tile appear - subtle blip
    function soundNewTile() {
      playTone(880, 0.06, 0.06, 'sine');
    }

    // Sound: game over - descending notes
    function soundGameOver() {
      var notes = [440, 370, 311, 261];
      for (var i = 0; i < notes.length; i++) {
        (function(idx) {
          setTimeout(function() {
            playTone(notes[idx], 0.3, 0.10, 'triangle');
          }, idx * 200);
        })(i);
      }
    }

    // Sound: win (reaching 2048) - ascending celebratory notes
    function soundWin() {
      var notes = [523, 659, 784, 1047, 1319];
      for (var i = 0; i < notes.length; i++) {
        (function(idx) {
          setTimeout(function() {
            playTone(notes[idx], 0.25, 0.10, 'sine');
            if (idx < notes.length - 1) {
              playTone(notes[idx] * 1.25, 0.15, 0.06, 'triangle');
            }
          }, idx * 150);
        })(i);
      }
    }
    // ============ End Sound System ============

    var SIZE = 4;
    var board, score, best, won, gameOver, tileId, easyMode;
    var boardEl = document.getElementById('board');
    var boardContainer = document.getElementById('boardContainer');
    var scoreEl = document.getElementById('score');
    var bestEl = document.getElementById('best');
    var easyToggle = document.getElementById('easyToggle');
    var modeIndicator = document.getElementById('modeIndicator');

    // Tile colors
    var TILE_COLORS = {
      2:    { bg: '#eee4da', color: '#776e65', fontSize: 2.2 },
      4:    { bg: '#ede0c8', color: '#776e65', fontSize: 2.2 },
      8:    { bg: '#f2b179', color: '#f9f6f2', fontSize: 2.2 },
      16:   { bg: '#f59563', color: '#f9f6f2', fontSize: 2.0 },
      32:   { bg: '#f67c5f', color: '#f9f6f2', fontSize: 2.0 },
      64:   { bg: '#f65e3b', color: '#f9f6f2', fontSize: 2.0 },
      128:  { bg: '#edcf72', color: '#f9f6f2', fontSize: 1.8 },
      256:  { bg: '#edcc61', color: '#f9f6f2', fontSize: 1.8 },
      512:  { bg: '#edc850', color: '#f9f6f2', fontSize: 1.8 },
      1024: { bg: '#edc53f', color: '#f9f6f2', fontSize: 1.5 },
      2048: { bg: '#edc22e', color: '#f9f6f2', fontSize: 1.5 },
      4096: { bg: '#3c3a32', color: '#f9f6f2', fontSize: 1.4 },
      8192: { bg: '#3c3a32', color: '#f9f6f2', fontSize: 1.4 }
    };

    function getColor(val) {
      return TILE_COLORS[val] || { bg: '#3c3a32', color: '#f9f6f2', fontSize: 1.2 };
    }

    // --- Shared localStorage: calebArcadeData ---
    function loadArcadeData() {
      try {
        var raw = localStorage.getItem('calebArcadeData');
        return raw ? JSON.parse(raw) : {};
      } catch(e) {
        return {};
      }
    }

    function saveArcadeData(data) {
      localStorage.setItem('calebArcadeData', JSON.stringify(data));
    }

    function loadBestScore() {
      var data = loadArcadeData();
      // Migrate old key if present
      var oldBest = localStorage.getItem('2048_best');
      if (oldBest !== null) {
        var oldVal = parseInt(oldBest, 10) || 0;
        if (!data['2048']) data['2048'] = {};
        if (!data['2048'].highScore || oldVal > data['2048'].highScore) {
          data['2048'].highScore = oldVal;
          saveArcadeData(data);
        }
        localStorage.removeItem('2048_best');
      }
      return (data['2048'] && data['2048'].highScore) ? data['2048'].highScore : 0;
    }

    function saveBestScore(val) {
      var data = loadArcadeData();
      if (!data['2048']) data['2048'] = {};
      data['2048'].highScore = val;
      saveArcadeData(data);
    }

    // Load best score
    best = loadBestScore();
    bestEl.textContent = best;

    // Easy mode toggle
    easyMode = false;
    easyToggle.addEventListener('change', function() {
      easyMode = easyToggle.checked;
      updateModeIndicator();
    });

    function updateModeIndicator() {
      if (easyMode) {
        modeIndicator.textContent = 'Easy';
        modeIndicator.className = 'mode-indicator easy';
      } else {
        modeIndicator.textContent = 'Normal';
        modeIndicator.className = 'mode-indicator normal';
      }
    }

    // --- Sizing: fill available screen, landscape-optimized ---
    function calcBoardSize() {
      var wrapperPadding = 0.75 * 16 * 2; // 0.75rem padding * 2
      var topBarH = 48;
      var controlsRowH = 40;
      var hintH = 28;
      var gaps = 24; // margins between sections
      var availH = window.innerHeight - topBarH - controlsRowH - hintH - gaps - wrapperPadding;
      var availW = Math.min(window.innerWidth - 24, 520);
      var size = Math.min(availH, availW);
      size = Math.max(size, 200);
      return Math.floor(size);
    }

    function resizeBoard() {
      var size = calcBoardSize();
      boardContainer.style.width = size + 'px';
      boardContainer.style.height = size + 'px';
    }

    function init() {
      board = [];
      for (var r = 0; r < SIZE; r++) {
        board[r] = [];
        for (var c = 0; c < SIZE; c++) {
          board[r][c] = 0;
        }
      }
      score = 0;
      won = false;
      gameOver = false;
      tileId = 0;
      scoreEl.textContent = '0';
      resizeBoard();
      addRandomTile();
      addRandomTile();
      render();
    }

    function addRandomTile() {
      var empty = [];
      for (var r = 0; r < SIZE; r++) {
        for (var c = 0; c < SIZE; c++) {
          if (board[r][c] === 0) empty.push({ r: r, c: c });
        }
      }
      if (empty.length === 0) return;
      var cell = empty[Math.floor(Math.random() * empty.length)];
      board[cell.r][cell.c] = Math.random() < 0.9 ? 2 : 4;
      return cell;
    }

    function getCellRect(r, c) {
      var containerRect = boardContainer.getBoundingClientRect();
      var boardSize = containerRect.width;
      var padding = 8;
      var gap = 8;
      var cellSize = (boardSize - padding * 2 - gap * 3) / 4;
      return {
        left: padding + c * (cellSize + gap),
        top: padding + r * (cellSize + gap),
        size: cellSize
      };
    }

    function render(mergedCells, newCells) {
      mergedCells = mergedCells || [];
      newCells = newCells || [];

      // Setup grid cells
      boardEl.innerHTML = '';
      for (var i = 0; i < SIZE * SIZE; i++) {
        var cell = document.createElement('div');
        cell.className = 'cell';
        boardEl.appendChild(cell);
      }

      // Remove old tiles
      var oldTiles = boardContainer.querySelectorAll('.tile');
      for (var t = 0; t < oldTiles.length; t++) {
        oldTiles[t].remove();
      }

      // Create tile elements
      for (var r = 0; r < SIZE; r++) {
        for (var c = 0; c < SIZE; c++) {
          if (board[r][c] === 0) continue;
          var val = board[r][c];
          var rect = getCellRect(r, c);
          var style = getColor(val);
          var tile = document.createElement('div');
          tile.className = 'tile';

          var isMerged = false;
          var isNew = false;
          for (var m = 0; m < mergedCells.length; m++) {
            if (mergedCells[m].r === r && mergedCells[m].c === c) isMerged = true;
          }
          for (var n = 0; n < newCells.length; n++) {
            if (newCells[n].r === r && newCells[n].c === c) isNew = true;
          }
          if (isMerged) tile.className += ' merged';
          if (isNew) tile.className += ' new-tile';

          tile.style.left = rect.left + 'px';
          tile.style.top = rect.top + 'px';
          tile.style.width = rect.size + 'px';
          tile.style.height = rect.size + 'px';
          tile.style.background = style.bg;
          tile.style.color = style.color;
          tile.style.fontSize = style.fontSize + 'rem';
          tile.textContent = val;
          boardContainer.appendChild(tile);
        }
      }

      // Remove overlays
      var overlays = boardContainer.querySelectorAll('.game-over-overlay, .win-overlay');
      for (var o = 0; o < overlays.length; o++) overlays[o].remove();

      if (gameOver) {
        var overlay = document.createElement('div');
        overlay.className = 'game-over-overlay';
        overlay.innerHTML = '<h2>Game Over!</h2><button class="overlay-btn" id="retryBtn">Try Again</button>';
        boardContainer.appendChild(overlay);
        document.getElementById('retryBtn').addEventListener('click', function() { init(); });
      }

      if (won) {
        var winOverlay = document.createElement('div');
        winOverlay.className = 'win-overlay';
        winOverlay.innerHTML = '<h2>You Win!</h2><button class="overlay-btn" id="keepBtn">Keep Going</button><button class="overlay-btn" style="margin-top:0.5rem;background:linear-gradient(145deg,#2ecc71,#27ae60)" id="newBtn">New Game</button>';
        boardContainer.appendChild(winOverlay);
        document.getElementById('keepBtn').addEventListener('click', function() {
          won = false;
          render();
        });
        document.getElementById('newBtn').addEventListener('click', function() { init(); });
      }
    }

    function slide(row) {
      // Remove zeros
      var arr = row.filter(function(v) { return v !== 0; });
      var merged = [];
      for (var i = 0; i < arr.length - 1; i++) {
        if (arr[i] === arr[i + 1]) {
          arr[i] *= 2;
          score += arr[i];
          arr[i + 1] = 0;
          merged.push(i);
          if (arr[i] === 2048 && !won) won = true;
        }
      }
      arr = arr.filter(function(v) { return v !== 0; });
      while (arr.length < SIZE) arr.push(0);
      return { row: arr, merged: merged };
    }

    function move(dir) {
      if (gameOver || won) return false;
      var moved = false;
      var mergedCells = [];

      var oldBoard = board.map(function(row) { return row.slice(); });

      if (dir === 'left' || dir === 'right') {
        for (var r = 0; r < SIZE; r++) {
          var row = board[r].slice();
          if (dir === 'right') row.reverse();
          var result = slide(row);
          if (dir === 'right') {
            result.row.reverse();
            result.merged = result.merged.map(function(i) { return SIZE - 1 - i; });
          }
          board[r] = result.row;
          for (var mi = 0; mi < result.merged.length; mi++) {
            mergedCells.push({ r: r, c: result.merged[mi] });
          }
        }
      } else {
        for (var c = 0; c < SIZE; c++) {
          var col = [];
          for (var r2 = 0; r2 < SIZE; r2++) col.push(board[r2][c]);
          if (dir === 'down') col.reverse();
          var result2 = slide(col);
          if (dir === 'down') {
            result2.row.reverse();
            result2.merged = result2.merged.map(function(i) { return SIZE - 1 - i; });
          }
          for (var r3 = 0; r3 < SIZE; r3++) {
            board[r3][c] = result2.row[r3];
          }
          for (var mi2 = 0; mi2 < result2.merged.length; mi2++) {
            mergedCells.push({ r: result2.merged[mi2], c: c });
          }
        }
      }

      // Check if board changed
      for (var r4 = 0; r4 < SIZE; r4++) {
        for (var c4 = 0; c4 < SIZE; c4++) {
          if (board[r4][c4] !== oldBoard[r4][c4]) moved = true;
        }
      }

      if (moved) {
        // Play slide sound
        soundSlide();

        // Play merge sounds for each merged cell
        var didMerge = mergedCells.length > 0;
        for (var sm = 0; sm < mergedCells.length; sm++) {
          var mergeVal = board[mergedCells[sm].r][mergedCells[sm].c];
          soundMerge(mergeVal);
        }

        // In easy mode, only add a new tile if at least one merge happened
        var newCell = null;
        var newCells = [];

        if (!easyMode || didMerge) {
          newCell = addRandomTile();
        } else if (easyMode && !canMerge()) {
          // Easy mode: no merge happened and no merge is possible anywhere
          // on the board — add a tile so the player can make progress
          newCell = addRandomTile();
        }

        // Find new tile positions for animation
        if (newCell) {
          newCells.push(newCell);
        } else {
          // Also detect new tiles by comparing boards (for normal mode where addRandomTile doesn't return cleanly via merges)
          for (var r5 = 0; r5 < SIZE; r5++) {
            for (var c5 = 0; c5 < SIZE; c5++) {
              if (oldBoard[r5][c5] === 0 && board[r5][c5] !== 0) {
                var wasInMerged = false;
                for (var mc = 0; mc < mergedCells.length; mc++) {
                  if (mergedCells[mc].r === r5 && mergedCells[mc].c === c5) wasInMerged = true;
                }
                // Also not a tile that slid into this position
                var wasSlid = false;
                for (var r6 = 0; r6 < SIZE; r6++) {
                  for (var c6 = 0; c6 < SIZE; c6++) {
                    if (oldBoard[r6][c6] === board[r5][c5] && (r6 !== r5 || c6 !== c5)) {
                      // Could be a slid tile, skip complex detection, just use newCell
                    }
                  }
                }
                if (!wasInMerged) newCells.push({ r: r5, c: c5 });
              }
            }
          }
        }

        scoreEl.textContent = score;
        if (score > best) {
          best = score;
          bestEl.textContent = best;
          saveBestScore(best);
        }

        // Play new tile sound
        if (newCells.length > 0) {
          setTimeout(function() { soundNewTile(); }, 80);
        }

        if (!canMove()) gameOver = true;

        // Play game over or win sounds
        if (gameOver) {
          setTimeout(function() { soundGameOver(); }, 150);
        }
        if (won) {
          setTimeout(function() { soundWin(); }, 150);
        }

        render(mergedCells, newCells);
      }

      return moved;
    }

    function canMove() {
      for (var r = 0; r < SIZE; r++) {
        for (var c = 0; c < SIZE; c++) {
          if (board[r][c] === 0) return true;
          if (c < SIZE - 1 && board[r][c] === board[r][c + 1]) return true;
          if (r < SIZE - 1 && board[r][c] === board[r + 1][c]) return true;
        }
      }
      return false;
    }

    function canMerge() {
      // Check if any two tiles on the board share the same value
      // (they can slide together to merge, regardless of current position)
      var vals = {};
      for (var r = 0; r < SIZE; r++) {
        for (var c = 0; c < SIZE; c++) {
          if (board[r][c] === 0) continue;
          // Tiles must be in the same row or column to merge via sliding
          // Check rows: any duplicate value in the same row
          // Check cols: any duplicate value in the same column
          var v = board[r][c];
          // Check rest of same row
          for (var c2 = c + 1; c2 < SIZE; c2++) {
            if (board[r][c2] === v) return true;
          }
          // Check rest of same column
          for (var r2 = r + 1; r2 < SIZE; r2++) {
            if (board[r2][c] === v) return true;
          }
        }
      }
      return false;
    }

    // Keyboard controls
    document.addEventListener('keydown', function(e) {
      var dirs = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down' };
      if (dirs[e.key]) {
        e.preventDefault();
        move(dirs[e.key]);
      }
    });

    // Touch controls
    var touchStartX, touchStartY;
    boardContainer.addEventListener('touchstart', function(e) {
      e.preventDefault();
      var touch = e.touches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
    }, { passive: false });

    boardContainer.addEventListener('touchend', function(e) {
      e.preventDefault();
      if (touchStartX === undefined) return;
      var touch = e.changedTouches[0];
      var dx = touch.clientX - touchStartX;
      var dy = touch.clientY - touchStartY;
      var absDx = Math.abs(dx);
      var absDy = Math.abs(dy);
      var minSwipe = 30;

      if (Math.max(absDx, absDy) < minSwipe) return;

      if (absDx > absDy) {
        move(dx > 0 ? 'right' : 'left');
      } else {
        move(dy > 0 ? 'down' : 'up');
      }
      touchStartX = undefined;
      touchStartY = undefined;
    }, { passive: false });

    // New game button
    document.getElementById('newGameBtn').addEventListener('click', function() { init(); });

    // Reposition tiles on resize
    window.addEventListener('resize', function() {
      resizeBoard();
      render();
    });

    init();
  })();
  </script>
</body>
