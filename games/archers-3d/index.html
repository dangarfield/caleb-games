<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="../../favicon.svg">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Archers - Caleb's Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a2e;overflow:hidden;touch-action:none;font-family:'Segoe UI',system-ui,sans-serif;color:#fff;-webkit-user-select:none;user-select:none}
canvas{display:block;width:100%;height:100%}
#three-canvas{position:absolute;inset:0;z-index:0;pointer-events:none}
#gameCanvas{position:absolute;inset:0;z-index:1}
#backBtn{position:fixed;top:12px;left:12px;z-index:9999;background:rgba(0,0,0,0.55);color:#fff;text-decoration:none;padding:8px 22px;border-radius:20px;font:bold clamp(15px,3.5vw,20px)/1.4 'Segoe UI',system-ui,sans-serif;border:1px solid rgba(255,255,255,0.18);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);transition:background 0.2s}
#backBtn:hover{background:rgba(0,0,0,0.75)}
#overlay{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);color:#fff;text-align:center;padding:0 24px}
#overlay h1{font-size:clamp(2.5rem,10vw,5rem);margin-bottom:0.5rem;text-shadow:0 0 30px rgba(231,76,60,0.5)}
#overlay .sub{font-size:clamp(1.2rem,4vw,1.8rem);color:#a0c4ff;margin-bottom:1.5rem}
#overlay .info{font-size:clamp(1rem,3vw,1.4rem);color:rgba(255,255,255,0.7);margin-bottom:2.5rem;max-width:600px;padding:0 1rem;line-height:1.6}
#overlay button{padding:18px 56px;font-size:clamp(1.3rem,4vw,1.8rem);border:none;border-radius:16px;background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;cursor:pointer;font-weight:700;box-shadow:0 4px 20px rgba(231,76,60,0.4);transition:transform 0.15s}
#overlay button:hover{transform:scale(1.05)}
#overlay button:active{transform:scale(0.95)}
.hidden{display:none!important}
#game-wrapper{position:fixed;inset:0;width:100%;height:100%}
.landscape-bar{display:none}
@media (orientation:landscape){
  body{display:flex;justify-content:center;align-items:stretch}
  #game-wrapper{position:relative;width:min(100vh * 0.56, 100vw);height:100vh;overflow:hidden}
  .landscape-bar{display:block;position:fixed;top:0;bottom:0;background:#050516;z-index:9000}
  .landscape-bar.left{left:0;right:calc(50% + min(100vh * 0.56, 100vw) / 2)}
  .landscape-bar.right{right:0;left:calc(50% + min(100vh * 0.56, 100vw) / 2)}
}
</style>
</head>
<body>
<a id="backBtn" href="../../index.html">&larr; Games</a>
<div class="landscape-bar left"></div>
<div class="landscape-bar right"></div>
<div id="game-wrapper">
<canvas id="three-canvas"></canvas>
<canvas id="gameCanvas"></canvas>
<div id="overlay">
  <h1>Archers</h1>
  <div class="sub">Stand still to shoot. Move to dodge!</div>
  <div class="info">Use the joystick to move. You auto-fire when standing still. Clear each chapter to progress!</div>
  <button id="playBtn">Play</button>
</div>
</div>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module" src="js/main.js"></script>
</body>
</html>
