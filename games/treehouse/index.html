<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="../../favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<title>Treehouse Quiz - Garfield Boys' Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0a0a2e;overflow:hidden;touch-action:none;
  font-family:'Segoe UI',system-ui,sans-serif;user-select:none;-webkit-user-select:none}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
#backBtn{position:fixed;top:12px;left:12px;z-index:9999;
  background:rgba(0,0,0,0.55);color:#fff;text-decoration:none;
  padding:6px 18px;border-radius:20px;
  font:bold 15px/1.4 'Segoe UI',system-ui,sans-serif;
  border:1px solid rgba(255,255,255,0.18);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  transition:background 0.2s}
#backBtn:hover{background:rgba(0,0,0,0.75)}
#muteBtn{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:9999;
  background:rgba(0,0,0,0.55);color:#fff;border:1px solid rgba(255,255,255,0.18);
  padding:6px 14px;border-radius:20px;font-size:18px;cursor:pointer;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  transition:background 0.2s}
#muteBtn:hover{background:rgba(0,0,0,0.75)}
#muteBtn.muted{opacity:0.5}

/* Overlay / Start Screen */
#overlay{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,0.7);color:#fff;text-align:center}
#overlay.hidden{display:none}
#overlay h1{font-size:clamp(2rem,8vw,4rem);margin-bottom:0.5rem;
  color:#7ab648;text-shadow:0 0 30px rgba(122,182,72,0.4)}
#overlay .sub{font-size:clamp(1rem,3vw,1.4rem);color:#a0c4ff;margin-bottom:1.5rem}
#overlay .info{font-size:clamp(0.85rem,2.5vw,1.1rem);color:rgba(255,255,255,0.7);
  margin-bottom:2rem;max-width:500px;padding:0 1rem;line-height:1.5}
#overlay button{padding:14px 40px;font-size:1.3rem;border:none;border-radius:12px;
  background:linear-gradient(135deg,#7ab648,#5a9a2a);color:#fff;
  cursor:pointer;font-weight:700;
  box-shadow:0 4px 20px rgba(122,182,72,0.4);transition:transform 0.15s}
#overlay button:hover{transform:scale(1.05)}
#overlay button:active{transform:scale(0.95)}

/* Quiz UI */
#quiz{position:fixed;inset:0;z-index:10;display:none;flex-direction:column;
  align-items:center;justify-content:center;pointer-events:none}
#quiz.active{display:flex;pointer-events:auto}

/* Storey ladder - left side */
#ladder{position:fixed;left:8px;top:50%;transform:translateY(-50%);z-index:15;
  display:flex;flex-direction:column-reverse;gap:2px;pointer-events:none}
.storey{font:bold 11px/1 'Segoe UI',system-ui,sans-serif;color:rgba(255,255,255,0.4);
  padding:3px 8px;border-radius:6px;text-align:center;white-space:nowrap;
  transition:all 0.3s}
.storey.current{background:rgba(122,182,72,0.3);color:#7ab648;font-weight:900;
  box-shadow:0 0 10px rgba(122,182,72,0.3)}
.storey.done{color:rgba(122,182,72,0.7)}

/* Question area */
#questionArea{width:90%;max-width:700px;padding:0 0 20px;pointer-events:auto}
#questionBox{background:rgba(0,0,0,0.7);border:2px solid rgba(122,182,72,0.3);
  border-radius:16px;padding:20px 24px;margin-bottom:16px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  text-align:center;position:relative}
#repeatBtn{position:absolute;top:10px;right:10px;background:none;border:none;
  color:rgba(255,255,255,0.5);font-size:1.2rem;cursor:pointer;padding:4px 6px;
  border-radius:6px;transition:all 0.2s;line-height:1}
#repeatBtn:hover{color:#fff;background:rgba(255,255,255,0.1)}
#storeyLabel{font:bold 13px 'Segoe UI',system-ui,sans-serif;color:#7ab648;
  margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
#questionText{font:bold clamp(1rem,3.5vw,1.4rem)/1.4 'Segoe UI',system-ui,sans-serif;
  color:#fff}

/* Answer grid */
#answers{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.answer-btn{background:rgba(0,0,0,0.6);border:2px solid rgba(255,255,255,0.15);
  border-radius:12px;padding:14px 16px;color:#fff;cursor:pointer;
  font:bold clamp(0.85rem,2.5vw,1.05rem)/1.3 'Segoe UI',system-ui,sans-serif;
  text-align:left;transition:all 0.2s;display:flex;align-items:center;gap:10px;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.answer-btn:hover:not(.locked){border-color:rgba(122,182,72,0.5);
  background:rgba(122,182,72,0.1)}
.answer-btn:active:not(.locked){transform:scale(0.97)}
.answer-btn .letter{font:bold 1.1rem 'Segoe UI',system-ui,sans-serif;
  color:#7ab648;min-width:24px}
.answer-btn.selected{border-color:#ffa500;background:rgba(255,165,0,0.2)}
.answer-btn.correct{border-color:#7ab648;background:rgba(122,182,72,0.25);
  box-shadow:0 0 15px rgba(122,182,72,0.3)}
.answer-btn.wrong{border-color:#e74c3c;background:rgba(231,76,60,0.25);
  box-shadow:0 0 15px rgba(231,76,60,0.3)}
.answer-btn.locked{opacity:0.4;pointer-events:none}
.answer-btn.eliminated{opacity:0.15;pointer-events:none}

/* Lifelines */
#lifelines{display:flex;gap:10px;justify-content:center;margin-bottom:14px}
.lifeline{background:rgba(0,0,0,0.6);border:2px solid rgba(255,255,255,0.15);
  border-radius:50%;width:52px;height:52px;display:flex;align-items:center;
  justify-content:center;cursor:pointer;font-size:1.4rem;color:#fff;
  transition:all 0.2s;position:relative}
.lifeline:hover:not(.used){border-color:rgba(122,182,72,0.5);
  background:rgba(122,182,72,0.1)}
.lifeline.used{opacity:0.25;pointer-events:none;filter:grayscale(1)}
.lifeline .tooltip{position:absolute;bottom:110%;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.9);color:#fff;padding:4px 10px;border-radius:6px;
  font:bold 11px 'Segoe UI',system-ui,sans-serif;white-space:nowrap;
  opacity:0;pointer-events:none;transition:opacity 0.2s}
.lifeline:hover .tooltip{opacity:1}

/* Audience poll overlay */
#audiencePoll{display:none;background:rgba(0,0,0,0.85);border:2px solid rgba(122,182,72,0.3);
  border-radius:12px;padding:14px 18px;margin-bottom:10px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
#audiencePoll.show{display:block}
#audiencePoll h3{color:#7ab648;font-size:0.9rem;margin-bottom:10px;text-align:center}
.poll-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.poll-label{color:rgba(255,255,255,0.7);font:bold 14px 'Segoe UI',system-ui,sans-serif;
  min-width:20px}
.poll-bar-bg{flex:1;height:18px;background:rgba(255,255,255,0.1);border-radius:4px;
  overflow:hidden}
.poll-bar-fill{height:100%;background:linear-gradient(90deg,#7ab648,#5a9a2a);
  border-radius:4px;transition:width 0.6s ease-out}
.poll-pct{color:#fff;font:bold 13px 'Segoe UI',system-ui,sans-serif;min-width:36px;
  text-align:right}

/* Phone a friend */
#phoneFriend{display:none;background:rgba(0,0,0,0.85);border:2px solid rgba(122,182,72,0.3);
  border-radius:12px;padding:14px 18px;margin-bottom:10px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  color:rgba(255,255,255,0.9);font-size:0.95rem;line-height:1.5;text-align:center}
#phoneFriend.show{display:block}
#phoneFriend .name{color:#7ab648;font-weight:bold}

/* Result screen */
#result{position:fixed;inset:0;z-index:30;display:none;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,0.8);color:#fff;text-align:center}
#result.active{display:flex}
#result h2{font-size:clamp(1.8rem,6vw,3rem);margin-bottom:0.5rem}
#result .score-text{font-size:clamp(1rem,3vw,1.4rem);color:#a0c4ff;margin-bottom:0.5rem}
#result .reached{font-size:clamp(1.2rem,4vw,1.8rem);color:#ffd32a;
  margin-bottom:2rem;font-weight:bold}
#result button{padding:14px 40px;font-size:1.3rem;border:none;border-radius:12px;
  background:linear-gradient(135deg,#7ab648,#5a9a2a);color:#fff;
  cursor:pointer;font-weight:700;
  box-shadow:0 4px 20px rgba(122,182,72,0.4);transition:transform 0.15s}
#result button:hover{transform:scale(1.05)}
#result button:active{transform:scale(0.95)}

/* Timer bar */
#timerWrap{width:100%;height:4px;background:rgba(255,255,255,0.1);
  border-radius:2px;margin-top:10px;overflow:hidden}
#timerBar{height:100%;background:linear-gradient(90deg,#7ab648,#ffd32a);
  border-radius:2px;transition:width 0.1s linear;width:100%}
#timerBar.warn{background:linear-gradient(90deg,#e74c3c,#ff6b6b)}

/* Reading highlight */
.reading{animation:readPulse 0.6s ease-in-out infinite alternate}
@keyframes readPulse{
  0%{box-shadow:0 0 8px rgba(160,196,255,0.4);border-color:rgba(160,196,255,0.6)}
  100%{box-shadow:0 0 18px rgba(160,196,255,0.7);border-color:rgba(160,196,255,0.9)}
}
#questionBox.reading{border-color:rgba(160,196,255,0.6)}
.answer-btn.reading{border-color:rgba(160,196,255,0.6);background:rgba(160,196,255,0.1)}


/* Toast notification */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9999;
  background:rgba(0,0,0,0.85);color:#fff;padding:12px 24px;border-radius:12px;
  font:bold 14px/1.4 'Segoe UI',system-ui,sans-serif;
  border:1px solid rgba(122,182,72,0.3);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  opacity:0;pointer-events:none;transition:opacity 0.4s;text-align:center;
  max-width:90%}
#toast.show{opacity:1}

@media(max-width:600px){
  #answers{grid-template-columns:1fr}
  #ladder{display:none}
  .lifeline{width:44px;height:44px;font-size:1.2rem}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@hiseb/confetti@2.1.0/dist/confetti.min.js"></script>
</head>
<body>
<a id="backBtn" href="../../index.html">&larr; Games</a>
<button id="muteBtn" aria-label="Toggle speech">&#x1F50A;</button>
<canvas id="c"></canvas>

<div id="overlay">
  <h1>Treehouse Quiz</h1>
  <div class="sub">Climb the 13-Story Treehouse!</div>
  <div class="info">Answer 13 questions to reach the top of Andy &amp; Terry's treehouse.
    Use your 3 lifelines wisely!</div>
  <button id="startBtn">Climb Up!</button>
</div>

<div id="quiz">
  <div id="ladder"></div>
  <div id="questionArea">
    <div id="audiencePoll">
      <h3>The Monkeys Say...</h3>
      <div id="pollBars"></div>
    </div>
    <div id="phoneFriend"></div>
    <div id="questionBox">
      <button id="repeatBtn" aria-label="Repeat question">&#x1F501;</button>
      <div id="storeyLabel"></div>
      <div id="questionText"></div>
      <div id="timerWrap"><div id="timerBar"></div></div>
    </div>
    <div id="answers"></div>
    <div id="lifelines">
      <div class="lifeline" id="ll5050" data-ll="5050">
        <span>&#xBD;</span>
        <span class="tooltip">50:50</span>
      </div>
      <div class="lifeline" id="llPhone" data-ll="phone">
        <span>&#x1F4DE;</span>
        <span class="tooltip">Phone Terry</span>
      </div>
      <div class="lifeline" id="llAudience" data-ll="audience">
        <span>&#x1F412;</span>
        <span class="tooltip">Ask the Monkeys</span>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<div id="result">
  <h2 id="resultTitle"></h2>
  <div class="score-text" id="resultSub"></div>
  <div class="reached" id="resultReached"></div>
  <button id="playAgainBtn">Play Again</button>
</div>

<script>
// ─── Canvas background ───
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
window.addEventListener('resize', resize);

// Leaves / particles
const leaves = [];
for (let i = 0; i < 30; i++) {
  leaves.push({
    x: Math.random() * 2000, y: Math.random() * 2000,
    s: 4 + Math.random() * 8, vx: -0.3 - Math.random() * 0.5,
    vy: 0.3 + Math.random() * 0.4, rot: Math.random() * Math.PI * 2,
    vr: (Math.random() - 0.5) * 0.02,
    hue: 90 + Math.random() * 40
  });
}

let currentStorey = 0;
const STOREYS = [
  { num: 13 },
  { num: 26 },
  { num: 39 },
  { num: 52 },
  { num: 65 },
  { num: 78 },
  { num: 91 },
  { num: 104 },
  { num: 117 },
  { num: 130 },
  { num: 143 },
  { num: 156 },
  { num: 169 },
];

function drawBG() {
  // Sky gradient
  const gr = ctx.createLinearGradient(0, 0, 0, H);
  gr.addColorStop(0, '#0a0a2e');
  gr.addColorStop(0.5, '#141452');
  gr.addColorStop(1, '#1a1a6e');
  ctx.fillStyle = gr;
  ctx.fillRect(0, 0, W, H);

  // Tree trunk
  const tx = W * 0.85, tw = 40;
  ctx.fillStyle = '#3d2817';
  ctx.fillRect(tx - tw / 2, H * 0.1, tw, H);
  ctx.fillStyle = '#2a1a0e';
  ctx.fillRect(tx - tw / 2 + 10, H * 0.1, 6, H);

  // Draw all branches first (behind leaves)
  ctx.lineWidth = 8;
  ctx.strokeStyle = '#3d2817';
  for (let i = 0; i < 13; i++) {
    const by = H * 0.1 + (H * 0.85 / 13) * i;
    const dir = i % 2 === 0 ? -1 : 1;
    const bx = tx + dir * 110;
    ctx.beginPath();
    ctx.moveTo(tx, by);
    ctx.quadraticCurveTo(tx + dir * 55, by - 15, bx, by - 5);
    ctx.stroke();
  }

  // Leaf clusters (level indicator) — drawn bottom to top so higher levels are on top
  const pulse = 0.7 + 0.3 * Math.sin(Date.now() * 0.004);
  const curSt = currentStorey;
  const leafYOff = 10; // shift leaves down to sit on branches
  for (let i = 12; i >= 0; i--) {
    const storeyIdx = 12 - i;
    const by = H * 0.1 + (H * 0.85 / 13) * i;
    const dir = i % 2 === 0 ? -1 : 1;
    const bx = tx + dir * 110;
    const cy = by + leafYOff; // centre y of cluster

    const isCurrent = storeyIdx === curSt;
    const isDone = storeyIdx < curSt;
    let leafColor, leafAlpha, glowColor;
    if (isDone) {
      leafColor = '#7ab648';
      leafAlpha = 0.85;
    } else if (isCurrent) {
      leafColor = '#7ab648';
      leafAlpha = pulse;
      glowColor = 'rgba(122,182,72,0.6)';
    } else {
      leafColor = '#1a3a0e';
      leafAlpha = 0.35;
    }

    ctx.save();
    ctx.globalAlpha = leafAlpha;

    if (isCurrent) {
      ctx.shadowColor = glowColor;
      ctx.shadowBlur = 18;
    }

    // Overlapping leaf ellipses
    ctx.fillStyle = leafColor;
    const offsets = [[-48,-36],[48,-36],[0,-72],[-72,0],[72,0],[-32,-56],[32,-56],[-56,-20],[56,-20]];
    for (const [ox, oy] of offsets) {
      ctx.beginPath();
      ctx.ellipse(bx + ox, cy - 30 + oy, 60, 36, (ox > 0 ? 0.3 : -0.3), 0, Math.PI * 2);
      ctx.fill();
    }
    // Center cluster
    ctx.fillStyle = isDone ? '#8fcf55' : isCurrent ? '#8fcf55' : '#1a3a0e';
    ctx.beginPath();
    ctx.ellipse(bx, cy - 48, 48, 30, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;

    // Dark badge behind level number
    ctx.globalAlpha = isDone ? 0.95 : isCurrent ? 1 : 0.5;
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.beginPath();
    ctx.arc(bx, cy - 40, 28, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = isDone || isCurrent ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Level number
    ctx.fillStyle = isDone ? '#7ab648' : isCurrent ? '#fff' : 'rgba(255,255,255,0.5)';
    ctx.font = `bold ${isCurrent ? 22 : 20}px 'Segoe UI',system-ui,sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(STOREYS[storeyIdx].num, bx, cy - 39);

    ctx.restore();
  }

  // Floating leaves
  for (const l of leaves) {
    l.x += l.vx;
    l.y += l.vy;
    l.rot += l.vr;
    if (l.x < -20) l.x = W + 20;
    if (l.y > H + 20) { l.y = -20; l.x = Math.random() * W; }
    ctx.save();
    ctx.translate(l.x, l.y);
    ctx.rotate(l.rot);
    ctx.fillStyle = `hsla(${l.hue},60%,40%,0.4)`;
    ctx.beginPath();
    ctx.ellipse(0, 0, l.s, l.s * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function animLoop() {
  drawBG();
  requestAnimationFrame(animLoop);
}
animLoop();

// ─── Audio ───
let audioCtx = null;
function ensureAudio() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch (e) { /* AudioContext blocked (e.g. Kids Mode) */ }
  return audioCtx;
}
function playTone(freq, duration, type, vol, endFreq) {
  const c = ensureAudio();
  if (!c) return;
  const osc = c.createOscillator(), gain = c.createGain();
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, c.currentTime);
  if (endFreq) osc.frequency.exponentialRampToValueAtTime(Math.max(endFreq, 20), c.currentTime + duration);
  gain.gain.setValueAtTime(vol || 0.1, c.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + duration);
  osc.connect(gain); gain.connect(c.destination);
  osc.start(); osc.stop(c.currentTime + duration);
}
function sfxCorrect() {
  playTone(523, 0.1, 'sine', 0.12);
  setTimeout(() => playTone(659, 0.1, 'sine', 0.12), 100);
  setTimeout(() => playTone(784, 0.2, 'sine', 0.12), 200);
}
function sfxWrong() {
  playTone(300, 0.3, 'sine', 0.12, 150);
  setTimeout(() => playTone(200, 0.4, 'sine', 0.1, 100), 150);
}
function sfxLifeline() { playTone(880, 0.15, 'triangle', 0.08); }
function sfxVictory() {
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 0.3, 'triangle', 0.1), i * 150));
}
function sfxTick() { playTone(1000, 0.03, 'sine', 0.04); }
function sfxSelect() { playTone(600, 0.08, 'sine', 0.06); }

// ─── Reaction audio (played after correct/wrong SFX) ───
const REACT_CORRECT_COUNT = 15;
const REACT_WRONG_COUNT = 12;

function playReaction(type, onDone) {
  if (speechMuted) { if (onDone) onDone(); return; }
  const count = type === 'correct' ? REACT_CORRECT_COUNT : REACT_WRONG_COUNT;
  const idx = Math.floor(Math.random() * count);
  const audio = new Audio(`audio/react_${type}_${idx}.mp3`);
  audio.onended = () => { if (onDone) onDone(); };
  audio.onerror = () => { if (onDone) onDone(); };
  audio.play().catch(() => { if (onDone) onDone(); });
}

// ─── Confetti (explosion burst via @hiseb/confetti) ───
function spawnConfetti() {
  const colors = ['#7ab648','#ffd32a','#ff6b6b','#a0c4ff','#ff9f43','#ee5a9f','#48dbfb'];
  // Burst from center
  confetti({ particleCount: 80, spread: 100, origin: { y: 0.5 }, colors });
  // Two side bursts for explosion effect
  setTimeout(() => {
    confetti({ particleCount: 40, angle: 60, spread: 70, origin: { x: 0.2, y: 0.6 }, colors });
    confetti({ particleCount: 40, angle: 120, spread: 70, origin: { x: 0.8, y: 0.6 }, colors });
  }, 150);
}

// ─── Shared localStorage ───
function loadArcadeData() {
  try { return JSON.parse(localStorage.getItem('calebArcadeData')) || {}; }
  catch (e) { return {}; }
}
function saveArcadeData(data) {
  localStorage.setItem('calebArcadeData', JSON.stringify(data));
}

// ─── Storey definitions (moved up, referenced by drawBG) ───

// ─── Question bank ───
// Difficulty: 1=easy, 2=medium, 3=hard. Correct answer is always index 0 (c:0).
const ALL_QUESTIONS = [
  // ===================== EASY (Storeys 1-5) =====================
  { q: "What are the names of the two main characters who live in the treehouse?", a: ["Andy and Terry", "Tom and Jerry", "Andy and Jerry", "Terry and Bill"], c: 0, d: 1 },
  { q: "What do Andy and Terry make together?", a: ["Books", "Pizzas", "Movies", "Video games"], c: 0, d: 1 },
  { q: "What is the name of Andy and Terry's neighbour who loves animals?", a: ["Jill", "Jane", "Julie", "Jenny"], c: 0, d: 1 },

// ─── Build ladder ───
function buildLadder() {
  ladderEl.innerHTML = '';
  for (let i = 0; i < 13; i++) {
    const s = STOREYS[i];
    const div = document.createElement('div');
    div.className = 'storey';
    div.textContent = s.num;
    div.id = 'storey-' + i;
    ladderEl.appendChild(div);
  }
}

function updateLadder() {
  for (let i = 0; i < 13; i++) {
    const el = document.getElementById('storey-' + i);
    el.classList.remove('current', 'done');
    if (i < currentStorey) el.classList.add('done');
    if (i === currentStorey) el.classList.add('current');
  }
}

// ─── Pick questions ───
// Tag each question with its original index (for audio file mapping)
const INDEXED_QUESTIONS = ALL_QUESTIONS.map((q, i) => ({ ...q, _audioIdx: i }));

function pickQuestions() {
  const clone = q => ({ q: q.q, a: [...q.a], c: 0, d: q.d, _audioIdx: q._audioIdx });
  const easy = shuffle(INDEXED_QUESTIONS.filter(q => q.d === 1)).slice(0, 5).map(clone);
  const med = shuffle(INDEXED_QUESTIONS.filter(q => q.d === 2)).slice(0, 5).map(clone);
  const hard = shuffle(INDEXED_QUESTIONS.filter(q => q.d === 3)).slice(0, 3).map(clone);
  const picked = [...easy, ...med, ...hard];
  // TEMP: force q0 as first question for testing
  picked[0] = clone(INDEXED_QUESTIONS[0]);
  return picked;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ─── Toast helper ───
function showToast(msg, duration) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration || 4000);
}

// ─── Audio reader (pre-recorded files) ───
let readingDone = false;
let speechMuted = false;
let speechGen = 0; // generation counter to invalidate stale callbacks
let currentAudio = null; // currently playing Audio element

function cancelSpeech() {
  speechGen++;
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  clearReadingHighlights();
}

function clearReadingHighlights() {
  document.querySelectorAll('.reading').forEach(el => el.classList.remove('reading'));
}

function beginReading() {
  cancelSpeech();
  if (!gameActive || answered || speechMuted) {
    finishReading();
    return;
  }
  readingDone = false;

  const gen = speechGen;
  const q = questions[currentStorey];
  const btns = answersEl.querySelectorAll('.answer-btn');
  const qBox = document.getElementById('questionBox');

  const prefix = `audio/q${q._audioIdx}`;
  const audioLetters = ['a', 'b', 'c', 'd'];
  const displayLetters = ['a', 'b', 'c', 'd'];
  // Map display position to original audio file using _answerOrder
  const order = q._answerOrder || [0, 1, 2, 3];
  const steps = [
    { src: `${prefix}_question.mp3`, el: qBox },
  ];
  for (let i = 0; i < 4; i++) {
    // Play the display letter (A/B/C/D) then the answer audio (mapped to original order)
    steps.push({ src: `audio/letter_${displayLetters[i]}.mp3`, el: btns[i] });
    steps.push({ src: `${prefix}_${audioLetters[order[i]]}.mp3`, el: btns[i] });
  }
  let idx = 0;

  function playNext() {
    if (gen !== speechGen) return;
    if (idx >= steps.length || !gameActive || answered || speechMuted) {
      clearReadingHighlights();
      finishReading();
      return;
    }
    clearReadingHighlights();
    const step = steps[idx];
    idx++;
    if (step.el) step.el.classList.add('reading');

    const audio = new Audio(step.src);
    currentAudio = audio;
    audio.onended = () => {
      currentAudio = null;
      if (gen !== speechGen) return;
      if (step.el) step.el.classList.remove('reading');
      playNext();
    };
    audio.onerror = () => {
      currentAudio = null;
      if (gen !== speechGen) return;
      if (step.el) step.el.classList.remove('reading');
      playNext();
    };
    audio.play().catch(() => {
      currentAudio = null;
      if (step.el) step.el.classList.remove('reading');
      // If audio playback is blocked entirely, mute and proceed
      if (idx === 1) {
        showToast("Sorry, I can't speak the questions out loud!", 5000);
        speechMuted = true;
        document.getElementById('muteBtn').textContent = '\u{1F507}';
        document.getElementById('muteBtn').classList.add('muted');
        finishReading();
        return;
      }
      playNext();
    });
  }

  playNext();
}

function finishReading() {
  if (readingDone) return;
  clearReadingHighlights();
  readingDone = true;
  if (gameActive && !answered) startTimer();
}

// ─── Show question ───
function showQuestion() {
  answered = false;
  eliminated = [];
  readingDone = false;
  cancelSpeech();
  audiencePoll.classList.remove('show');
  phoneFriend.classList.remove('show');

  const q = questions[currentStorey];
  const s = STOREYS[currentStorey];
  storeyLabel.textContent = `Level ${s.num}`;
  questionText.textContent = q.q;

  // Shuffle answer order (track mapping for audio playback)
  if (!q._shuffled) {
    const order = shuffle([0, 1, 2, 3]);
    q.c = order.indexOf(0); // correct answer was originally at index 0
    q.a = order.map(i => q.a[i]);
    q._answerOrder = order; // maps display position -> original position (for audio)
    q._shuffled = true;
  }

  answersEl.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  q.a.forEach((text, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.innerHTML = `<span class="letter">${letters[i]}</span><span>${text}</span>`;
    btn.addEventListener('click', () => selectAnswer(i));
    answersEl.appendChild(btn);
  });

  updateLadder();
  // Timer starts after reading finishes, not immediately
  beginReading();
}

// ─── Timer ───
function startTimer() {
  clearInterval(timerInterval);
  timeLeft = TIMER_DURATIONS[currentStorey] * 10; // tenths of a second
  const total = timeLeft;
  timerBar.style.width = '100%';
  timerBar.classList.remove('warn');

  timerInterval = setInterval(() => {
    timeLeft--;
    const pct = (timeLeft / total) * 100;
    timerBar.style.width = pct + '%';
    if (pct < 25) timerBar.classList.add('warn');
    if (timeLeft <= 50 && timeLeft > 0 && timeLeft % 10 === 0) sfxTick();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      timeUp();
    }
  }, 100);
}

function stopTimer() { clearInterval(timerInterval); }

// ─── Answer selection ───
function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  cancelSpeech();
  stopTimer();
  sfxSelect();

  const btns = answersEl.querySelectorAll('.answer-btn');
  btns[idx].classList.add('selected');
  btns.forEach(b => b.style.pointerEvents = 'none');

  // Reveal after delay
  setTimeout(() => {
    const q = questions[currentStorey];
    if (idx === q.c) {
      btns[idx].classList.remove('selected');
      btns[idx].classList.add('correct');
      sfxCorrect();
      spawnConfetti();
      playReaction('correct', () => setTimeout(() => advanceStorey(), 600));
    } else {
      btns[idx].classList.add('wrong');
      btns[q.c].classList.add('correct');
      sfxWrong();
      playReaction('wrong', () => setTimeout(() => gameOver(false), 800));
    }
  }, 1000);
}

function timeUp() {
  if (answered) return;
  answered = true;
  cancelSpeech();
  const q = questions[currentStorey];
  const btns = answersEl.querySelectorAll('.answer-btn');
  btns[q.c].classList.add('correct');
  sfxWrong();
  setTimeout(() => gameOver(false), 1500);
}

// ─── Advance / Game Over ───
function advanceStorey() {
  currentStorey++;
  if (currentStorey >= 13) {
    victory();
  } else {
    showQuestion();
  }
}

function gameOver(isVictory) {
  gameActive = false;
  cancelSpeech();
  quizEl.classList.remove('active');
  resultEl.classList.add('active');

  if (isVictory) {
    resultTitle.textContent = 'You Reached the Top!';
    resultTitle.style.color = '#ffd32a';
    resultSub.textContent = 'You climbed all the way to the 169-Story Treehouse!';
    resultReached.textContent = 'The Top of the Treehouse!';
  } else {
    resultTitle.textContent = 'Oh No!';
    resultTitle.style.color = '#e74c3c';
    resultSub.textContent = `You fell from Level ${STOREYS[currentStorey].num}...`;
    resultReached.textContent = 'Back to the ground!';
  }

  // Save best
  const data = loadArcadeData();
  if (!data.treehouse) data.treehouse = {};
  const best = data.treehouse.bestStorey || 0;
  const reached = isVictory ? 13 : currentStorey;
  if (reached > best) {
    data.treehouse.bestStorey = reached;
    saveArcadeData(data);
  }
}

function victory() {
  sfxVictory();
  gameOver(true);
}

// ─── Lifelines ───
document.querySelectorAll('.lifeline').forEach(el => {
  el.addEventListener('click', () => {
    if (answered || !gameActive) return;
    const type = el.dataset.ll;
    if (lifelinesUsed[type]) return;
    lifelinesUsed[type] = true;
    el.classList.add('used');
    sfxLifeline();

    if (type === '5050') useFiftyFifty();
    else if (type === 'phone') usePhoneFriend();
    else if (type === 'audience') useAskAudience();
  });
});

function useFiftyFifty() {
  const q = questions[currentStorey];
  const wrong = [0, 1, 2, 3].filter(i => i !== q.c);
  const remove = shuffle(wrong).slice(0, 2);
  eliminated = remove;
  const btns = answersEl.querySelectorAll('.answer-btn');
  remove.forEach(i => btns[i].classList.add('eliminated'));
}

function usePhoneFriend() {
  const q = questions[currentStorey];
  const correct = q.a[q.c];
  const letters = ['A', 'B', 'C', 'D'];
  // Terry is ~75% right on easy, ~60% on medium, ~50% on hard
  const confidence = q.d === 1 ? 0.85 : q.d === 2 ? 0.65 : 0.5;
  let guess;
  if (Math.random() < confidence) {
    guess = q.c;
  } else {
    const others = [0, 1, 2, 3].filter(i => i !== q.c && !eliminated.includes(i));
    guess = others[Math.floor(Math.random() * others.length)] ?? q.c;
  }

  const phrases = [
    `Hmm, I'm pretty sure it's ${letters[guess]}: ${q.a[guess]}. I drew a picture of it once!`,
    `Oh! I think it's ${letters[guess]}: ${q.a[guess]}. But I was busy drawing at the time...`,
    `I reckon it's ${letters[guess]}: ${q.a[guess]}. Andy might disagree though!`,
    `Definitely ${letters[guess]}: ${q.a[guess]}! ...I think. My memory is a bit fuzzy.`,
  ];

  phoneFriend.innerHTML = `<span class="name">Terry says:</span><br>"${phrases[Math.floor(Math.random() * phrases.length)]}"`;
  phoneFriend.classList.add('show');
}

function useAskAudience() {
  const q = questions[currentStorey];
  const letters = ['A', 'B', 'C', 'D'];
  // Generate percentages biased toward correct answer
  const bias = q.d === 1 ? 55 : q.d === 2 ? 40 : 30;
  let pcts = [0, 0, 0, 0];
  pcts[q.c] = bias + Math.floor(Math.random() * 15);
  let remain = 100 - pcts[q.c];
  for (let i = 0; i < 4; i++) {
    if (i === q.c) continue;
    if (eliminated.includes(i)) { pcts[i] = 0; continue; }
    const max = remain;
    pcts[i] = Math.floor(Math.random() * (max * 0.6));
    remain -= pcts[i];
  }
  // Distribute remainder
  const open = [0, 1, 2, 3].filter(i => i !== q.c && !eliminated.includes(i));
  if (open.length > 0) pcts[open[0]] += remain;
  else pcts[q.c] += remain;

  pollBars.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    if (eliminated.includes(i)) continue;
    const row = document.createElement('div');
    row.className = 'poll-bar-row';
    row.innerHTML = `
      <span class="poll-label">${letters[i]}</span>
      <div class="poll-bar-bg"><div class="poll-bar-fill" style="width:0%"></div></div>
      <span class="poll-pct">${pcts[i]}%</span>`;
    pollBars.appendChild(row);
    // Animate
    setTimeout(() => {
      row.querySelector('.poll-bar-fill').style.width = pcts[i] + '%';
    }, 100);
  }
  audiencePoll.classList.add('show');
}

// ─── Start / Restart ───
function startGame() {
  overlayEl.classList.add('hidden');
  resultEl.classList.remove('active');
  quizEl.classList.add('active');
  gameActive = true;
  currentStorey = 0;
  questions = pickQuestions();
  lifelinesUsed = { '5050': false, phone: false, audience: false };
  document.querySelectorAll('.lifeline').forEach(el => el.classList.remove('used'));
  buildLadder();
  showQuestion();
}

document.getElementById('startBtn').addEventListener('click', () => {
  ensureAudio();
  startGame();
});
document.getElementById('playAgainBtn').addEventListener('click', startGame);

// Mute toggle
const muteBtn = document.getElementById('muteBtn');
muteBtn.addEventListener('click', () => {
  speechMuted = !speechMuted;
  muteBtn.textContent = speechMuted ? '\u{1F507}' : '\u{1F50A}';
  muteBtn.classList.toggle('muted', speechMuted);
  if (speechMuted) cancelSpeech();
});

// Repeat question
document.getElementById('repeatBtn').addEventListener('click', () => {
  if (!gameActive || answered || speechMuted) return;
  cancelSpeech();
  document.getElementById('repeatBtn').blur();
  readingDone = false;
  beginReading();
});
</script>
