<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Lane Jumper - Caleb's Arcade</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #0a0a1a;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas { display: block; width: 100%; height: 100%; }
        #backBtn {
            position: fixed; top: 10px; left: 10px; z-index: 100;
            background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3);
            color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 16px;
            cursor: pointer; text-decoration: none; backdrop-filter: blur(4px);
        }
        #backBtn:hover { background: rgba(255,255,255,0.25); }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; align-items: center;
            justify-content: center; z-index: 200; backdrop-filter: blur(6px);
        }
        #overlay.hidden { display: none; }
        .overlay-box {
            background: linear-gradient(135deg, #0a0a2e, #0d1a3e);
            border: 2px solid rgba(0,255,200,0.3); border-radius: 20px;
            padding: 40px; max-width: 420px; text-align: center; color: #fff;
        }
        .overlay-box h2 { font-size: 28px; margin-bottom: 15px; color: #0ff; text-shadow: 0 0 20px rgba(0,255,255,0.5); }
        .overlay-box p { font-size: 15px; line-height: 1.6; margin-bottom: 8px; opacity: 0.85; }
        .overlay-box .key { display: inline-block; background: rgba(255,255,255,0.15); padding: 2px 8px; border-radius: 4px; font-family: monospace; }
        .start-btn {
            margin-top: 20px; padding: 14px 50px; font-size: 20px;
            background: linear-gradient(135deg, #0ff, #0a0); color: #000;
            border: none; border-radius: 30px; cursor: pointer; font-weight: bold;
        }
        .start-btn:hover { filter: brightness(1.2); }
    </style>
</head>
<body>
    <a id="backBtn" href="../../index.html">Back</a>
    <canvas id="game"></canvas>
    <div id="overlay">
        <div class="overlay-box">
            <h2>Cyber Lane Jumper</h2>
            <p>You're a data packet racing through fiber-optic lanes!</p>
            <p><span class="key">Swipe Up/Down</span> or <span class="key">Arrow Keys</span> to switch lanes</p>
            <p><span class="key">Tap</span> or <span class="key">Space</span> to shift color</p>
            <p>Match the gate color to pass through. Wrong color = crash!</p>
            <p>Watch out for Route Scrambles!</p>
            <button class="start-btn" id="startBtn">CONNECT</button>
        </div>
    </div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');

// --- Audio ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playPing() {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sine'; o.frequency.value = 1200;
    g.gain.setValueAtTime(0.15, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    o.start(); o.stop(audioCtx.currentTime + 0.15);
}
function playCrash() {
    const bufSize = audioCtx.sampleRate * 0.3;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
    const src = audioCtx.createBufferSource();
    const g = audioCtx.createGain();
    src.buffer = buf; src.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(0.25, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
    src.start();
}
function playScramble() {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sawtooth'; o.frequency.value = 80;
    o.frequency.linearRampToValueAtTime(300, audioCtx.currentTime + 0.4);
    g.gain.setValueAtTime(0.12, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
    o.start(); o.stop(audioCtx.currentTime + 0.5);
}

// --- localStorage ---
function loadArcadeData() {
    try { const raw = localStorage.getItem('calebArcadeData'); return raw ? JSON.parse(raw) : {}; } catch(e) { return {}; }
}
function saveHighScore(s) {
    const data = loadArcadeData();
    if (!data.lanejumper) data.lanejumper = {};
    if (!data.lanejumper.highScore || s > data.lanejumper.highScore) data.lanejumper.highScore = s;
    localStorage.setItem('calebArcadeData', JSON.stringify(data));
}
function getHighScore() {
    const data = loadArcadeData();
    return (data.lanejumper && data.lanejumper.highScore) || 0;
}

let W, H;
function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// --- Colors ---
const COLORS = [
    { name: 'Red',   fill: '#ff2255', glow: 'rgba(255,34,85,0.6)',   dim: '#661122' },
    { name: 'Blue',  fill: '#2266ff', glow: 'rgba(34,102,255,0.6)',  dim: '#112266' },
    { name: 'Green', fill: '#22ff66', glow: 'rgba(34,255,102,0.6)',  dim: '#116622' },
];

// --- Game State ---
let gameStarted = false, gameOver = false;
let score = 0, highScore = getHighScore();
let laneOrder = [0, 1, 2];
let playerLane = 1;
let playerColor = 0;
let gates = [];
let gateSpeed = 3;
let spawnTimer = 0;
let spawnInterval = 70;
let elapsed = 0;
let scrambleTimer = 0;
let scrambleAnim = 0;
let screenShake = 0;
let particles = [];
let matchParticles = [];
let scrollOffset = 0;
let frameCount = 0;
let difficulty = 0;
let fourLaneMode = false;
let fourLaneTimer = 0;
let nextFourLaneAt = 600;
let animFrame;

// Smooth lane transition
let playerVisualY = 0;
let playerTargetY = 0;

// Background grid lines
let gridLines = [];
for (let i = 0; i < 40; i++) {
    gridLines.push({ x: Math.random() * 2000, speed: 0.5 + Math.random() * 2, alpha: 0.03 + Math.random() * 0.08 });
}

// Scrolling code rain
let codeDrops = [];
for (let i = 0; i < 30; i++) {
    codeDrops.push({
        x: Math.random() * 2000, y: Math.random() * 2000,
        speed: 30 + Math.random() * 80, char: String.fromCharCode(0x30A0 + Math.random() * 96),
        alpha: 0.05 + Math.random() * 0.1, size: 10 + Math.random() * 14
    });
}

function getTotalLanes() { return fourLaneMode ? 4 : 3; }

function getLaneY(slot) {
    const total = getTotalLanes();
    const laneH = H / (total + 1);
    return laneH * (slot + 1);
}

function getLaneHeight() {
    const total = getTotalLanes();
    return H / (total + 1) * 0.6;
}

function spawnGate() {
    const total = getTotalLanes();
    const lane = Math.floor(Math.random() * total);
    const isGlitch = Math.random() < 0.12 + difficulty * 0.01;
    const color = isGlitch ? -1 : Math.floor(Math.random() * 3);
    gates.push({
        x: W + 60,
        lane,
        color,
        width: 40 + Math.random() * 20,
        passed: false
    });
}

function createMatchEffect(x, y, color) {
    for (let i = 0; i < 15; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 4;
        matchParticles.push({
            x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            life: 1, color: COLORS[color].fill, radius: 2 + Math.random() * 4
        });
    }
}

function createCrashEffect(x, y) {
    for (let i = 0; i < 30; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 3 + Math.random() * 8;
        particles.push({
            x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            life: 1, color: ['#ff0044', '#ff6600', '#ffaa00', '#fff', '#ff2266'][Math.floor(Math.random() * 5)],
            radius: 2 + Math.random() * 6
        });
    }
}

function triggerScramble() {
    playScramble();
    scrambleAnim = 40;
    screenShake = 25;
    const total = getTotalLanes();
    for (let i = total - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [laneOrder[i], laneOrder[j]] = [laneOrder[j], laneOrder[i]];
    }
}

// --- Input ---
let touchStartX = 0, touchStartY = 0;

function switchLane(dir) {
    const total = getTotalLanes();
    playerLane = Math.max(0, Math.min(total - 1, playerLane + dir));
    playerTargetY = getLaneY(playerLane);
}

function cycleColor() {
    playerColor = (playerColor + 1) % 3;
}

document.addEventListener('keydown', (e) => {
    if (!gameStarted || gameOver) return;
    if (e.key === 'ArrowUp' || e.key === 'w') switchLane(-1);
    else if (e.key === 'ArrowDown' || e.key === 's') switchLane(1);
    else if (e.key === ' ') { e.preventDefault(); cycleColor(); }
});

canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (!gameStarted || gameOver) return;
    audioCtx.resume();
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    if (!gameStarted || gameOver) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 20) cycleColor();
    else if (Math.abs(dy) > Math.abs(dx)) switchLane(dy > 0 ? 1 : -1);
    else cycleColor();
}, { passive: false });

canvas.addEventListener('mousedown', (e) => {
    if (!gameStarted || gameOver) return;
    touchStartX = e.clientX; touchStartY = e.clientY;
});
canvas.addEventListener('mouseup', (e) => {
    if (!gameStarted || gameOver) return;
    const dx = e.clientX - touchStartX;
    const dy = e.clientY - touchStartY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 20) cycleColor();
    else if (Math.abs(dy) > Math.abs(dx)) switchLane(dy > 0 ? 1 : -1);
    else cycleColor();
});

// --- Player ---
const PLAYER_X = 100;

// --- Update ---
function update() {
    frameCount++;
    elapsed++;
    scrollOffset += gateSpeed;

    difficulty = Math.min(elapsed / 3600, 5);
    gateSpeed = 3 + difficulty * 1.5;
    spawnInterval = Math.max(25, 70 - difficulty * 8);

    // 4-lane mode
    fourLaneTimer++;
    if (!fourLaneMode && fourLaneTimer >= nextFourLaneAt) {
        fourLaneMode = true;
        laneOrder = [0, 1, 2, 3];
        if (playerLane > 3) playerLane = 3;
        fourLaneTimer = 0;
        nextFourLaneAt = 800 + Math.random() * 600;
        playerTargetY = getLaneY(playerLane);
    } else if (fourLaneMode && fourLaneTimer >= 300 + Math.random() * 200) {
        fourLaneMode = false;
        laneOrder = [0, 1, 2];
        if (playerLane > 2) playerLane = 2;
        fourLaneTimer = 0;
        playerTargetY = getLaneY(playerLane);
    }

    // Scramble every ~10 seconds
    scrambleTimer++;
    if (scrambleTimer >= 600) {
        scrambleTimer = 0;
        triggerScramble();
    }

    // Spawn gates
    spawnTimer++;
    if (spawnTimer >= spawnInterval) {
        spawnTimer = 0;
        spawnGate();
        if (Math.random() < difficulty * 0.1) spawnGate();
    }

    // Smooth lane movement
    playerTargetY = getLaneY(playerLane);
    playerVisualY += (playerTargetY - playerVisualY) * 0.25;

    // Move gates & check collisions
    for (let i = gates.length - 1; i >= 0; i--) {
        const g = gates[i];
        g.x -= gateSpeed;

        if (!g.passed && g.x < PLAYER_X + 20 && g.x + g.width > PLAYER_X - 20) {
            if (g.lane === playerLane) {
                if (g.color === -1) {
                    playCrash();
                    createCrashEffect(PLAYER_X, playerVisualY);
                    screenShake = 15;
                    endGame();
                    return;
                } else if (g.color === playerColor) {
                    playPing();
                    score += 100;
                    createMatchEffect(g.x, getLaneY(g.lane), g.color);
                    g.passed = true;
                } else {
                    playCrash();
                    createCrashEffect(PLAYER_X, playerVisualY);
                    screenShake = 15;
                    endGame();
                    return;
                }
            }
        }

        if (g.x + g.width < -10) gates.splice(i, 1);
    }

    if (screenShake > 0) { screenShake *= 0.9; if (screenShake < 0.5) screenShake = 0; }
    if (scrambleAnim > 0) scrambleAnim--;

    for (let i = matchParticles.length - 1; i >= 0; i--) {
        const p = matchParticles[i];
        p.x += p.vx; p.y += p.vy; p.life -= 0.025;
        if (p.life <= 0) matchParticles.splice(i, 1);
    }
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.02;
        if (p.life <= 0) particles.splice(i, 1);
    }
    for (const d of codeDrops) {
        d.y += d.speed * 0.016;
        if (d.y > H + 20) { d.y = -20; d.x = Math.random() * W; d.char = String.fromCharCode(0x30A0 + Math.random() * 96); }
    }
}

function endGame() {
    gameOver = true;
    saveHighScore(score);
    highScore = getHighScore();
    showGameOver();
}

// --- Draw ---
function draw() {
    const shakeX = screenShake ? (Math.random() - 0.5) * screenShake * 2 : 0;
    const shakeY = screenShake ? (Math.random() - 0.5) * screenShake * 2 : 0;

    ctx.save();
    ctx.translate(shakeX, shakeY);

    // Background
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(-10, -10, W + 20, H + 20);

    // Vertical grid lines scrolling
    ctx.lineWidth = 1;
    for (const gl of gridLines) {
        const x = ((gl.x - scrollOffset * gl.speed) % (W + 200) + W + 200) % (W + 200) - 100;
        ctx.strokeStyle = `rgba(0,255,200,${gl.alpha})`;
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }

    // Horizontal grid
    for (let i = 0; i < H; i += 60) {
        ctx.strokeStyle = 'rgba(0,255,200,0.025)';
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(W, i); ctx.stroke();
    }

    // Code rain
    for (const d of codeDrops) {
        ctx.globalAlpha = d.alpha;
        ctx.fillStyle = '#0f6';
        ctx.font = `${d.size}px monospace`;
        ctx.fillText(d.char, d.x, d.y);
    }
    ctx.globalAlpha = 1;

    // Draw lanes
    const total = getTotalLanes();
    const laneH = getLaneHeight();

    for (let slot = 0; slot < total; slot++) {
        const y = getLaneY(slot);
        const laneIdx = laneOrder[slot] % 3;
        const c = COLORS[laneIdx];

        // Lane background
        ctx.fillStyle = c.dim;
        ctx.globalAlpha = 0.25;
        ctx.fillRect(0, y - laneH / 2, W, laneH);
        ctx.globalAlpha = 1;

        // Lane borders
        ctx.strokeStyle = c.fill;
        ctx.globalAlpha = 0.3;
        ctx.lineWidth = 1;
        ctx.setLineDash([8, 12]);
        ctx.beginPath(); ctx.moveTo(0, y - laneH / 2); ctx.lineTo(W, y - laneH / 2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, y + laneH / 2); ctx.lineTo(W, y + laneH / 2); ctx.stroke();
        ctx.setLineDash([]);
        ctx.globalAlpha = 1;

        // Scrolling data stream dots in lanes
        ctx.globalAlpha = 0.08;
        ctx.fillStyle = c.fill;
        for (let dx = 0; dx < W + 40; dx += 40) {
            const dotX = ((dx - scrollOffset * 1.5) % (W + 40) + W + 40) % (W + 40) - 20;
            ctx.beginPath(); ctx.arc(dotX, y, 2, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;

        // Lane label
        ctx.fillStyle = c.fill;
        ctx.globalAlpha = 0.25;
        ctx.font = 'bold 11px monospace';
        ctx.textAlign = 'right';
        ctx.fillText(`LANE ${laneOrder[slot]}`, W - 10, y + 4);
        ctx.globalAlpha = 1;
    }

    // Draw gates
    for (const g of gates) {
        if (g.passed) continue;
        const y = getLaneY(g.lane);
        const h = laneH * 0.7;

        if (g.color === -1) {
            // Glitch block
            const pulse = 0.6 + 0.4 * Math.sin(frameCount * 0.2);
            ctx.fillStyle = `rgba(255,0,0,${0.3 * pulse})`;
            ctx.fillRect(g.x - 2, y - h / 2 - 2, g.width + 4, h + 4);

            for (let px = 0; px < g.width; px += 4) {
                for (let py = 0; py < h; py += 4) {
                    const b = Math.random();
                    ctx.fillStyle = `rgba(${b > 0.5 ? 255 : 100},${b > 0.7 ? 50 : 0},${b > 0.8 ? 50 : 0},${0.5 + b * 0.5})`;
                    ctx.fillRect(g.x + px, y - h / 2 + py, 3, 3);
                }
            }

            ctx.fillStyle = '#ff0044';
            ctx.font = 'bold 11px monospace';
            ctx.textAlign = 'center';
            ctx.globalAlpha = pulse;
            ctx.fillText('GLITCH', g.x + g.width / 2, y + 4);
            ctx.globalAlpha = 1;
        } else {
            const c = COLORS[g.color];

            // Glow
            ctx.shadowColor = c.fill;
            ctx.shadowBlur = 15;

            // Body
            ctx.fillStyle = c.fill;
            ctx.globalAlpha = 0.8;
            ctx.fillRect(g.x, y - h / 2, g.width, h);

            // Highlight
            ctx.fillStyle = '#fff';
            ctx.globalAlpha = 0.15;
            ctx.fillRect(g.x + 3, y - h / 2 + 3, g.width - 6, h / 3);

            // Border
            ctx.globalAlpha = 1;
            ctx.strokeStyle = c.fill;
            ctx.lineWidth = 2;
            ctx.strokeRect(g.x, y - h / 2, g.width, h);

            // Letter
            ctx.fillStyle = '#fff';
            ctx.globalAlpha = 0.9;
            ctx.font = 'bold 16px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(['R', 'B', 'G'][g.color], g.x + g.width / 2, y + 6);
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }
    }

    // Draw player
    const py = playerVisualY;
    const pc = COLORS[playerColor];
    const pulse = 0.8 + 0.2 * Math.sin(frameCount * 0.1);
    const sz = 22;

    // Glow
    const glowGrad = ctx.createRadialGradient(PLAYER_X, py, sz * 0.3, PLAYER_X, py, sz * 2.5);
    glowGrad.addColorStop(0, pc.glow);
    glowGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = glowGrad;
    ctx.fillRect(PLAYER_X - sz * 3, py - sz * 3, sz * 6, sz * 6);

    // Trail
    for (let t = 1; t <= 5; t++) {
        ctx.globalAlpha = 0.12 - t * 0.02;
        ctx.fillStyle = pc.fill;
        ctx.beginPath(); ctx.arc(PLAYER_X - t * 14, py, sz - t * 2, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Body
    ctx.save();
    ctx.translate(PLAYER_X, py);
    ctx.rotate(Math.sin(frameCount * 0.05) * 0.08);

    // Outer ring
    ctx.strokeStyle = pc.fill;
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.4 * pulse;
    ctx.beginPath(); ctx.arc(0, 0, sz + 6, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 1;

    // Rounded square body
    ctx.shadowColor = pc.fill;
    ctx.shadowBlur = 20;
    ctx.fillStyle = pc.fill;
    const r = 6;
    ctx.beginPath();
    ctx.moveTo(-sz + r, -sz);
    ctx.lineTo(sz - r, -sz);   ctx.quadraticCurveTo(sz, -sz, sz, -sz + r);
    ctx.lineTo(sz, sz - r);    ctx.quadraticCurveTo(sz, sz, sz - r, sz);
    ctx.lineTo(-sz + r, sz);   ctx.quadraticCurveTo(-sz, sz, -sz, sz - r);
    ctx.lineTo(-sz, -sz + r);  ctx.quadraticCurveTo(-sz, -sz, -sz + r, -sz);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;

    // Inner highlight
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(-sz + 4, -sz + 4, (sz - 4) * 2, sz * 0.6);

    // Color letter
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(['R', 'B', 'G'][playerColor], 0, 1);

    ctx.restore();

    // Match particles
    for (const p of matchParticles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.radius * p.life, 0, Math.PI * 2); ctx.fill();
    }

    // Crash particles
    for (const p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Scramble warning
    if (scrambleAnim > 0) {
        ctx.fillStyle = `rgba(255,255,0,${scrambleAnim / 40 * 0.6})`;
        ctx.font = `bold ${40 + (40 - scrambleAnim)}px monospace`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('ROUTE SCRAMBLE!', W / 2, H / 2);
    }

    // 4-lane indicator
    if (fourLaneMode && Math.sin(frameCount * 0.15) > 0) {
        ctx.fillStyle = 'rgba(255,100,0,0.6)';
        ctx.font = 'bold 14px monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText('4-LANE MODE', W / 2, 50);
    }

    // HUD
    ctx.textBaseline = 'top';
    ctx.textAlign = 'right';
    ctx.fillStyle = '#0ff';
    ctx.font = 'bold 24px monospace';
    ctx.fillText(`${score}`, W - 16, 14);
    ctx.fillStyle = 'rgba(0,255,200,0.5)';
    ctx.font = '14px monospace';
    ctx.fillText(`BEST: ${highScore}`, W - 16, 42);

    // Current color (top center)
    ctx.textAlign = 'center';
    ctx.fillStyle = pc.fill;
    ctx.font = 'bold 16px monospace';
    ctx.shadowColor = pc.fill; ctx.shadowBlur = 10;
    ctx.fillText(`[ ${pc.name.toUpperCase()} ]`, W / 2, 14);
    ctx.shadowBlur = 0;

    // Scramble timer bar
    const scramblePct = scrambleTimer / 600;
    ctx.fillStyle = 'rgba(255,255,0,0.15)';
    ctx.fillRect(0, H - 3, W * scramblePct, 3);
    if (scramblePct > 0.8) {
        ctx.fillStyle = `rgba(255,255,0,${0.3 + 0.3 * Math.sin(frameCount * 0.3)})`;
        ctx.fillRect(0, H - 3, W * scramblePct, 3);
    }

    ctx.restore();
}

function showGameOver() {
    cancelAnimationFrame(animFrame);
    draw();

    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);

    // Scanlines
    for (let y = 0; y < H; y += 4) {
        ctx.fillStyle = `rgba(255,0,0,${0.02 + Math.random() * 0.03})`;
        ctx.fillRect(0, y, W, 2);
    }

    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

    ctx.fillStyle = '#ff2255';
    ctx.font = 'bold 48px monospace';
    ctx.shadowColor = '#ff2255'; ctx.shadowBlur = 30;
    ctx.fillText('CONNECTION LOST', W / 2, H / 2 - 60);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#0ff';
    ctx.font = 'bold 32px monospace';
    ctx.fillText(`SCORE: ${score}`, W / 2, H / 2);

    const isNewBest = score >= highScore && score > 0;
    ctx.fillStyle = isNewBest ? '#ffd700' : 'rgba(0,255,200,0.7)';
    ctx.font = '20px monospace';
    ctx.fillText(isNewBest ? `NEW BEST: ${highScore}!` : `BEST: ${highScore}`, W / 2, H / 2 + 40);

    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '18px monospace';
    ctx.fillText('TAP TO RECONNECT', W / 2, H / 2 + 85);

    setTimeout(() => {
        function restart(e) {
            e.preventDefault();
            canvas.removeEventListener('click', restart);
            canvas.removeEventListener('touchstart', restart);
            resetGame();
        }
        canvas.addEventListener('click', restart);
        canvas.addEventListener('touchstart', restart, { passive: false });
    }, 500);
}

function gameLoop() {
    if (gameOver) return;
    update();
    draw();
    animFrame = requestAnimationFrame(gameLoop);
}

function resetGame() {
    score = 0;
    highScore = getHighScore();
    playerLane = 1;
    playerColor = 0;
    gates = [];
    gateSpeed = 3;
    spawnTimer = 0;
    elapsed = 0;
    scrambleTimer = 0;
    scrambleAnim = 0;
    screenShake = 0;
    particles = [];
    matchParticles = [];
    frameCount = 0;
    difficulty = 0;
    gameOver = false;
    fourLaneMode = false;
    fourLaneTimer = 0;
    nextFourLaneAt = 600;
    laneOrder = [0, 1, 2];
    playerVisualY = getLaneY(1);
    playerTargetY = playerVisualY;
    gameLoop();
}

startBtn.addEventListener('click', () => {
    audioCtx.resume();
    overlay.classList.add('hidden');
    gameStarted = true;
    resetGame();
});

// Initial draw
ctx.fillStyle = '#0a0a1a';
ctx.fillRect(0, 0, W, H);
</script>
</body>
</html>
