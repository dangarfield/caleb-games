<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="../../favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<title>Connection - Caleb's Arcade</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a2e; overflow:hidden; touch-action:none; font-family:'Segoe UI',system-ui,sans-serif; }
canvas { display:block; width:100%; height:100%; }
#backBtn{position:fixed;top:12px;left:12px;z-index:9999;background:rgba(0,0,0,0.55);color:#fff;text-decoration:none;padding:6px 18px;border-radius:20px;font:bold 15px/1.4 'Segoe UI',system-ui,sans-serif;border:1px solid rgba(255,255,255,0.18);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);transition:background 0.2s}
#backBtn:hover{background:rgba(0,0,0,0.75)}
#overlay { position:fixed; inset:0; z-index:20; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.7); color:#fff; text-align:center; }
#overlay h1 { font-size:clamp(2rem,8vw,4rem); margin-bottom:0.5rem; text-shadow:0 0 30px rgba(0,229,255,0.5); }
#overlay .sub { font-size:clamp(1rem,3vw,1.4rem); color:#a0c4ff; margin-bottom:1rem; }
#overlay .info { font-size:clamp(0.85rem,2.5vw,1.1rem); color:rgba(255,255,255,0.7); margin-bottom:2rem; max-width:500px; padding:0 1rem; line-height:1.5; }
#overlay button { padding:14px 40px; font-size:1.3rem; border:none; border-radius:12px; background:linear-gradient(135deg,#6c5ce7,#a29bfe); color:#fff; cursor:pointer; font-weight:700; box-shadow:0 4px 20px rgba(108,92,231,0.4); transition:transform 0.15s; }
#overlay button:hover { transform:scale(1.05); }
#overlay button:active { transform:scale(0.95); }
#tutorialArea { display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:1.5rem; flex-wrap:wrap; max-width:420px; }
.tut-row { display:flex; align-items:center; gap:6px; }
.tut-shape { width:48px; height:48px; display:flex; align-items:center; justify-content:center; font-size:2rem; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:8px; }
.tut-arrow { color:rgba(255,255,255,0.3); font-size:1.6rem; }
.tut-label { color:rgba(255,255,255,0.5); font-size:1rem; margin-top:10px; width:100%; text-align:center; }
.hidden { display:none !important; }
</style>
</head>
<body>
<a id="backBtn" href="../../index.html">&larr; Games</a>
<canvas id="c"></canvas>
<div id="overlay">
  <h1>Connection</h1>
  <div class="sub">Trace the shapes!</div>
  <div class="info" id="tutorialArea"></div>
  <button id="startBtn">Play</button>
  <div id="bestScore" style="margin-top:12px;font-size:0.9rem;color:rgba(255,255,255,0.4)"></div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');

let W = innerWidth, H = innerHeight;
canvas.width = W; canvas.height = H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; if (state === 'playing' || state === 'gameover') computeLayout(); }

// --- Constants ---
const SHAPES = ['triangle', 'square', 'cross', 'circle'];
const SHAPE_COLORS = { triangle:'#00e5ff', square:'#39ff14', cross:'#ff2d55', circle:'#bf5af2' };
const SHAPE_GLOW   = { triangle:'#00e5ff', square:'#39ff14', cross:'#ff2d55', circle:'#bf5af2' };

const GRID_COLS = 4, GRID_ROWS = 3;
const LEVEL_UP_EVERY = 25; // increase target count every N correct answers
const STORAGE_KEY = 'connection';

// --- Audio ---
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playTone(freq, dur, type, vol, endFreq) {
  const c = ensureAudio(), t = c.currentTime;
  const o = c.createOscillator(), g = c.createGain();
  o.type = type||'sine'; o.frequency.setValueAtTime(freq,t);
  if (endFreq) o.frequency.exponentialRampToValueAtTime(Math.max(endFreq,20),t+dur);
  g.gain.setValueAtTime(vol||0.1,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g); g.connect(c.destination); o.start(t); o.stop(t+dur);
}
// Ascending scale as you drag: C5, E5, G5, C6, E6, G6
const DRAG_NOTES = [523, 659, 784, 1047, 1319, 1568];
function sfxSelect(step) { const f = DRAG_NOTES[Math.min(step||0, DRAG_NOTES.length-1)]; playTone(f,0.1,'sine',0.08); }
function sfxDeselect() { playTone(400,0.06,'sine',0.06,300); }
function sfxCorrect() {
  const c = ensureAudio(), t = c.currentTime;
  [523,659,784,1047].forEach((f,i) => {
    const o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination); o.type='sine';
    o.frequency.setValueAtTime(f,t+i*0.07);
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.08,t+i*0.07);
    g.gain.exponentialRampToValueAtTime(0.001,t+i*0.07+0.15);
    o.start(t+i*0.07); o.stop(t+i*0.07+0.2);
  });
}
function sfxWrong() {
  playTone(200,0.3,'sawtooth',0.08,100);
  playTone(150,0.25,'square',0.04,80);
}
function sfxGameOver() {
  const c = ensureAudio(), t = c.currentTime;
  [440,370,311,233].forEach((f,i) => {
    const o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination); o.type='triangle';
    o.frequency.setValueAtTime(f,t+i*0.15);
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.1,t+i*0.15);
    g.gain.exponentialRampToValueAtTime(0.001,t+i*0.15+0.25);
    o.start(t+i*0.15); o.stop(t+i*0.15+0.3);
  });
}

// --- Storage ---
function loadArcadeData() { try { return JSON.parse(localStorage.getItem('calebArcadeData'))||{}; } catch(e) { return {}; } }
function saveArcadeData(d) { localStorage.setItem('calebArcadeData', JSON.stringify(d)); }
function getHighScore(key) { const d = loadArcadeData(); return (d[key] && d[key].highScore)||0; }
function setHighScore(key, val) { const d = loadArcadeData(); if (!d[key]) d[key]={}; d[key].highScore=val; saveArcadeData(d); }

// --- Easing ---
function easeOutCubic(t) { return 1-Math.pow(1-t,3); }
function easeOutBounce(t) {
  if (t<1/2.75) return 7.5625*t*t;
  if (t<2/2.75) return 7.5625*(t-=1.5/2.75)*t+0.75;
  if (t<2.5/2.75) return 7.5625*(t-=2.25/2.75)*t+0.9375;
  return 7.5625*(t-=2.625/2.75)*t+0.984375;
}
function easeOutBack(t) { const c=1.70158; return 1+(c+1)*Math.pow(t-1,3)+c*Math.pow(t-1,2); }

// --- Stars ---
const stars = [];
for (let i=0;i<100;i++) stars.push({ x:Math.random(), y:Math.random(), r:Math.random()*1.5+0.5, tw:Math.random()*Math.PI*2 });

// --- Particles ---
let particles = [];
function spawnParticles(x,y,color,count,speedMult) {
  const sm = speedMult||1;
  for (let i=0;i<count;i++) {
    const a = Math.random()*Math.PI*2, spd = (1+Math.random()*3)*sm;
    particles.push({ x, y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd, life:1, decay:0.015+Math.random()*0.02, color, r:2+Math.random()*5 });
  }
}

// --- Game State ---
let state = 'menu'; // menu, playing, gameover
window.addEventListener('resize', resize);
let grid = [];       // grid[row][col] = cell
let target = [];     // array of shape names
let selectedCells = [];
let score = 0;
let highScore = 0;
let matchCount = 3;  // current target length, increases over time
let timer = 1;       // 0..1
let ticks = 0;
let inputLocked = false;

// Layout
let cellSize = 80;
let cellGap = 10;
let gridOriginX = 0, gridOriginY = 0;
let scoreY = 0, targetY = 0, timerY = 0;
let targetShapeSize = 0;
let giveUpX = 0, giveUpY = 0, giveUpW = 0, giveUpH = 0;

// Animation state
let screenShake = 0;
let scorePop = 0;        // 0..1 pop animation
let correctFlash = 0;    // 0..1
let wrongFlash = 0;      // 0..1
let targetExitT = 0;    // 0..1 exit animation for old target
let targetEnterT = 1;   // 0..1 enter animation for new target
let oldTarget = [];      // previous target for exit animation
let gameOverAlpha = 0;
let gameOverT = 0;
let levelUpT = 0;       // 0 = inactive, >0 = ticks remaining for level-up flash
let levelUpCount = 0;    // the new matchCount to display

// Per-cell animation
function makeCell(shape) {
  return {
    shape: shape || SHAPES[Math.floor(Math.random()*SHAPES.length)],
    selected: false,
    offsetY: 0,      // pixel offset for fall animation
    scale: 1,
    alpha: 1,
    glowT: 0,        // glow pulse timer
    shakeX: 0,
    removing: false,
    enterT: 0,       // 0..1 enter animation
    entered: false,
  };
}

// --- Layout ---
function computeLayout() {
  const pad = 16;
  const scoreH = 55;
  const targetH = 70;
  const timerH = 24;
  const nfH = 56;
  const topSpace = scoreH + targetH + timerH + pad*3;
  const botSpace = nfH + pad*3;
  const availH = H - topSpace - botSpace;
  const availW = W - pad*2;
  const maxCellW = (availW - (GRID_COLS-1)*cellGap) / GRID_COLS;
  const maxCellH = (availH - (GRID_ROWS-1)*cellGap) / GRID_ROWS;
  cellSize = Math.min(maxCellW, maxCellH, 110);
  cellGap = Math.max(8, cellSize * 0.12);
  const gridW = GRID_COLS*cellSize + (GRID_COLS-1)*cellGap;
  const gridH = GRID_ROWS*cellSize + (GRID_ROWS-1)*cellGap;
  gridOriginX = (W - gridW) / 2;
  gridOriginY = topSpace + (availH - gridH) / 2;
  scoreY = pad + 10;
  targetY = scoreY + scoreH;
  targetShapeSize = Math.min(cellSize*0.7, 50);
  timerY = targetY + targetH;
  // Give up button — top right
  giveUpW = 70; giveUpH = 30;
  giveUpX = W - giveUpW - 14;
  giveUpY = 14;
}

// --- Grid Management ---
function initGrid() {
  grid = [];
  for (let r=0; r<GRID_ROWS; r++) {
    grid[r] = [];
    for (let c=0; c<GRID_COLS; c++) {
      // Each column gets one shape (cycles through SHAPES)
      const shape = SHAPES[c % SHAPES.length];
      const cell = makeCell(shape);
      cell.entered = true;
      cell.enterT = 1;
      grid[r][c] = cell;
    }
  }
}

function generateTarget() {
  oldTarget = [...target];
  targetExitT = oldTarget.length > 0 ? 0 : 1;
  targetEnterT = 0;
  target = [];
  // Generate a target that is always findable via DFS path in the grid
  for (let attempts = 0; attempts < 100; attempts++) {
    const candidate = [];
    for (let i = 0; i < matchCount; i++) candidate.push(SHAPES[Math.floor(Math.random()*SHAPES.length)]);
    if (canFindPath(candidate)) { target = candidate; return; }
  }
  // Fallback: pick an actual path from the grid
  target = pickPathFromGrid();
}

function canFindPath(seq) {
  const rows = GRID_ROWS, cols = GRID_COLS;
  const visited = Array.from({length:rows}, () => Array(cols).fill(false));
  const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
  function dfs(idx, r, c) {
    if (idx === seq.length) return true;
    if (r<0||r>=rows||c<0||c>=cols) return false;
    if (visited[r][c]) return false;
    if (grid[r][c].removing) return false;
    if (grid[r][c].shape !== seq[idx]) return false;
    visited[r][c] = true;
    for (const [dr,dc] of dirs) { if (dfs(idx+1, r+dr, c+dc)) { visited[r][c]=false; return true; } }
    visited[r][c] = false;
    return false;
  }
  for (let r=0;r<rows;r++) for (let c=0;c<cols;c++) { if (dfs(0,r,c)) return true; }
  return false;
}

function pickPathFromGrid() {
  // Walk a random orthogonal path through the grid
  const rows = GRID_ROWS, cols = GRID_COLS;
  const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
  const startR = Math.floor(Math.random()*rows), startC = Math.floor(Math.random()*cols);
  const path = [grid[startR][startC].shape];
  const visited = Array.from({length:rows}, () => Array(cols).fill(false));
  visited[startR][startC] = true;
  let r = startR, c = startC;
  while (path.length < matchCount) {
    const neighbors = dirs.map(([dr,dc])=>[r+dr,c+dc]).filter(([nr,nc])=>nr>=0&&nr<rows&&nc>=0&&nc<cols&&!visited[nr][nc]&&!grid[nr][nc].removing);
    if (neighbors.length === 0) break;
    const [nr,nc] = neighbors[Math.floor(Math.random()*neighbors.length)];
    visited[nr][nc] = true;
    path.push(grid[nr][nc].shape);
    r = nr; c = nc;
  }
  return path;
}

function cellPos(row, col) {
  return {
    x: gridOriginX + col*(cellSize+cellGap) + cellSize/2,
    y: gridOriginY + row*(cellSize+cellGap) + cellSize/2,
  };
}

function collapseColumns() {
  for (let c=0; c<GRID_COLS; c++) {
    const survivors = [];
    for (let r=0; r<GRID_ROWS; r++) {
      if (!grid[r][c].removing) survivors.push({ cell:grid[r][c], fromRow:r });
    }
    const newCount = GRID_ROWS - survivors.length;
    // Place survivors at bottom
    for (let i=0; i<survivors.length; i++) {
      const targetRow = newCount + i;
      const { cell, fromRow } = survivors[i];
      cell.offsetY = (fromRow - targetRow) * (cellSize + cellGap);
      cell.selected = false;
      cell.removing = false;
      grid[targetRow][c] = cell;
    }
    // New cells at top
    for (let i=0; i<newCount; i++) {
      const cell = makeCell();
      cell.offsetY = -(newCount - i) * (cellSize + cellGap) - cellSize;
      cell.entered = false;
      cell.enterT = 0;
      grid[i][c] = cell;
    }
  }
}

// --- Game Flow ---
function startGame() {
  ensureAudio();
  highScore = getHighScore(STORAGE_KEY);
  score = 0;
  matchCount = 3;
  timer = 1;
  ticks = 0;
  inputLocked = false;
  screenShake = 0;
  scorePop = 0;
  correctFlash = 0;
  wrongFlash = 0;
  gameOverAlpha = 0;
  gameOverT = 0;
  levelUpT = 0;
  particles = [];
  selectedCells = [];
  state = 'playing';
  overlay.classList.add('hidden');
  computeLayout();
  initGrid();
  generateTarget();
}

function onCorrect() {
  inputLocked = true;
  sfxCorrect();
  score++;
  scorePop = 1;
  correctFlash = 1;
  timer = Math.min(1, timer + 0.12);

  // Mark selected cells for removal and spawn particles
  for (const sc of selectedCells) {
    const cell = grid[sc.row][sc.col];
    cell.removing = true;
    const pos = cellPos(sc.row, sc.col);
    spawnParticles(pos.x, pos.y + cell.offsetY, SHAPE_COLORS[cell.shape], 12, 1.5);
    spawnParticles(pos.x, pos.y + cell.offsetY, '#fff', 6, 2);
  }
  selectedCells = [];

  // Level up: increase target count every LEVEL_UP_EVERY correct answers, max 6
  const newCount = Math.min(6, 3 + Math.floor(score / LEVEL_UP_EVERY));
  if (newCount > matchCount) {
    matchCount = newCount;
    levelUpT = 120; // ~2 seconds
    levelUpCount = newCount;
    // Level-up fanfare
    const c2 = ensureAudio(), t2 = c2.currentTime;
    [523,659,784,1047,1319].forEach((f,i) => {
      const o = c2.createOscillator(), g = c2.createGain();
      o.connect(g); g.connect(c2.destination); o.type='triangle';
      o.frequency.setValueAtTime(f, t2+i*0.08);
      g.gain.setValueAtTime(0, t2); g.gain.linearRampToValueAtTime(0.1, t2+i*0.08);
      g.gain.exponentialRampToValueAtTime(0.001, t2+i*0.08+0.2);
      o.start(t2+i*0.08); o.stop(t2+i*0.08+0.25);
    });
  }

  // Collapse grid immediately so the new target validates against the real grid
  collapseColumns();
  generateTarget();
  setTimeout(() => {
    inputLocked = false;
  }, 250);
}

function onWrong() {
  inputLocked = true;
  sfxWrong();
  wrongFlash = 1;
  screenShake = 12;
  timer = Math.max(0, timer - 0.06);

  // Flash selected cells
  for (const sc of selectedCells) {
    grid[sc.row][sc.col].shakeX = 10;
  }

  setTimeout(() => {
    for (const sc of selectedCells) {
      if (grid[sc.row] && grid[sc.row][sc.col]) {
        grid[sc.row][sc.col].selected = false;
        grid[sc.row][sc.col].shakeX = 0;
      }
    }
    selectedCells = [];
    inputLocked = false;
  }, 400);
}


function triggerGameOver() {
  state = 'gameover';
  sfxGameOver();
  if (score > highScore) { highScore = score; setHighScore(STORAGE_KEY, highScore); }
  gameOverAlpha = 0;
  gameOverT = 0;
}

function showMenu() {
  state = 'menu';
  overlay.classList.remove('hidden');
  buildMenu();
}

// --- Input (drag-based) ---
let dragging = false;
let dragPointer = { x:0, y:0 }; // current finger/mouse position for line drawing

function hitTestCell(px, py) {
  if (state !== 'playing') return null;
  for (let r=0; r<GRID_ROWS; r++) {
    for (let c=0; c<GRID_COLS; c++) {
      const cell = grid[r][c];
      const cx = gridOriginX + c*(cellSize+cellGap) + cellSize/2;
      const cy = gridOriginY + r*(cellSize+cellGap) + cellSize/2 + cell.offsetY;
      const half = cellSize/2;
      if (px >= cx-half && px <= cx+half && py >= cy-half && py <= cy+half) {
        return { row:r, col:c };
      }
    }
  }
  return null;
}


function isAdjacent(a, b) {
  return Math.abs(a.row-b.row) + Math.abs(a.col-b.col) === 1;
}

function isInPath(row, col) {
  return selectedCells.some(s => s.row===row && s.col===col);
}

function clearSelection() {
  for (const sc of selectedCells) {
    if (grid[sc.row] && grid[sc.row][sc.col]) {
      grid[sc.row][sc.col].selected = false;
      grid[sc.row][sc.col].shakeX = 0;
    }
  }
  selectedCells = [];
}

// Returns 'ok', 'wrong', or 'skip' (not adjacent, already in path, etc.)
function addToPath(row, col) {
  const cell = grid[row][col];
  if (cell.removing || isInPath(row, col)) return 'skip';
  if (selectedCells.length > 0 && !isAdjacent(selectedCells[selectedCells.length-1], {row,col})) return 'skip';
  if (selectedCells.length >= matchCount) return 'skip';
  // Check shape matches next target
  const expectedShape = target[selectedCells.length];
  if (cell.shape !== expectedShape) {
    // Wrong shape — crash immediately
    cell.shakeX = 10;
    const pos = cellPos(row, col);
    spawnParticles(pos.x, pos.y + cell.offsetY, '#ff2d55', 8, 1.5);
    return 'wrong';
  }
  sfxSelect(selectedCells.length);
  cell.selected = true;
  cell.glowT = 0;
  selectedCells.push({ row, col });
  return 'ok';
}

function evaluatePath() {
  if (selectedCells.length !== matchCount) {
    clearSelection();
    return;
  }
  // All shapes were verified per-step, so if we got here it's correct
  onCorrect();
}

// Allow backtracking: if you drag back to the second-to-last cell, undo the last selection
function tryBacktrack(row, col) {
  if (selectedCells.length >= 2) {
    const prev = selectedCells[selectedCells.length - 2];
    if (prev.row === row && prev.col === col) {
      const removed = selectedCells.pop();
      grid[removed.row][removed.col].selected = false;
      sfxDeselect();
      return true;
    }
  }
  return false;
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  const px = e.clientX, py = e.clientY;

  if (state === 'gameover') {
    if (gameOverT > 60) showMenu();
    return;
  }
  if (state !== 'playing' || inputLocked) return;

  // Give up button — back to mode select
  if (hitTestGiveUp(px, py)) {
    if (score > highScore) { highScore = score; setHighScore(STORAGE_KEY, highScore); }
    showMenu();
    return;
  }

  // Start drag on a cell
  const hit = hitTestCell(px, py);
  if (!hit) return;
  dragging = true;
  dragPointer = { x:px, y:py };
  clearSelection();
  const result = addToPath(hit.row, hit.col);
  if (result === 'wrong') {
    dragging = false;
    sfxWrong();
    wrongFlash = 1;
    screenShake = 8;
    timer = Math.max(0, timer - 0.04);
  }
});

canvas.addEventListener('pointermove', e => {
  if (!dragging) return;
  e.preventDefault();
  const px = e.clientX, py = e.clientY;
  dragPointer = { x:px, y:py };

  const hit = hitTestCell(px, py);
  if (!hit) return;

  // Backtrack support
  if (isInPath(hit.row, hit.col)) {
    tryBacktrack(hit.row, hit.col);
    return;
  }

  const result = addToPath(hit.row, hit.col);
  if (result === 'wrong') {
    // Crash — end drag, penalize, clear
    dragging = false;
    sfxWrong();
    wrongFlash = 1;
    screenShake = 8;
    timer = Math.max(0, timer - 0.04);
    setTimeout(() => clearSelection(), 250);
    return;
  }

  // Auto-evaluate when path reaches target length
  if (selectedCells.length === matchCount) {
    dragging = false;
    evaluatePath();
  }
});

canvas.addEventListener('pointerup', e => {
  if (!dragging) return;
  dragging = false;
  if (selectedCells.length === matchCount) {
    evaluatePath();
  } else if (selectedCells.length > 0) {
    // Incomplete path — clear with brief flash
    clearSelection();
  }
});

canvas.addEventListener('pointercancel', () => {
  dragging = false;
  clearSelection();
});

// --- Menu Demo Animation ---
let demoShapes = [];
function initDemo() {
  demoShapes = [];
  for (let i=0;i<20;i++) {
    demoShapes.push({
      x: Math.random()*W, y: Math.random()*H,
      vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5,
      shape: SHAPES[Math.floor(Math.random()*4)],
      size: 20+Math.random()*30,
      rot: Math.random()*Math.PI*2,
      rotSpeed: (Math.random()-0.5)*0.01,
      alpha: 0.15+Math.random()*0.15,
    });
  }
}
initDemo();

// --- Update ---
function update() {
  ticks++;

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.vx *= 0.98; p.life -= p.decay;
    return p.life > 0;
  });

  if (state === 'menu') {
    // Animate demo shapes
    for (const s of demoShapes) {
      s.x += s.vx; s.y += s.vy; s.rot += s.rotSpeed;
      if (s.x<-50) s.x=W+50; if (s.x>W+50) s.x=-50;
      if (s.y<-50) s.y=H+50; if (s.y>H+50) s.y=-50;
    }
    return;
  }

  if (state === 'playing') {
    // Timer drain (speed up with score)
    const drainRate = 0.0008 + score * 0.000012;
    timer -= drainRate;
    if (timer <= 0) { timer = 0; triggerGameOver(); return; }

    // Cell animations
    for (let r=0;r<GRID_ROWS;r++) for (let c=0;c<GRID_COLS;c++) {
      const cell = grid[r][c];
      // Fall animation
      if (Math.abs(cell.offsetY) > 0.5) {
        cell.offsetY *= 0.82; // smooth ease
        if (Math.abs(cell.offsetY) < 1) cell.offsetY = 0;
      } else {
        cell.offsetY = 0;
      }
      // Enter animation
      if (!cell.entered) {
        cell.enterT += 0.04;
        if (cell.enterT >= 1) { cell.enterT = 1; cell.entered = true; }
      }
      // Glow pulse for selected
      if (cell.selected) cell.glowT += 0.08;
      // Shake decay
      if (cell.shakeX > 0) cell.shakeX *= 0.85;
      if (cell.shakeX < 0.5) cell.shakeX = 0;
    }

    // Screen shake decay
    if (screenShake > 0) { screenShake *= 0.88; if (screenShake < 0.5) screenShake = 0; }

    // Flash decays
    if (scorePop > 0) scorePop = Math.max(0, scorePop - 0.04);
    if (correctFlash > 0) correctFlash = Math.max(0, correctFlash - 0.03);
    if (wrongFlash > 0) wrongFlash = Math.max(0, wrongFlash - 0.04);
    // Target transition
    if (targetExitT < 1) { targetExitT = Math.min(1, targetExitT + 0.08); }
    if (targetExitT >= 0.4 && targetEnterT < 1) { targetEnterT = Math.min(1, targetEnterT + 0.07); }
    // Level up notification
    if (levelUpT > 0) levelUpT--;
  }

  if (state === 'gameover') {
    gameOverT++;
    gameOverAlpha = Math.min(0.75, gameOverAlpha + 0.015);
  }
}

// --- Draw ---
function drawStars() {
  const time = ticks * 0.008;
  for (const s of stars) {
    const tw = Math.sin(time*2 + s.tw)*0.3 + 0.7;
    ctx.globalAlpha = tw * 0.5;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawBackground() {
  const bg = ctx.createLinearGradient(0,0,W*0.3,H);
  bg.addColorStop(0,'#1a1a2e'); bg.addColorStop(0.5,'#16213e'); bg.addColorStop(1,'#0f3460');
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
  drawStars();
}

function drawShape(x, y, size, shape, color, alpha) {
  ctx.globalAlpha = alpha === undefined ? 1 : alpha;
  ctx.fillStyle = color;
  ctx.strokeStyle = color;
  const s = size * 0.42;
  switch(shape) {
    case 'triangle':
      ctx.beginPath();
      ctx.moveTo(x, y - s*1.1);
      ctx.lineTo(x - s, y + s*0.7);
      ctx.lineTo(x + s, y + s*0.7);
      ctx.closePath();
      ctx.fill();
      break;
    case 'square':
      const hs = s*0.85;
      ctx.beginPath(); ctx.roundRect(x-hs, y-hs, hs*2, hs*2, 3); ctx.fill();
      break;
    case 'cross':
      ctx.lineWidth = size * 0.15;
      ctx.lineCap = 'round';
      const cs = s*0.8;
      ctx.beginPath();
      ctx.moveTo(x-cs, y-cs); ctx.lineTo(x+cs, y+cs);
      ctx.moveTo(x+cs, y-cs); ctx.lineTo(x-cs, y+cs);
      ctx.stroke();
      ctx.lineWidth = 1;
      break;
    case 'circle':
      ctx.beginPath(); ctx.arc(x, y, s*0.85, 0, Math.PI*2); ctx.fill();
      break;
  }
  ctx.globalAlpha = 1;
}

function drawCell(row, col) {
  const cell = grid[row][col];
  if (cell.removing && cell.alpha <= 0) return;

  const cx = gridOriginX + col*(cellSize+cellGap) + cellSize/2;
  const cy = gridOriginY + row*(cellSize+cellGap) + cellSize/2 + cell.offsetY;
  const half = cellSize/2;
  const enterScale = cell.entered ? 1 : easeOutBack(cell.enterT);
  const scale = enterScale * cell.scale;
  const shakeOff = cell.shakeX > 0 ? (Math.sin(ticks*1.5)*cell.shakeX) : 0;
  const dx = cx + shakeOff;

  ctx.save();
  ctx.translate(dx, cy);
  ctx.scale(scale, scale);

  // Cell background
  ctx.fillStyle = cell.selected ? 'rgba(108,92,231,0.35)' : 'rgba(255,255,255,0.06)';
  ctx.beginPath(); ctx.roundRect(-half, -half, cellSize, cellSize, 10); ctx.fill();

  // Cell border
  if (cell.selected) {
    const glow = Math.sin(cell.glowT)*0.3+0.7;
    ctx.strokeStyle = `rgba(162,155,254,${glow})`;
    ctx.lineWidth = 3;
    ctx.shadowColor = '#a29bfe'; ctx.shadowBlur = 15*glow;
  } else {
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 1.5;
  }
  ctx.beginPath(); ctx.roundRect(-half, -half, cellSize, cellSize, 10); ctx.stroke();
  ctx.shadowBlur = 0;

  // Wrong flash overlay
  if (cell.shakeX > 2) {
    ctx.fillStyle = `rgba(255,45,85,${cell.shakeX/15})`;
    ctx.beginPath(); ctx.roundRect(-half, -half, cellSize, cellSize, 10); ctx.fill();
  }

  // Draw shape
  const shapeColor = SHAPE_COLORS[cell.shape];
  ctx.shadowColor = shapeColor; ctx.shadowBlur = cell.selected ? 20 : 8;
  drawShape(0, 0, cellSize*0.8, cell.shape, shapeColor, cell.entered ? 1 : cell.enterT);
  ctx.shadowBlur = 0;

  ctx.restore();
}

function drawDragLine() {
  if (selectedCells.length < 1) return;
  ctx.save();
  ctx.lineWidth = 6;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = 'rgba(162,155,254,0.6)';
  ctx.shadowColor = '#a29bfe'; ctx.shadowBlur = 18;

  ctx.beginPath();
  for (let i=0; i<selectedCells.length; i++) {
    const sc = selectedCells[i];
    const pos = cellPos(sc.row, sc.col);
    const py = pos.y + (grid[sc.row][sc.col].offsetY || 0);
    if (i===0) ctx.moveTo(pos.x, py);
    else ctx.lineTo(pos.x, py);
  }
  // If still dragging, draw line to finger
  if (dragging && selectedCells.length < matchCount) {
    ctx.lineTo(dragPointer.x, dragPointer.y);
  }
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.restore();
}

function drawTargetShapes(shapes, baseY, alphaMultiplier, offsetY, scaleMultiplier) {
  if (!shapes || shapes.length === 0) return;
  const totalW = shapes.length * targetShapeSize + (shapes.length-1) * 12;
  const startX = (W - totalW) / 2 + targetShapeSize/2;

  for (let i=0; i<shapes.length; i++) {
    const x = startX + i*(targetShapeSize+12);
    const bob = Math.sin(ticks*0.04 + i*0.5) * 3;
    const color = SHAPE_COLORS[shapes[i]];
    const matched = shapes === target && i < selectedCells.length;
    const baseAlpha = matched ? 1 : 0.45;
    const alpha = baseAlpha * alphaMultiplier;

    ctx.save();
    ctx.translate(x, baseY + bob + (offsetY || 0));
    ctx.scale(scaleMultiplier || 1, scaleMultiplier || 1);

    if (matched) {
      ctx.shadowColor = color; ctx.shadowBlur = 20;
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.4 * alphaMultiplier;
      ctx.beginPath(); ctx.arc(0, 0, targetShapeSize*0.55, 0, Math.PI*2); ctx.stroke();
      ctx.globalAlpha = 1;
    }
    ctx.shadowColor = color; ctx.shadowBlur = matched ? 18 : 8;
    drawShape(0, 0, targetShapeSize, shapes[i], color, alpha);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

function drawTarget() {
  const y = targetY + 35;

  // Old target exiting (scale up + fade out + drift up)
  if (targetExitT < 1 && oldTarget.length > 0) {
    const t = easeOutCubic(targetExitT);
    drawTargetShapes(oldTarget, y, 1 - t, -t * 30, 1 + t * 0.3);
  }

  // New target entering (scale up from small + fade in + drift up from below)
  if (targetEnterT < 1) {
    const t = easeOutBack(targetEnterT);
    drawTargetShapes(target, y, t, (1 - t) * 25, 0.5 + t * 0.5);
  } else {
    drawTargetShapes(target, y, 1, 0, 1);
  }
}

function drawTimer() {
  const gridW = GRID_COLS*cellSize + (GRID_COLS-1)*cellGap;
  const barW = Math.min(W*0.7, gridW);
  const barH = 6;
  const barX = (W - barW) / 2;
  const y = timerY + 8;

  // Background
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.beginPath(); ctx.roundRect(barX, y, barW, barH, 3); ctx.fill();

  // Fill
  const fillW = barW * timer;
  if (fillW > 0) {
    const timerColor = timer > 0.3 ? '#fff' : (ticks%20<10 ? '#ff2d55' : '#ff6b81');
    ctx.fillStyle = timerColor;
    ctx.shadowColor = timerColor; ctx.shadowBlur = timer < 0.3 ? 10 : 4;
    ctx.beginPath(); ctx.roundRect(barX, y, fillW, barH, 3); ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Correct flash
  if (correctFlash > 0) {
    ctx.fillStyle = `rgba(57,255,20,${correctFlash*0.6})`;
    ctx.beginPath(); ctx.roundRect(barX, y, barW, barH, 3); ctx.fill();
  }
  // Wrong flash
  if (wrongFlash > 0) {
    ctx.fillStyle = `rgba(255,45,85,${wrongFlash*0.6})`;
    ctx.beginPath(); ctx.roundRect(barX, y, barW, barH, 3); ctx.fill();
  }
}

function drawScore() {
  const y = scoreY + 20;
  const popScale = 1 + scorePop * 0.3;
  ctx.save();
  ctx.translate(W/2, y);
  ctx.scale(popScale, popScale);

  ctx.font = "bold 36px 'Segoe UI',system-ui,sans-serif";
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,229,255,0.5)'; ctx.shadowBlur = 15;
  ctx.fillStyle = '#fff';
  ctx.fillText(score, 0, 0);
  ctx.shadowBlur = 0;

  ctx.restore();

  // High score
  const bestVal = Math.max(highScore, score);
  if (bestVal > 0) {
    ctx.font = "13px 'Segoe UI',system-ui,sans-serif";
    ctx.fillStyle = score > highScore && highScore > 0 ? 'rgba(255,211,42,0.5)' : 'rgba(255,255,255,0.3)';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(`Best: ${bestVal}`, W/2, y + 24);
  }
}


function drawGiveUpButton() {
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.beginPath(); ctx.roundRect(giveUpX, giveUpY, giveUpW, giveUpH, 8); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(giveUpX, giveUpY, giveUpW, giveUpH, 8); ctx.stroke();
  ctx.font = "bold 12px 'Segoe UI',system-ui,sans-serif";
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText('Give Up', giveUpX + giveUpW/2, giveUpY + giveUpH/2);
}

function hitTestGiveUp(px, py) {
  return px >= giveUpX && px <= giveUpX+giveUpW && py >= giveUpY && py <= giveUpY+giveUpH;
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.shadowColor = p.color; ctx.shadowBlur = 6*p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r*(0.5+p.life*0.5), 0, Math.PI*2); ctx.fill();
  }
  ctx.shadowBlur = 0; ctx.globalAlpha = 1;
}

function drawLevelUp() {
  if (levelUpT <= 0) return;
  const total = 120;
  const elapsed = total - levelUpT;
  // Fade in for 20 frames, hold, fade out last 30 frames
  let alpha;
  if (elapsed < 20) alpha = elapsed / 20;
  else if (levelUpT < 30) alpha = levelUpT / 30;
  else alpha = 1;

  // Pulsing glow
  const pulse = 0.8 + Math.sin(elapsed * 0.15) * 0.2;
  const scale = elapsed < 15 ? easeOutBack(elapsed / 15) : 1;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(W / 2, H * 0.22);
  ctx.scale(scale, scale);

  // Glow background pill
  const pillW = 220, pillH = 50;
  ctx.fillStyle = `rgba(108,92,231,${0.35 * pulse})`;
  ctx.shadowColor = '#a29bfe'; ctx.shadowBlur = 30 * pulse;
  ctx.beginPath(); ctx.roundRect(-pillW/2, -pillH/2, pillW, pillH, 25); ctx.fill();
  ctx.strokeStyle = `rgba(162,155,254,${0.6 * pulse})`;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(-pillW/2, -pillH/2, pillW, pillH, 25); ctx.stroke();
  ctx.shadowBlur = 0;

  // Text
  ctx.font = "bold 22px 'Segoe UI',system-ui,sans-serif";
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ffd32a';
  ctx.shadowColor = '#ffd32a'; ctx.shadowBlur = 15;
  ctx.fillText(`Level Up! → ${levelUpCount} shapes`, 0, 0);
  ctx.shadowBlur = 0;

  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawGameOver() {
  ctx.fillStyle = `rgba(0,0,0,${gameOverAlpha})`;
  ctx.fillRect(0,0,W,H);

  if (gameOverT < 20) return;
  const fadeIn = Math.min(1, (gameOverT-20)/30);
  ctx.globalAlpha = fadeIn;

  const isNewBest = score > 0 && score >= highScore;

  // Title — celebrate the score, not "game over"
  ctx.font = "bold 44px 'Segoe UI',system-ui,sans-serif";
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = isNewBest ? '#ffd32a' : '#a29bfe'; ctx.shadowBlur = 30;
  ctx.fillStyle = '#fff';
  ctx.fillText(isNewBest ? 'New Best!' : 'Times Up!', W/2, H*0.3);
  ctx.shadowBlur = 0;

  // Score
  ctx.font = "bold 52px 'Segoe UI',system-ui,sans-serif";
  ctx.fillStyle = '#ffd32a';
  ctx.shadowColor = '#ffd32a'; ctx.shadowBlur = 20;
  ctx.fillText(score, W/2, H*0.4);
  ctx.shadowBlur = 0;

  // Label
  ctx.font = "18px 'Segoe UI',system-ui,sans-serif";
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText(score === 1 ? 'match found' : 'matches found', W/2, H*0.46);

  // High score
  if (!isNewBest && highScore > 0) {
    ctx.font = "20px 'Segoe UI',system-ui,sans-serif";
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText(`Best: ${highScore}`, W/2, H*0.52);
  }

  // Play again button
  if (gameOverT > 60) {
    const btnW = 200, btnH = 50;
    const btnX = W/2 - btnW/2, btnY = H*0.6;
    const grad = ctx.createLinearGradient(btnX, btnY, btnX+btnW, btnY+btnH);
    grad.addColorStop(0,'#6c5ce7'); grad.addColorStop(1,'#a29bfe');
    ctx.fillStyle = grad;
    ctx.shadowColor = 'rgba(108,92,231,0.5)'; ctx.shadowBlur = 15;
    ctx.beginPath(); ctx.roundRect(btnX, btnY, btnW, btnH, 12); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.font = "bold 18px 'Segoe UI',system-ui,sans-serif";
    ctx.fillText('Play Again', W/2, btnY + btnH/2);
  }

  ctx.globalAlpha = 1;
}

function drawDemo() {
  for (const s of demoShapes) {
    ctx.globalAlpha = s.alpha;
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.rot);
    drawShape(0, 0, s.size, s.shape, SHAPE_COLORS[s.shape], s.alpha);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function draw() {
  drawBackground();

  if (state === 'menu') {
    drawDemo();
    return;
  }

  // Screen shake
  if (screenShake > 0.5) {
    ctx.save();
    ctx.translate((Math.random()-0.5)*screenShake*2, (Math.random()-0.5)*screenShake*2);
  }

  // Draw grid cells
  for (let r=0; r<GRID_ROWS; r++) for (let c=0; c<GRID_COLS; c++) drawCell(r, c);

  drawDragLine();
  drawParticles();
  drawTarget();
  drawTimer();
  drawScore();
  drawGiveUpButton();

  if (screenShake > 0.5) ctx.restore();

  drawLevelUp();

  // Correct flash overlay
  if (correctFlash > 0) {
    ctx.fillStyle = `rgba(57,255,20,${correctFlash*0.08})`;
    ctx.fillRect(0,0,W,H);
  }
  if (wrongFlash > 0) {
    ctx.fillStyle = `rgba(255,45,85,${wrongFlash*0.08})`;
    ctx.fillRect(0,0,W,H);
  }

  if (state === 'gameover') drawGameOver();
}

// --- Menu ---
const SHAPE_SYMBOLS = { triangle:'\u25B2', square:'\u25A0', cross:'\u2716', circle:'\u25CF' };
function buildMenu() {
  const tut = document.getElementById('tutorialArea');
  // Show a mini example: target shapes → drag through grid
  const example = ['triangle','square','cross'];
  let html = '<div class="tut-row">';
  example.forEach((s, i) => {
    if (i > 0) html += '<span class="tut-arrow">\u2192</span>';
    html += `<div class="tut-shape" style="color:${SHAPE_COLORS[s]}">${SHAPE_SYMBOLS[s]}</div>`;
  });
  html += '</div>';
  html += '<div class="tut-label">Drag through matching shapes in order</div>';
  tut.innerHTML = html;
  const hs = getHighScore(STORAGE_KEY);
  document.getElementById('bestScore').textContent = hs > 0 ? `Best: ${hs}` : '';
}
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('startBtn').addEventListener('touchend', e => { e.preventDefault(); startGame(); });
buildMenu();

// --- Game Loop ---
function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
