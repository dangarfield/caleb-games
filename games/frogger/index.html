<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Frogger</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: #1a1a2e;
  overflow: hidden;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  touch-action: none;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
#container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%; height: 100%;
  position: relative;
}
#gameCanvas {
  display: block;
  image-rendering: pixelated;
}
#backBtn {
  position: absolute;
  top: 10px; left: 10px;
  background: rgba(0,0,0,0.6);
  color: #fff;
  border: 2px solid #4CAF50;
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 16px;
  cursor: pointer;
  z-index: 100;
  text-decoration: none;
}
#backBtn:hover { background: rgba(76,175,80,0.4); }
#overlay {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.75);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
}
#overlay .box {
  background: #1a1a2e;
  border: 3px solid #4CAF50;
  border-radius: 16px;
  padding: 30px;
  max-width: 420px;
  text-align: center;
  color: #e0e0e0;
}
#overlay .box h2 { color: #4CAF50; margin-bottom: 12px; font-size: 28px; }
#overlay .box p { margin-bottom: 10px; font-size: 16px; line-height: 1.5; }
#overlay .box .start-btn {
  margin-top: 16px;
  background: #4CAF50;
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 14px 40px;
  font-size: 20px;
  cursor: pointer;
  font-weight: bold;
}
#overlay .box .start-btn:hover { background: #66BB6A; }
</style>
</head>
<body>
<div id="container">
  <a id="backBtn" href="../../index.html">Back to Games</a>
  <canvas id="gameCanvas"></canvas>
  <div id="overlay">
    <div class="box">
      <h2>FROGGER</h2>
      <p>Help the frog cross the road and river!</p>
      <p><b>Swipe</b> or use <b>Arrow Keys</b> to hop.</p>
      <p>Avoid cars and trucks on the road.</p>
      <p>Hop on logs and turtles to cross the river. Watch out -- turtles dive underwater!</p>
      <p>Fill all 5 home spots to advance to the next level!</p>
      <button class="start-btn" id="startBtn">START</button>
    </div>
  </div>
</div>
<script>
(function(){
"use strict";

var canvas = document.getElementById('gameCanvas');
var ctx = canvas.getContext('2d');
var overlay = document.getElementById('overlay');
var startBtn = document.getElementById('startBtn');

var COLS = 13;
var ROWS = 15;
var CELL = 48;
var W, H;

function resize() {
  var maxW = window.innerWidth;
  var maxH = window.innerHeight;
  CELL = Math.floor(Math.min(maxW / COLS, maxH / ROWS));
  if (CELL < 20) CELL = 20;
  W = COLS * CELL;
  H = ROWS * CELL;
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
}
resize();
window.addEventListener('resize', function() { resize(); });

// Row layout (top to bottom, row 0 = top):
// 0: home row
// 1: safe median (grass)
// 2-6: river lanes (5 lanes)
// 7: safe zone (grass)
// 8-12: road lanes (5 lanes)
// 13: safe zone (start grass)
// 14: start row

var HOME_ROW = 0;
var RIVER_START = 2;
var RIVER_END = 6;
var ROAD_START = 8;
var ROAD_END = 12;
var SAFE_ZONE_TOP = 7;
var SAFE_ZONE_MID = 1;
var START_ROW = 14;

var frog = { col: 6, row: START_ROW, px: 0, py: 0, hopAnim: 0, alive: true, riding: null, facing: 0 };
var lives = 3;
var score = 0;
var arcadeData = JSON.parse(localStorage.getItem('calebArcadeData') || '{}');
if (!arcadeData.frogger) arcadeData.frogger = {};
var highScore = parseInt(arcadeData.frogger.highScore || '0');
var level = 1;
var timer = 1;
var TIMER_DURATION = 30;
var timerStart = 0;
var homes = [false, false, false, false, false];
var gameState = 'waiting';
var deathTimer = 0;
var winTimer = 0;
var frameCount = 0;
var furthestRow = START_ROW;

function getHomeX(i) {
  var homeCols = [1, 4, 6, 9, 11];
  return homeCols[i] * CELL + CELL / 2;
}

var lanes = [];

function buildLanes() {
  lanes = [];
  var sp = 0.35 + level * 0.15;
  var extraCars = Math.min(level - 1, 4);
  var roadDefs = [
    { row: 8,  dir: -1, speed: sp * 1.0, type: 'car',   count: 2 + Math.min(extraCars, 2), len: 1.4 },
    { row: 9,  dir:  1, speed: sp * 1.3, type: 'truck', count: 1 + Math.min(extraCars, 2), len: 2.5 },
    { row: 10, dir: -1, speed: sp * 0.8, type: 'car',   count: 2 + Math.min(extraCars, 3), len: 1.2 },
    { row: 11, dir:  1, speed: sp * 1.1, type: 'car',   count: 2 + Math.min(extraCars, 2), len: 1.4 },
    { row: 12, dir: -1, speed: sp * 1.4, type: 'truck', count: 1 + Math.min(extraCars, 2), len: 2.5 }
  ];
  for (var d = 0; d < roadDefs.length; d++) {
    var def = roadDefs[d];
    var objs = [];
    var gap = W / def.count;
    for (var i = 0; i < def.count; i++) {
      objs.push({
        x: gap * i + Math.random() * gap * 0.3,
        w: CELL * def.len,
        type: def.type,
        color: def.type === 'truck' ? ['#e74c3c','#8e44ad','#d35400'][i % 3]
                                     : ['#f1c40f','#3498db','#e74c3c','#2ecc71'][i % 4]
      });
    }
    lanes.push({ row: def.row, dir: def.dir, speed: def.speed, objs: objs, kind: 'road' });
  }
  var riverDefs = [
    { row: 2, dir:  1, speed: sp * 0.7, type: 'log',    count: 3, len: 3.0 },
    { row: 3, dir: -1, speed: sp * 1.0, type: 'turtle', count: 4, len: 2.0 },
    { row: 4, dir:  1, speed: sp * 1.2, type: 'log',    count: 2, len: 4.0 },
    { row: 5, dir: -1, speed: sp * 0.6, type: 'turtle', count: 3, len: 2.0 },
    { row: 6, dir:  1, speed: sp * 0.9, type: 'log',    count: 3, len: 2.5 }
  ];
  for (var d2 = 0; d2 < riverDefs.length; d2++) {
    var rdef = riverDefs[d2];
    var robjs = [];
    var rgap = W / rdef.count;
    for (var j = 0; j < rdef.count; j++) {
      robjs.push({
        x: rgap * j + Math.random() * rgap * 0.2,
        w: CELL * rdef.len,
        type: rdef.type,
        divePhase: Math.random() * Math.PI * 2
      });
    }
    lanes.push({ row: rdef.row, dir: rdef.dir, speed: rdef.speed, objs: robjs, kind: 'river' });
  }
}

function resetFrog() {
  frog.col = 6;
  frog.row = START_ROW;
  frog.px = frog.col * CELL + CELL / 2;
  frog.py = frog.row * CELL + CELL / 2;
  frog.hopAnim = 0;
  frog.alive = true;
  frog.riding = null;
  frog.facing = 0;
  timerStart = performance.now();
  furthestRow = START_ROW;
}

function startGame() {
  lives = 3;
  score = 0;
  level = 1;
  homes = [false, false, false, false, false];
  buildLanes();
  resetFrog();
  gameState = 'playing';
  overlay.style.display = 'none';
}

function startLevel() {
  buildLanes();
  resetFrog();
  gameState = 'playing';
}

startBtn.addEventListener('click', startGame);
startBtn.addEventListener('touchend', function(e) { e.preventDefault(); startGame(); });

var inputQueue = [];

function queueMove(dx, dy) {
  if (gameState === 'gameover') { startGame(); return; }
  if (gameState !== 'playing' || frog.hopAnim > 0) return;
  inputQueue.push({ dx: dx, dy: dy });
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowUp')    { e.preventDefault(); queueMove(0, -1); }
  if (e.key === 'ArrowDown')  { e.preventDefault(); queueMove(0,  1); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); queueMove(-1, 0); }
  if (e.key === 'ArrowRight') { e.preventDefault(); queueMove( 1, 0); }
});

var touchStartPos = null;
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  touchStartPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: false });
canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  if (!touchStartPos) return;
  var t = e.changedTouches[0];
  var dx = t.clientX - touchStartPos.x;
  var dy = t.clientY - touchStartPos.y;
  if (Math.abs(dx) < 20 && Math.abs(dy) < 20) { queueMove(0, -1); }
  else if (Math.abs(dx) > Math.abs(dy)) { queueMove(dx > 0 ? 1 : -1, 0); }
  else { queueMove(0, dy > 0 ? 1 : -1); }
  touchStartPos = null;
}, { passive: false });

var HOP_FRAMES = 8;

function findLane(row) {
  for (var i = 0; i < lanes.length; i++) {
    if (lanes[i].row === row) return lanes[i];
  }
  return null;
}

function update(dt) {
  frameCount++;

  if (gameState === 'dying') {
    deathTimer -= dt;
    if (deathTimer <= 0) {
      lives--;
      if (lives <= 0) {
        gameState = 'gameover';
        if (score > highScore) { highScore = score; arcadeData.frogger.highScore = highScore; localStorage.setItem('calebArcadeData', JSON.stringify(arcadeData)); }
      } else { resetFrog(); gameState = 'playing'; }
    }
    updateLanes(dt);
    return;
  }

  if (gameState === 'winning') {
    winTimer -= dt;
    if (winTimer <= 0) {
      var allFilled = true;
      for (var i = 0; i < 5; i++) { if (!homes[i]) allFilled = false; }
      if (allFilled) {
        score += 1000;
        level++;
        homes = [false, false, false, false, false];
        startLevel();
      } else { resetFrog(); gameState = 'playing'; }
    }
    updateLanes(dt);
    return;
  }

  if (gameState !== 'playing') return;

  updateLanes(dt);

  var elapsed = (performance.now() - timerStart) / 1000;
  timer = 1 - elapsed / TIMER_DURATION;
  if (timer <= 0) { die(); return; }

  if (frog.hopAnim <= 0 && inputQueue.length > 0) {
    var mv = inputQueue.shift();
    var newCol = frog.col + mv.dx;
    var newRow = frog.row + mv.dy;
    if (newCol >= 0 && newCol < COLS && newRow >= 0 && newRow <= START_ROW) {
      if (mv.dy < 0) frog.facing = 0;
      else if (mv.dy > 0) frog.facing = Math.PI;
      else if (mv.dx < 0) frog.facing = -Math.PI / 2;
      else if (mv.dx > 0) frog.facing = Math.PI / 2;
      frog.col = newCol;
      frog.row = newRow;
      frog.hopAnim = HOP_FRAMES;
      if (frog.row < furthestRow) {
        score += 10 * (furthestRow - frog.row);
        furthestRow = frog.row;
      }
    }
  }
  inputQueue = [];

  if (frog.hopAnim > 0) frog.hopAnim--;
  var targetX = frog.col * CELL + CELL / 2;
  var targetY = frog.row * CELL + CELL / 2;
  if (frog.hopAnim > 0) {
    frog.px += (targetX - frog.px) * 0.3;
    frog.py += (targetY - frog.py) * 0.3;
  } else {
    // Only snap Y to grid; X is managed by riding when on river
    frog.py = targetY;
    if (!frog.riding) {
      frog.px = targetX;
    }
  }
  if (frog.hopAnim > 0) return;

  var frogRow = frog.row;

  // Apply riding movement (frog moves with the platform)
  if (frog.riding) {
    frog.px += frog.riding.speed;
    frog.col = Math.round((frog.px - CELL / 2) / CELL);
    if (frog.px < -CELL / 2 || frog.px > W + CELL / 2) { die(); return; }
  }

  // River collision - check if frog is on a platform
  frog.riding = null;
  if (frogRow >= RIVER_START && frogRow <= RIVER_END) {
    var rlane = findLane(frogRow);
    var onPlatform = false;
    if (rlane) {
      var fhw = CELL * 0.35;
      for (var ri = 0; ri < rlane.objs.length; ri++) {
        var robj = rlane.objs[ri];
        if (robj.type === 'turtle') {
          var dive = Math.sin(robj.divePhase + frameCount * 0.015);
          if (dive > 0.7) continue;
        }
        if (frog.px + fhw > robj.x && frog.px - fhw < robj.x + robj.w) {
          onPlatform = true;
          frog.riding = { speed: rlane.speed * rlane.dir };
          break;
        }
      }
    }
    if (!onPlatform) { die(); return; }
  }

  // Road collision
  if (frogRow >= ROAD_START && frogRow <= ROAD_END) {
    var lane = findLane(frogRow);
    if (lane) {
      var halfW = CELL * 0.3;
      for (var vi = 0; vi < lane.objs.length; vi++) {
        var obj = lane.objs[vi];
        if (frog.px + halfW > obj.x && frog.px - halfW < obj.x + obj.w) { die(); return; }
      }
    }
  }

  // Home row
  if (frogRow === HOME_ROW) {
    var landed = false;
    for (var hi = 0; hi < 5; hi++) {
      var hx = getHomeX(hi);
      if (Math.abs(frog.px - hx) < CELL * 1.1 && !homes[hi]) {
        homes[hi] = true;
        score += 200 + Math.floor(timer * 200);
        landed = true;
        gameState = 'winning';
        winTimer = 0.8;
        break;
      }
    }
    if (!landed) die();
  }
}

function updateLanes(dt) {
  for (var li = 0; li < lanes.length; li++) {
    var lane = lanes[li];
    for (var oi = 0; oi < lane.objs.length; oi++) {
      var obj = lane.objs[oi];
      obj.x += lane.speed * lane.dir;
      if (lane.dir > 0 && obj.x > W + 20) obj.x = -obj.w - 10;
      else if (lane.dir < 0 && obj.x + obj.w < -20) obj.x = W + 10;
    }
  }
}

function die() {
  frog.alive = false;
  gameState = 'dying';
  deathTimer = 1.0;
}

// --- Drawing ---
function draw() {
  ctx.clearRect(0, 0, W, H);

  for (var r = 0; r <= START_ROW; r++) {
    var y = r * CELL;
    if (r === HOME_ROW) {
      ctx.fillStyle = '#1a5c1a';
      ctx.fillRect(0, y, W, CELL);
      ctx.fillStyle = '#145214';
      for (var bx = 0; bx < W; bx += 5) {
        var inHome = false;
        for (var ci = 0; ci < 5; ci++) {
          if (Math.abs(bx - getHomeX(ci)) < CELL * 0.55) { inHome = true; break; }
        }
        if (!inHome) {
          ctx.fillRect(bx, y + 2, 4, CELL - 4);
          if (bx % 15 < 5) { ctx.fillStyle = '#1a6c1a'; ctx.fillRect(bx, y + 4, 4, CELL * 0.3); ctx.fillStyle = '#145214'; }
        }
      }
    } else if (r === SAFE_ZONE_MID || r === SAFE_ZONE_TOP || r >= 13) {
      drawGrassRow(y);
    } else if (r >= RIVER_START && r <= RIVER_END) {
      drawWater(y, r);
    } else if (r >= ROAD_START && r <= ROAD_END) {
      ctx.fillStyle = '#333';
      ctx.fillRect(0, y, W, CELL);
      ctx.fillStyle = '#3a3a3a';
      for (var tx = 0; tx < W; tx += 11) ctx.fillRect(tx, y + (tx * 3 + r * 7) % CELL, 2, 1);
      if (r < ROAD_END) {
        ctx.strokeStyle = '#ffeb3b44';
        ctx.lineWidth = 2;
        ctx.setLineDash([CELL * 0.4, CELL * 0.4]);
        ctx.beginPath();
        ctx.moveTo(0, y + CELL);
        ctx.lineTo(W, y + CELL);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }
  }

  // Sidewalk lines
  ctx.fillStyle = '#ccc';
  ctx.fillRect(0, ROAD_START * CELL - 2, W, 4);
  ctx.fillRect(0, (ROAD_END + 1) * CELL - 2, W, 4);

  // Home spots
  for (var hi = 0; hi < 5; hi++) {
    var hx = getHomeX(hi);
    var hy = HOME_ROW * CELL + CELL / 2;
    if (homes[hi]) {
      ctx.fillStyle = '#0a4d0a';
      ctx.beginPath(); ctx.arc(hx, hy, CELL * 0.45, 0, Math.PI * 2); ctx.fill();
      drawSmallFrog(hx, hy, CELL * 0.45);
    } else {
      ctx.fillStyle = '#0a3d0a';
      ctx.beginPath(); ctx.arc(hx, hy, CELL * 0.45, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#2E7D3244';
      ctx.beginPath(); ctx.arc(hx, hy, CELL * 0.32, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#4CAF5055';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(hx, hy, CELL * 0.25, 0.3, Math.PI * 2 - 0.3); ctx.stroke();
    }
  }

  // River objects
  for (var li = 0; li < lanes.length; li++) {
    var lane = lanes[li];
    if (lane.kind !== 'river') continue;
    var ly = lane.row * CELL;
    for (var oi = 0; oi < lane.objs.length; oi++) {
      var obj = lane.objs[oi];
      if (obj.type === 'log') drawLog(obj.x, ly, obj.w, CELL);
      else drawTurtles(obj.x, ly, obj.w, CELL, Math.sin(obj.divePhase + frameCount * 0.015));
    }
  }

  // Road objects
  for (var li2 = 0; li2 < lanes.length; li2++) {
    var rl = lanes[li2];
    if (rl.kind !== 'road') continue;
    var ry = rl.row * CELL;
    for (var oi2 = 0; oi2 < rl.objs.length; oi2++) {
      var ro = rl.objs[oi2];
      if (ro.type === 'truck') drawTruck(ro.x, ry, ro.w, CELL, ro.color, rl.dir);
      else drawCar(ro.x, ry, ro.w, CELL, ro.color, rl.dir);
    }
  }

  // Frog
  if (gameState === 'dying') {
    var t = 1 - deathTimer;
    ctx.save();
    ctx.globalAlpha = 1 - t;
    ctx.translate(frog.px, frog.py);
    var isWater = frog.row >= RIVER_START && frog.row <= RIVER_END;
    if (isWater) {
      for (var si = 0; si < 8; si++) {
        var angle = (Math.PI * 2 / 8) * si;
        var dist = t * CELL * 0.8;
        ctx.fillStyle = '#64B5F6';
        ctx.beginPath(); ctx.arc(Math.cos(angle) * dist, Math.sin(angle) * dist, 3 - t * 2, 0, Math.PI * 2); ctx.fill();
      }
      ctx.strokeStyle = '#90CAF9'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0, 0, t * CELL * 0.5, 0, Math.PI * 2); ctx.stroke();
    } else {
      ctx.rotate(t * Math.PI * 2);
      ctx.scale(1 - t * 0.3, 1 - t * 0.3);
      var rs = CELL * 0.8 / 2;
      ctx.fillStyle = '#8B0000';
      ctx.beginPath(); ctx.ellipse(-rs * 0.6, rs * 0.3, rs * 0.35, rs * 0.25, -0.3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(rs * 0.6, rs * 0.3, rs * 0.35, rs * 0.25, 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#CC0000';
      ctx.beginPath(); ctx.ellipse(0, 0, rs * 0.65, rs * 0.75, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#FF4444';
      ctx.beginPath(); ctx.ellipse(0, rs * 0.1, rs * 0.4, rs * 0.45, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#CC0000';
      ctx.beginPath(); ctx.ellipse(0, -rs * 0.55, rs * 0.5, rs * 0.35, 0, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
      var eSize = rs * 0.12;
      [-rs * 0.3, rs * 0.3].forEach(function(ex) {
        ctx.beginPath();
        ctx.moveTo(ex - eSize, -rs * 0.72 - eSize); ctx.lineTo(ex + eSize, -rs * 0.72 + eSize);
        ctx.moveTo(ex + eSize, -rs * 0.72 - eSize); ctx.lineTo(ex - eSize, -rs * 0.72 + eSize);
        ctx.stroke();
      });
      ctx.fillStyle = '#8B0000';
      ctx.beginPath(); ctx.ellipse(-rs * 0.55, -rs * 0.15, rs * 0.15, rs * 0.25, -0.4, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(rs * 0.55, -rs * 0.15, rs * 0.15, rs * 0.25, 0.4, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  } else if (gameState !== 'gameover' && gameState !== 'waiting') {
    drawFrog(frog.px, frog.py, CELL * 0.8, frog.hopAnim, frog.facing);
  }

  drawHUD();

  if (gameState === 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#f44336';
    ctx.font = 'bold ' + (CELL * 1.2) + 'px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('GAME OVER', W / 2, H / 2 - CELL);
    ctx.fillStyle = '#fff';
    ctx.font = (CELL * 0.5) + 'px sans-serif';
    ctx.fillText('Score: ' + score, W / 2, H / 2 + CELL * 0.3);
    ctx.fillText('High Score: ' + highScore, W / 2, H / 2 + CELL * 1.0);
    ctx.fillStyle = '#4CAF50';
    ctx.font = (CELL * 0.4) + 'px sans-serif';
    ctx.fillText('Tap or press any arrow to play again', W / 2, H / 2 + CELL * 2);
  }
}

function drawGrassRow(y) {
  ctx.fillStyle = '#2d8c2d';
  ctx.fillRect(0, y, W, CELL);
  ctx.fillStyle = '#3a9e3a';
  for (var i = 0; i < W; i += 6) {
    var h = 4 + Math.sin(i * 0.4) * 3;
    ctx.fillRect(i, y + CELL - h - 1, 2, h);
  }
  ctx.fillStyle = '#259025';
  for (var i2 = 3; i2 < W; i2 += 11) ctx.fillRect(i2, y + CELL - 5, 2, 5);
  var colors = ['#ff0', '#f9f', '#fff', '#faa'];
  for (var fx = 12; fx < W; fx += CELL * 1.3) {
    ctx.fillStyle = colors[Math.floor(fx / 20) % colors.length];
    ctx.beginPath(); ctx.arc(fx, y + CELL * 0.35, 2.5, 0, Math.PI * 2); ctx.fill();
  }
}

function drawWater(y, row) {
  var grad = ctx.createLinearGradient(0, y, 0, y + CELL);
  grad.addColorStop(0, '#1565C0');
  grad.addColorStop(0.5, '#1976D2');
  grad.addColorStop(1, '#1565C0');
  ctx.fillStyle = grad;
  ctx.fillRect(0, y, W, CELL);
  ctx.fillStyle = '#1E88E544';
  for (var i = 0; i < COLS + 2; i++) {
    var wx = i * CELL + Math.sin(frameCount * 0.03 + row + i * 0.5) * 8;
    var wy = y + CELL * 0.2 + Math.sin(frameCount * 0.05 + i) * 4;
    ctx.fillRect(wx, wy, CELL * 0.5, 2);
    ctx.fillRect(wx + 5, y + CELL * 0.6 + Math.cos(frameCount * 0.04 + i * 0.7) * 3, CELL * 0.35, 2);
  }
  ctx.fillStyle = '#0D47A133';
  for (var j = 0; j < COLS + 1; j++) {
    ctx.fillRect(j * CELL + Math.cos(frameCount * 0.025 + row * 2 + j * 0.8) * 10, y + CELL * 0.42 + Math.sin(frameCount * 0.035 + j * 1.2) * 3, CELL * 0.25, 2);
  }
}

function drawLog(x, y, w, h) {
  var r = h * 0.3;
  var pad = h * 0.15;
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  roundRect(x + 2, y + pad + 3, w, h * 0.7, r); ctx.fill();
  ctx.fillStyle = '#795548';
  roundRect(x, y + pad, w, h * 0.7, r); ctx.fill();
  ctx.strokeStyle = '#5D4037'; ctx.lineWidth = 1;
  for (var i = r; i < w - r; i += CELL * 0.35) {
    ctx.beginPath();
    ctx.moveTo(x + i, y + pad + 4);
    ctx.quadraticCurveTo(x + i + 5, y + pad + h * 0.35, x + i, y + pad + h * 0.7 - 4);
    ctx.stroke();
  }
  ctx.fillStyle = '#8D6E6344';
  ctx.fillRect(x + r, y + pad + 2, w - r * 2, 3);
  ctx.fillStyle = '#8D6E63';
  ctx.beginPath(); ctx.arc(x + r, y + h * 0.5, r * 0.65, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#4E342E'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(x + r, y + h * 0.5, r * 0.35, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = '#8D6E63';
  ctx.beginPath(); ctx.arc(x + w - r, y + h * 0.5, r * 0.65, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + w - r, y + h * 0.5, r * 0.35, 0, Math.PI * 2); ctx.stroke();
}

function drawTurtles(x, y, w, h, divePhase) {
  var count = Math.max(1, Math.floor(w / (CELL * 0.7)));
  var submerged = divePhase > 0.7;
  var alpha = submerged ? Math.max(0, 1 - (divePhase - 0.7) * 3) : 1;
  var aboutToDive = divePhase > 0.5 && divePhase <= 0.7;
  ctx.save();
  ctx.globalAlpha = alpha;
  for (var i = 0; i < count; i++) {
    var tx = x + i * (CELL * 0.7) + CELL * 0.05;
    var ty = y + h * 0.15;
    var tw = CELL * 0.6;
    var th = h * 0.7;
    var cx = tx + tw / 2;
    var cy = ty + th / 2;
    if (submerged && alpha < 0.3) {
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = '#90CAF9';
      ctx.beginPath(); ctx.arc(cx - 3, cy - 4, 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 5, cy + 2, 2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx, cy + 6, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = alpha;
      continue;
    }
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath(); ctx.ellipse(cx + 1, cy + 2, tw / 2, th / 2, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = aboutToDive ? '#558B2F' : '#2E7D32';
    ctx.beginPath(); ctx.ellipse(cx, cy, tw / 2, th / 2, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#388E3C';
    ctx.beginPath(); ctx.ellipse(cx, cy - 2, tw / 2 - 3, th / 2 - 4, 0, Math.PI, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#1B5E20'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx, cy - th / 2 + 3); ctx.lineTo(cx, cy + th / 2 - 3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx - tw / 2 + 3, cy); ctx.lineTo(cx + tw / 2 - 3, cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx - tw * 0.3, cy - th * 0.35); ctx.lineTo(cx + tw * 0.3, cy + th * 0.35); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + tw * 0.3, cy - th * 0.35); ctx.lineTo(cx - tw * 0.3, cy + th * 0.35); ctx.stroke();
    ctx.fillStyle = '#4CAF50';
    ctx.beginPath(); ctx.ellipse(cx + tw / 2 + 4, cy, 5, 4, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(cx + tw / 2 + 6, cy - 1, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#4CAF50';
    var lp = [[-tw * 0.35, -th * 0.35], [tw * 0.2, -th * 0.35], [-tw * 0.35, th * 0.35], [tw * 0.2, th * 0.35]];
    for (var k = 0; k < lp.length; k++) {
      ctx.beginPath(); ctx.ellipse(cx + lp[k][0], cy + lp[k][1], 4, 3, 0, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.restore();
}

function drawCar(x, y, w, h, color, dir) {
  var pad = h * 0.15;
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  roundRect(x + 2, y + pad + 3, w, h - pad * 2, h * 0.2); ctx.fill();
  ctx.fillStyle = color;
  roundRect(x, y + pad, w, h - pad * 2, h * 0.2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(x + 4, y + pad + 2, w - 8, (h - pad * 2) * 0.25);
  ctx.fillStyle = shadeColor(color, -25);
  var roofX = dir > 0 ? x + w * 0.3 : x + w * 0.28;
  roundRect(roofX, y + pad * 1.5, w * 0.42, h - pad * 3, h * 0.15); ctx.fill();
  ctx.fillStyle = '#B3E5FC';
  ctx.fillRect(dir > 0 ? x + w * 0.65 : x + w * 0.12, y + pad * 2, w * 0.14, h - pad * 4);
  ctx.fillStyle = '#B3E5FC88';
  ctx.fillRect(dir > 0 ? x + w * 0.2 : x + w * 0.68, y + pad * 2, w * 0.1, h - pad * 4);
  ctx.fillStyle = '#212121';
  ctx.fillRect(x + w * 0.1, y + h - pad - 3, w * 0.16, 5);
  ctx.fillRect(x + w * 0.7, y + h - pad - 3, w * 0.16, 5);
  ctx.fillRect(x + w * 0.1, y + pad - 2, w * 0.16, 5);
  ctx.fillRect(x + w * 0.7, y + pad - 2, w * 0.16, 5);
  ctx.fillStyle = '#555';
  ctx.fillRect(x + w * 0.14, y + h - pad - 2, w * 0.07, 3);
  ctx.fillRect(x + w * 0.74, y + h - pad - 2, w * 0.07, 3);
  ctx.fillStyle = '#FFEE58';
  var hlX = dir > 0 ? x + w - 4 : x;
  ctx.fillRect(hlX, y + pad + 3, 4, 5);
  ctx.fillRect(hlX, y + h - pad - 8, 4, 5);
  ctx.fillStyle = '#f44336';
  var tlX = dir > 0 ? x : x + w - 4;
  ctx.fillRect(tlX, y + pad + 4, 3, 4);
  ctx.fillRect(tlX, y + h - pad - 8, 3, 4);
}

function drawTruck(x, y, w, h, color, dir) {
  var pad = h * 0.12;
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  roundRect(x + 2, y + pad + 3, w, h - pad * 2, 4); ctx.fill();
  var trailerX = dir > 0 ? x : x + w * 0.28;
  ctx.fillStyle = color;
  roundRect(trailerX, y + pad, w * 0.72, h - pad * 2, 4); ctx.fill();
  ctx.strokeStyle = shadeColor(color, -15); ctx.lineWidth = 1;
  for (var ti = 1; ti < 4; ti++) {
    var lx = trailerX + w * 0.72 * ti / 4;
    ctx.beginPath(); ctx.moveTo(lx, y + pad + 3); ctx.lineTo(lx, y + h - pad - 3); ctx.stroke();
  }
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.fillRect(trailerX + 2, y + pad + 2, w * 0.72 - 4, (h - pad * 2) * 0.22);
  var cabX = dir > 0 ? x + w * 0.72 : x;
  var cabW = w * 0.28;
  ctx.fillStyle = shadeColor(color, 20);
  roundRect(cabX, y + pad * 0.5, cabW, h - pad, 4); ctx.fill();
  ctx.fillStyle = '#B3E5FC';
  ctx.fillRect(dir > 0 ? cabX + cabW * 0.5 : cabX + cabW * 0.1, y + pad + 2, cabW * 0.35, h - pad * 2 - 4);
  ctx.fillStyle = '#212121';
  ctx.fillRect(x + w * 0.06, y + h - pad - 4, w * 0.1, 6);
  ctx.fillRect(x + w * 0.28, y + h - pad - 4, w * 0.1, 6);
  ctx.fillRect(x + w * 0.75, y + h - pad - 4, w * 0.12, 6);
  ctx.fillRect(x + w * 0.06, y + pad - 2, w * 0.1, 6);
  ctx.fillRect(x + w * 0.28, y + pad - 2, w * 0.1, 6);
  ctx.fillRect(x + w * 0.75, y + pad - 2, w * 0.12, 6);
  ctx.fillStyle = '#FFEE58';
  var thlX = dir > 0 ? cabX + cabW - 3 : cabX;
  ctx.fillRect(thlX, y + pad + 2, 3, 5);
  ctx.fillRect(thlX, y + h - pad - 7, 3, 5);
}

function drawFrog(x, y, size, hopAnim, facing) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(facing);
  var hop = hopAnim > 0 ? Math.sin((hopAnim / HOP_FRAMES) * Math.PI) : 0;
  ctx.scale(1 - hop * 0.2, 1 + hop * 0.3);
  ctx.translate(0, -hop * size * 0.3);
  var s = size / 2;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(0, s * 0.8 + hop * size * 0.3, s * 0.7, s * 0.2, 0, 0, Math.PI * 2); ctx.fill();

  // Back legs
  ctx.fillStyle = '#388E3C';
  var legExt = hop * 0.4 + 0.2;
  ctx.beginPath(); ctx.ellipse(-s * 0.6, s * 0.3, s * 0.35, s * (0.2 + legExt * 0.2), -0.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(s * 0.6, s * 0.3, s * 0.35, s * (0.2 + legExt * 0.2), 0.3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#2E7D32';
  ctx.beginPath(); ctx.ellipse(-s * 0.85, s * 0.45, s * 0.18, s * 0.08, -0.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(s * 0.85, s * 0.45, s * 0.18, s * 0.08, 0.5, 0, Math.PI * 2); ctx.fill();

  // Body
  ctx.fillStyle = '#4CAF50';
  ctx.beginPath(); ctx.ellipse(0, 0, s * 0.65, s * 0.75, 0, 0, Math.PI * 2); ctx.fill();

  // Body spots
  ctx.fillStyle = '#43A047';
  ctx.beginPath(); ctx.arc(-s * 0.2, s * 0.15, s * 0.1, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(s * 0.15, -s * 0.05, s * 0.08, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(s * 0.28, s * 0.25, s * 0.07, 0, Math.PI * 2); ctx.fill();

  // Belly
  ctx.fillStyle = '#A5D6A7';
  ctx.beginPath(); ctx.ellipse(0, s * 0.15, s * 0.4, s * 0.45, 0, 0, Math.PI * 2); ctx.fill();

  // Head
  ctx.fillStyle = '#4CAF50';
  ctx.beginPath(); ctx.ellipse(0, -s * 0.55, s * 0.5, s * 0.38, 0, 0, Math.PI * 2); ctx.fill();

  // Eye bumps
  ctx.beginPath(); ctx.arc(-s * 0.3, -s * 0.78, s * 0.22, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(s * 0.3, -s * 0.78, s * 0.22, 0, Math.PI * 2); ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-s * 0.3, -s * 0.78, s * 0.18, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(s * 0.3, -s * 0.78, s * 0.18, 0, Math.PI * 2); ctx.fill();

  // Pupils
  var po = hop * 0.02;
  ctx.fillStyle = '#1B5E20';
  ctx.beginPath(); ctx.arc(-s * 0.3, -s * (0.8 + po), s * 0.09, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(s * 0.3, -s * (0.8 + po), s * 0.09, 0, Math.PI * 2); ctx.fill();

  // Eye shine
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-s * 0.26, -s * 0.84, s * 0.05, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(s * 0.34, -s * 0.84, s * 0.05, 0, Math.PI * 2); ctx.fill();

  // Nostrils
  ctx.fillStyle = '#2E7D32';
  ctx.beginPath(); ctx.arc(-s * 0.1, -s * 0.5, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(s * 0.1, -s * 0.5, 1.5, 0, Math.PI * 2); ctx.fill();

  // Smile
  ctx.strokeStyle = '#2E7D32'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(0, -s * 0.42, s * 0.22, 0.3, Math.PI - 0.3); ctx.stroke();

  // Cheek blush
  ctx.fillStyle = '#C8E6C922';
  ctx.beginPath(); ctx.arc(-s * 0.4, -s * 0.45, s * 0.12, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(s * 0.4, -s * 0.45, s * 0.12, 0, Math.PI * 2); ctx.fill();

  // Front legs
  ctx.fillStyle = '#388E3C';
  ctx.beginPath(); ctx.ellipse(-s * 0.55, -s * 0.15, s * 0.15, s * 0.25, -0.4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(s * 0.55, -s * 0.15, s * 0.15, s * 0.25, 0.4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#2E7D32';
  ctx.beginPath(); ctx.ellipse(-s * 0.65, -s * 0.35, s * 0.1, s * 0.06, -0.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(s * 0.65, -s * 0.35, s * 0.1, s * 0.06, 0.3, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

function drawSmallFrog(x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  var s = size / 2;
  ctx.fillStyle = '#4CAF50';
  ctx.beginPath(); ctx.ellipse(0, 0, s * 0.65, s * 0.75, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#A5D6A7';
  ctx.beginPath(); ctx.ellipse(0, s * 0.1, s * 0.3, s * 0.35, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-s * 0.25, -s * 0.4, s * 0.15, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(s * 0.25, -s * 0.4, s * 0.15, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1B5E20';
  ctx.beginPath(); ctx.arc(-s * 0.25, -s * 0.42, s * 0.07, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(s * 0.25, -s * 0.42, s * 0.07, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 0, W, CELL * 0.55);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + (CELL * 0.35) + 'px sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('Score: ' + score, 8, 4);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFD54F';
  ctx.fillText('Lv ' + level, W / 2, 4);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#aaa';
  ctx.fillText('Hi: ' + highScore, W - 8, 4);

  for (var i = 0; i < lives; i++) drawSmallFrog(24 + i * CELL * 0.6, CELL * 0.72, CELL * 0.35);

  var barW = W - 16, barH = 8, barY = H - barH - 4;
  ctx.fillStyle = '#333';
  roundRect(8, barY, barW, barH, 3); ctx.fill();
  var tPct = Math.max(0, timer);
  if (barW * tPct > 1) {
    ctx.fillStyle = tPct > 0.3 ? '#4CAF50' : tPct > 0.15 ? '#FF9800' : '#f44336';
    roundRect(8, barY, barW * tPct, barH, 3); ctx.fill();
  }
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + (CELL * 0.22) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText('TIME', W / 2, barY - CELL * 0.28);
}

function roundRect(x, y, w, h, r) {
  if (w <= 0 || h <= 0) return;
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function shadeColor(color, percent) {
  var R = parseInt(color.substring(1, 3), 16);
  var G = parseInt(color.substring(3, 5), 16);
  var B = parseInt(color.substring(5, 7), 16);
  R = Math.min(255, Math.max(0, R + percent));
  G = Math.min(255, Math.max(0, G + percent));
  B = Math.min(255, Math.max(0, B + percent));
  return '#' + ((1 << 24) + (R << 16) + (G << 8) + B).toString(16).slice(1);
}

var lastTime = 0;
function gameLoop(ts) {
  var dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(function(ts) { lastTime = ts; gameLoop(ts); });

})();
</script>
