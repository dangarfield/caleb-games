<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<script>if(!location.pathname.endsWith('/'))location.replace(location.pathname+'/')</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<title>DR1V3N WILD - Garfield Boys' Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#000;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;
  font-family:'Segoe UI',system-ui,sans-serif}
#back-btn{position:fixed;top:12px;left:12px;z-index:9999;background:rgba(0,0,0,0.55);color:#fff;
  text-decoration:none;padding:6px 18px;border-radius:20px;font:bold 15px/1.4 'Segoe UI',system-ui,sans-serif;
  border:1px solid rgba(255,255,255,0.18);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  transition:background 0.2s;cursor:pointer}
#back-btn:hover{background:rgba(0,0,0,0.75)}

/* --- Menu overlay --- */
#menu-overlay{position:fixed;inset:0;z-index:9000;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.7);color:#fff;text-align:center}
#menu-overlay.hidden{display:none}
#menu-inner{display:flex;flex-direction:column;align-items:center;gap:0.5rem;
  width:90%;max-width:480px;max-height:95vh;overflow-y:auto;padding:1rem 0}
#menu-overlay h1{font:italic 900 clamp(2rem,8vw,4rem)/1 arial;margin-bottom:0;
  color:#ffd700;text-shadow:0 0 30px rgba(255,200,0,0.4)}
#menu-overlay h1 span{color:#ff4444;text-shadow:0 0 20px rgba(255,0,0,0.4)}
#menu-overlay .sub{font-size:clamp(0.9rem,2.5vw,1.2rem);color:rgba(255,255,255,0.6);margin-bottom:0.5rem}
.player-row{display:flex;gap:10px;width:100%;max-width:360px}
.player-btn{flex:1;padding:12px 8px;border:none;border-radius:12px;cursor:pointer;font-weight:700;
  font-size:clamp(0.95rem,2.5vw,1.15rem);color:#fff;transition:transform 0.15s,box-shadow 0.15s;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.player-btn:hover{transform:scale(1.05)}
.player-btn:active{transform:scale(0.95)}
.player-btn.caleb{background:linear-gradient(135deg,#b8860b,#daa520)}
.player-btn.ezra{background:linear-gradient(135deg,#2255cc,#4488ff)}
.player-btn.selected{box-shadow:0 0 0 3px #fff,0 4px 20px rgba(255,255,255,0.3)}
.mode-row{display:flex;gap:10px;width:100%;max-width:360px}
.mode-btn{flex:1;padding:12px 8px;border:none;border-radius:12px;cursor:pointer;font-weight:700;
  font-size:clamp(0.95rem,2.5vw,1.15rem);color:#fff;transition:transform 0.15s,box-shadow 0.15s;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  background:linear-gradient(135deg,rgba(255,255,255,0.15),rgba(255,255,255,0.05));
  box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.mode-btn:hover{transform:scale(1.05)}
.mode-btn:active{transform:scale(0.95)}
.mode-btn.selected{box-shadow:0 0 0 3px #fff,0 4px 20px rgba(255,255,255,0.3);
  background:linear-gradient(135deg,rgba(255,255,255,0.25),rgba(255,255,255,0.1))}
.mode-btn .mode-desc{font:italic normal 0.8rem/1.3 sans-serif;color:rgba(255,255,255,0.7)}
.mode-btn .best{font:normal 0.75rem/1.2 monospace;color:rgba(255,255,255,0.7)}

/* --- Game over overlay --- */
#gameover-overlay{position:fixed;inset:0;z-index:9000;display:none;flex-direction:column;
  align-items:center;justify-content:center;background:rgba(0,0,0,0.7);color:#fff;gap:12px;text-align:center}
#gameover-overlay.active{display:flex}
.go-title{font:italic 900 clamp(2rem,7vw,3.5rem)/1 arial;color:#ff4444;text-shadow:0 0 20px rgba(255,0,0,0.4)}
.go-title.win{color:#ffd700;text-shadow:0 0 20px rgba(255,200,0,0.4)}
.go-score{font:bold clamp(1.3rem,4vw,2rem) sans-serif}
.go-best{font:bold clamp(0.9rem,2.5vw,1.3rem) sans-serif;color:#ffd700}
.go-new{color:#ff4444;font:italic bold 1.1rem sans-serif;animation:pulse 0.5s ease infinite alternate}
.go-tap{font:0.95rem sans-serif;color:rgba(255,255,255,0.5);margin-top:16px;animation:pulse 1.5s ease infinite alternate}
@keyframes pulse{from{opacity:0.5}to{opacity:1}}

/* --- Steering hints --- */
.steer-hint{position:fixed;bottom:12%;z-index:100;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  color:#fff;font:bold clamp(1rem,3vw,1.3rem)/1.2 sans-serif;text-align:center;
  text-shadow:0 2px 8px rgba(0,0,0,0.8);
  opacity:0;pointer-events:none;transition:none}
.steer-hint svg{filter:drop-shadow(0 2px 10px rgba(255,255,255,0.4))}
.steer-hint.left{left:clamp(20px,6vw,60px)}
.steer-hint.right{right:clamp(20px,6vw,60px)}
.steer-hint.show{animation:hintFade 4s ease forwards}
@keyframes hintFade{0%{opacity:0}8%{opacity:1}65%{opacity:1}100%{opacity:0}}

/* --- Landscape: tighten spacing --- */
@media (max-height:500px){
  #menu-inner{gap:0.3rem;padding:0.5rem 0}
  #menu-overlay h1{font-size:clamp(1.5rem,6vw,2.5rem)}
  .player-btn{padding:8px 6px;font-size:0.9rem}
  .mode-btn{padding:8px 6px;font-size:0.9rem}
}
</style>
</head>
<body>
<a id="back-btn" href="../../index.html">&larr; Games</a>
<div id="menu-overlay">
  <div id="menu-inner">
    <h1>DR1V3N <span>WILD</span></h1>
    <div class="sub">Choose your driver</div>
    <div class="player-row">
      <button class="player-btn caleb selected" id="btn-caleb">CALEB #8</button>
      <button class="player-btn ezra" id="btn-ezra">EZRA #4</button>
    </div>
    <div class="mode-row">
      <button class="mode-btn" id="btn-easy">EASY<span class="mode-desc">No Clock</span><span class="best" id="best-easy"></span></button>
      <button class="mode-btn" id="btn-hard">HARD<span class="mode-desc">Beat the Clock</span><span class="best" id="best-hard"></span></button>
    </div>
  </div>
</div>
<div id="gameover-overlay">
  <div class="go-title" id="go-title">GAME OVER</div>
  <div class="go-score" id="go-distance">0 m</div>
  <div class="go-best" id="go-best">Best: 0 m</div>
  <div class="go-new" id="go-new" style="display:none">NEW RECORD!</div>
  <div class="go-tap">Tap to continue</div>
</div>
<div id="hint-left" class="steer-hint left">
  <svg viewBox="0 0 80 80" width="80" height="80"><circle cx="40" cy="40" r="36" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.8)" stroke-width="3"/><path d="M48 25L30 40L48 55" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  <span>Hold to<br>turn left</span>
</div>
<div id="hint-right" class="steer-hint right">
  <svg viewBox="0 0 80 80" width="80" height="80"><circle cx="40" cy="40" r="36" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.8)" stroke-width="3"/><path d="M32 25L50 40L32 55" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  <span>Hold to<br>turn right</span>
</div>

<!-- Error handler -->
<script>
onerror=(event, source, lineno, colno, error)=>{
    document.body.style.backgroundColor = '#222';
    document.body.innerHTML = '<pre style="color:red;font-size:20px;">' +
        event + '\n' + source + '\nLn ' + lineno + ', Col ' + colno;
}
</script>

</html>
