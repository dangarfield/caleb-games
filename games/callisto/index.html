/**
 * Controls logging level.
 * When false, all logging becomes no-op, so compiled to nothing.
 * @const {boolean}
 */
const DEBUG = false;

/**
 * Logs to std out.
 * Only if debug is enabled.
 * @param {string} str
 */
function log(str) {
  if (DEBUG) {
    console.log(str);
  }
}

// This file is for silly code optimizations.
// See: https://xem.github.io/articles/webgl_quest.html
// See: https://github.com/carlini/js13k2019-yet-another-doom-clone/blob/master/make.py

/**
 * Builds a shortcut name for a property.
 * @param {string} name The original name.
 * @return {string} The abbreviated name.
 */
const buildShortcut = (name) => name.substr(0, 3) + name.substr(-3) + (name[name.length - 8] || '_');

/**
 * Builds shortcut properties for all existing properties on an object.
 * @param {!Object} obj
 */
const buildShortcuts = (obj) => {
  for (const key in obj) {
    const s = buildShortcut(key);
    if (!(s in obj)) {
      log(`Shortcut '${s}' for '${key}'`);
      obj[s] = obj[key];
    }
  }
};

/**
 * Random number generator.
 *
 * LCG
 * https://stackoverflow.com/a/424445/2051724
 */
class RNG {
  /**
     * Creates a new random number generator.
     * @param {number} seed  The integer seed.
     */
  constructor(seed) {
    // LCG using GCC's constants
    this.m = 0x80000000; // 2**31;
    this.a = 1103515245;
    this.c = 12345;
    this.state = seed;
  }

  /**
     * @return {number}
     */
  nextInt() {
    this.state = (this.a * this.state + this.c) % this.m;
    return this.state;
  }

  /**
     * @return {number}
     */
  nextFloat() {
    // returns in range [0,1]
    return this.nextInt() / (this.m - 1);
  }

  /**
     * @param {number} start
     * @param {number} end
     * @return {number}
     */
  nextRange(start, end) {
    // returns in range [start, end): including start, excluding end
    // can't modulu nextInt because of weak randomness in lower bits
    const rangeSize = end - start;
    const randomUnder1 = this.nextInt() / this.m;
    return start + ((randomUnder1 * rangeSize) | 0);
  }
}

// glMatrix - vec3
// https://github.com/toji/gl-matrix/blob/master/src/gl-matrix/vec3.js

/** @typedef {!Float32Array} */
const vec3 = {};

/**
 * Creates a new, empty vec3
 *
 * @return {!vec3} a new 3D vector
 */
vec3.create = () => new Float32Array(3);

/**
 * Creates a new vec3 initialized with values from an existing vector
 *
 * @param {!vec3} a vector to clone
 * @return {!vec3} a new 3D vector
 */
vec3.clone = (a) => new Float32Array(a);

/**
 * Calculates the magnitude of a vec3
 *
 * @param {!vec3} a vector to calculate length of
 * @return {number} length of a
 */
vec3.magnitude = (a) => Math.hypot(a[0], a[1], a[2]);

/**
 * Creates a new vec3 initialized with the given values
 *
 * @param {number} x X component
 * @param {number} y Y component
 * @param {number} z Z component
 * @return {!vec3} a new 3D vector
 * @noinline
 */
vec3.fromValues = (x, y, z) => new Float32Array([x, y, z]);

/**
 * Copy the values from one vec3 to another
 *
 * @param {!vec3} out the receiving vector
 * @param {!vec3} a the source vector
 * @return {!vec3} out
 */
vec3.copy = (out, a) => {
  out[0] = a[0];
  out[1] = a[1];
  out[2] = a[2];
  return out;
};

/**
 * Set the components of a vec3 to the given values
 *
 * @param {!vec3} out the receiving vector
 * @param {number} x X component
 * @param {number} y Y component
 * @param {number} z Z component
 * @return {!vec3} out
 */
vec3.set = (out, x, y, z) => {
  out[0] = x;
  out[1] = y;
  out[2] = z;
  return out;
};

/**
 * Adds two vec3's
 *
 * @param {!vec3} out the receiving vector
 * @param {!vec3} a the first operand
 * @param {!vec3} b the second operand
 * @return {!vec3} out
 */
vec3.add = (out, a, b) => {
  out[0] = a[0] + b[0];
  out[1] = a[1] + b[1];
  out[2] = a[2] + b[2];
  return out;
};

/**
 * Subtracts vector b from vector a
 *
 * @param {!vec3} out the receiving vector
 * @param {!vec3} a the first operand
 * @param {!vec3} b the second operand
 * @return {!vec3} out
 */
vec3.subtract = (out, a, b) => {
  out[0] = a[0] - b[0];
  out[1] = a[1] - b[1];
  out[2] = a[2] - b[2];
  return out;
};

/**
 * Multiplies two vec3's
 *
 * @param {!vec3} out the receiving vector
 * @param {!vec3} a the first operand
 * @param {!vec3} b the second operand
 * @return {!vec3} out
 */
vec3.multiply = (out, a, b) => {
  out[0] = a[0] * b[0];
  out[1] = a[1] * b[1];
  out[2] = a[2] * b[2];
  return out;
};

/**
 * Divides two vec3's
 *
 * @param {!vec3} out the receiving vector
 * @param {!vec3} a the first operand
 * @param {!vec3} b the second operand
 * @return {!vec3} out
 */
vec3.divide = (out, a, b) => {
  out[0] = a[0] / b[0];
  out[1] = a[1] / b[1];
  out[2] = a[2] / b[2];
  return out;
};

/**
 * Math.ceil the components of a vec3
 *
 * @param {!vec3} out the receiving vector
 * @param {!vec3} a vector to ceil
 * @return {!vec3} out
 */
vec3.ceil = (out, a) => {
  out[0] = Math.ceil(a[0]);
  out[1] = Math.ceil(a[1]);
  out[2] = Math.ceil(a[2]);
  return out;
};

/**
 * Returns the minimum of two vec3's
 *
 * @param {!vec3} out the receiving vector
 * @param {!vec3} a the first operand
 * @param {!vec3} b the second operand
 * @return {!vec3} out
 */
vec3.min = (out, a, b) => {
  out[0] = Math.min(a[0], b[0]);
  out[1] = Math.min(a[1], b[1]);
  out[2] = Math.min(a[2], b[2]);
  return out;
};

/**
 * Returns the maximum of two vec3's
 *
 * @param {!vec3} out the receiving vector
 * @param {!vec3} a the first operand
 * @param {!vec3} b the second operand
 * @return {!vec3} out
 */
vec3.max = (out, a, b) => {
  out[0] = Math.max(a[0], b[0]);
  out[1] = Math.max(a[1], b[1]);
  out[2] = Math.max(a[2], b[2]);
  return out;
};

/**
 * Scales a vec3 by a scalar number
 *
 * @param {!vec3} out the receiving vector
 * @param {!vec3} a the vector to scale
 * @param {number} b amount to scale the vector by
 * @return {!vec3} out
 */
vec3.scale = (out, a, b) => {
  out[0] = a[0] * b;
  out[1] = a[1] * b;
  out[2] = a[2] * b;
  return out;
};

/**
 * Adds two vec3's after scaling the second operand by a scalar value
 *
 * @param {!vec3} out the receiving vector
 * @param {!vec3} a the first operand
 * @param {!vec3} b the second operand
 * @param {number} scale the amount to scale b by before adding
 * @return {!vec3} out
 */
vec3.scaleAndAdd = (out, a, b, scale) => {
  out[0] = a[0] + (b[0] * scale);
  out[1] = a[1] + (b[1] * scale);
  out[2] = a[2] + (b[2] * scale);
  return out;
};

/**
 * Calculates the euclidian distance between two vec3's
 *
 * @param {!vec3} a the first operand
 * @param {!vec3} b the second operand
 * @return {number} distance between a and b
 */
vec3.distance = (a, b) => {
  const x = b[0] - a[0];
  const y = b[1] - a[1];
  const z = b[2] - a[2];
  return Math.hypot(x, y, z);
};

/**
 * Calculates the squared euclidian distance between two vec3's
 *
 * @param {!vec3} a the first operand
 * @param {!vec3} b the second operand
 * @return {number} squared distance between a and b
 */
vec3.squaredDistance = (a, b) => {
  const x = b[0] - a[0];
  const y = b[1] - a[1];
  const z = b[2] - a[2];
  return x * x + y * y + z * z;
};

/**
 * Calculates the squared length of a vec3
 *
 * @param {!vec3} a vector to calculate squared length of
 * @return {number} squared length of a
 */
vec3.squaredLength = (a) => {
  const x = a[0];
  const y = a[1];
  const z = a[2];
  return x * x + y * y + z * z;
};

/**
 * Negates the components of a vec3
 *
 * @param {!vec3} out the receiving vector
 * @param {!vec3} a vector to negate
 * @return {!vec3} out
 */
vec3.negate = (out, a) => {
  out[0] = -a[0];
  out[1] = -a[1];
  out[2] = -a[2];
  return out;
};

/**
 * Returns the inverse of the components of a vec3
 *
 * @param {!vec3} out the receiving vector
 * @param {!vec3} a vector to invert
 * @return {!vec3} out
 */
vec3.inverse = (out, a) => {
  out[0] = 1.0 / a[0];
  out[1] = 1.0 / a[1];
  out[2] = 1.0 / a[2];
  return out;
};

/**
 * Normalize a vec3
 *
 * @param {!vec3} out the receiving vector
 * @param {!vec3} a vector to normalize
 * @return {!vec3} out
 */
vec3.normalize = (out, a) => {
  const len = vec3.magnitude(a);
  return len > 0 ? vec3.scale(out, a, 1 / len) : vec3.copy(out, a);
};

/**
 * Calculates the dot product of two vec3's
 *
 * @param {!vec3} a the first operand
 * @param {!vec3} b the second operand
 * @return {number} dot product of a and b
 */
vec3.dot = (a, b) => {
  return a[0] * b[0] + a[1] * b[1] + a[2] * b[2];
};

/**
 * Computes the cross product of two vec3's
 *
 * @param {!vec3} out the receiving vector
 * @param {!vec3} a the first operand
 * @param {!vec3} b the second operand
 * @return {!vec3} out
 */
vec3.cross = (out, a, b) => {
  const ax = a[0]; const ay = a[1]; const az = a[2];
  const bx = b[0]; const by = b[1]; const bz = b[2];

  out[0] = ay * bz - az * by;
  out[1] = az * bx - ax * bz;
  out[2] = ax * by - ay * bx;
  return out;
};

/**
 * Computes the cross product of two vec3's
 *
 * @param {!vec3} out the receiving vector
 * @param {!vec3} origin the relative origin point for a and b
 * @param {!vec3} a the first operand
 * @param {!vec3} b the second operand
 * @return {!vec3} out
 */
vec3.cross2 = (out, origin, a, b) => {
  const ax = a[0] - origin[0]; const ay = a[1] - origin[1]; const az = a[2] - origin[2];
  const bx = b[0] - origin[0]; const by = b[1] - origin[1]; const bz = b[2] - origin[2];

  out[0] = ay * bz - az * by;
  out[1] = az * bx - ax * bz;
  out[2] = ax * by - ay * bx;
  return out;
};

/**
 * Performs a linear interpolation between two vec3's
 *
 * @param {!vec3} out the receiving vector
 * @param {!vec3} a the first operand
 * @param {!vec3} b the second operand
 * @param {number} t interpolation amount, in the range [0-1], between the two inputs
 * @return {!vec3} out
 */
vec3.lerp = (out, a, b, t) => {
  out[0] = a[0] + t * (b[0] - a[0]);
  out[1] = a[1] + t * (b[1] - a[1]);
  out[2] = a[2] + t * (b[2] - a[2]);
  return out;
};

/**
 * Transforms the vec3 with a mat4.
 * 4th vector component is implicitly '1'
 *
 * @param {!vec3} out the receiving vector
 * @param {!vec3} a the vector to transform
 * @param {!mat4} m matrix to transform with
 * @return {!vec3} out
 */
vec3.transformMat4 = (out, a, m) => {
  const x = a[0]; const y = a[1]; const z = a[2];
  let w = m[3] * x + m[7] * y + m[11] * z + m[15];
  w = w || 1.0;
  out[0] = (m[0] * x + m[4] * y + m[8] * z + m[12]) / w;
  out[1] = (m[1] * x + m[5] * y + m[9] * z + m[13]) / w;
  out[2] = (m[2] * x + m[6] * y + m[10] * z + m[14]) / w;
  return out;
};

/**
 * Rotate a 3D vector around the x-axis
 * @param {!vec3} out The receiving vec3
 * @param {!vec3} a The vec3 point to rotate
 * @param {!vec3} b The origin of the rotation
 * @param {number} c The angle of rotation
 * @return {!vec3} out
 */
vec3.rotateX = (out, a, b, c) => {
  const p = []; const r = [];
  // Translate point to the origin
  p[0] = a[0] - b[0];
  p[1] = a[1] - b[1];
  p[2] = a[2] - b[2];

  // perform rotation
  r[0] = p[0];
  r[1] = p[1] * Math.cos(c) - p[2] * Math.sin(c);
  r[2] = p[1] * Math.sin(c) + p[2] * Math.cos(c);

  // translate to correct position
  out[0] = r[0] + b[0];
  out[1] = r[1] + b[1];
  out[2] = r[2] + b[2];

  return out;
};

/**
 * Rotate a 3D vector around the y-axis
 * @param {!vec3} out The receiving vec3
 * @param {!vec3} a The vec3 point to rotate
 * @param {!vec3} b The origin of the rotation
 * @param {number} c The angle of rotation
 * @return {!vec3} out
 */
vec3.rotateY = (out, a, b, c) => {
  const p = []; const r = [];
  // Translate point to the origin
  p[0] = a[0] - b[0];
  p[1] = a[1] - b[1];
  p[2] = a[2] - b[2];

  // perform rotation
  r[0] = p[2] * Math.sin(c) + p[0] * Math.cos(c);
  r[1] = p[1];
  r[2] = p[2] * Math.cos(c) - p[0] * Math.sin(c);

  // translate to correct position
  out[0] = r[0] + b[0];
  out[1] = r[1] + b[1];
  out[2] = r[2] + b[2];

  return out;
};

/**
 * Rotate a 3D vector around the z-axis
 * @param {!vec3} out The receiving vec3
 * @param {!vec3} a The vec3 point to rotate
 * @param {!vec3} b The origin of the rotation
 * @param {number} c The angle of rotation
 * @return {!vec3} out
 */
vec3.rotateZ = (out, a, b, c) => {
  const p = []; const r = [];
  // Translate point to the origin
  p[0] = a[0] - b[0];
  p[1] = a[1] - b[1];
  p[2] = a[2] - b[2];

  // perform rotation
  r[0] = p[0] * Math.cos(c) - p[1] * Math.sin(c);
  r[1] = p[0] * Math.sin(c) + p[1] * Math.cos(c);
  r[2] = p[2];

  // translate to correct position
  out[0] = r[0] + b[0];
  out[1] = r[1] + b[1];
  out[2] = r[2] + b[2];

  return out;
};

/**
 * Get the angle between two 3D vectors
 * @param {!vec3} a The first operand
 * @param {!vec3} b The second operand
 * @return {number} The angle in radians
 */
vec3.angle = (a, b) => {
  const tempA = vec3.fromValues(a[0], a[1], a[2]);
  const tempB = vec3.fromValues(b[0], b[1], b[2]);

  vec3.normalize(tempA, tempA);
  vec3.normalize(tempB, tempB);

  const cosine = vec3.dot(tempA, tempB);

  if (cosine > 1.0) {
    return 0;
  } else if (cosine < -1.0) {
    return Math.PI;
  } else {
    return Math.acos(cosine);
  }
};

/**
 * Returns a string representation of a vector
 *
 * @param {!vec3} a vector to represent as a string
 * @return {string} string representation of the vector
 */
vec3.str = (a) => {
  return 'vec3(' + a[0].toFixed(4) + ', ' + a[1].toFixed(4) + ', ' + a[2].toFixed(4) + ')';
};

/**
 * Returns whether or not the vectors have exactly the same elements in the same position (when compared with ===)
 *
 * @param {!vec3} a The first vector.
 * @param {!vec3} b The second vector.
 * @return {boolean} True if the vectors are equal, false otherwise.
 */
vec3.exactEquals = (a, b) => {
  return a[0] === b[0] && a[1] === b[1] && a[2] === b[2];
};

/**
 * Returns whether or not the vectors have approximately the same elements in the same position.
 *
 * @param {!vec3} a The first vector.
 * @param {!vec3} b The second vector.
 * @return {boolean} True if the vectors are equal, false otherwise.
 */
vec3.equals = (a, b) => {
  const a0 = a[0]; const a1 = a[1]; const a2 = a[2];
  const b0 = b[0]; const b1 = b[1]; const b2 = b[2];
  return (Math.abs(a0 - b0) <= EPSILON * Math.max(1.0, Math.abs(a0), Math.abs(b0)) &&
    Math.abs(a1 - b1) <= EPSILON * Math.max(1.0, Math.abs(a1), Math.abs(b1)) &&
    Math.abs(a2 - b2) <= EPSILON * Math.max(1.0, Math.abs(a2), Math.abs(b2)));
};

// glMatrix - mat4
// https://github.com/toji/gl-matrix/blob/master/src/gl-matrix/mat4.js

/** @typedef {!Float32Array} */
const mat4 = {};

/**
 * Creates a new identity mat4
 *
 * @return {!mat4} a new 4x4 matrix
 */
mat4.create = () => {
  const out = new Float32Array(16);
  out[0] = 1;
  out[5] = 1;

  out[2] = a02 * c + a12 * s;
  out[3] = a03 * c + a13 * s;
  out[4] = a10 * c - a00 * s;
  out[5] = a11 * c - a01 * s;
  out[6] = a12 * c - a02 * s;
  out[7] = a13 * c - a03 * s;
  return out;
};

/**
 * Returns the translation vector component of a transformation
 *  matrix. If a matrix is built with fromRotationTranslation,
 *  the returned vector will be the same as the translation vector
 *  originally supplied.
 * @param  {!vec3} out Vector to receive translation component
 * @param  {!mat4} mat Matrix to be decomposed (input)
 * @return {!vec3} out
 */
mat4.getTranslation = (out, mat) => {
  out[0] = mat[12];
  out[1] = mat[13];
  out[2] = mat[14];

  return out;
};

/**
 * Generates a perspective projection matrix with the given bounds
 *
 * @param {!mat4} out mat4 frustum matrix will be written into
 * @param {number} fovy Vertical field of view in radians
 * @param {number} aspect Aspect ratio. typically viewport width/height
 * @param {number} near Near bound of the frustum
 * @param {number} far Far bound of the frustum
 * @return {!mat4} out
 */
mat4.perspective = (out, fovy, aspect, near, far) => {
  const f = 1.0 / Math.tan(fovy / 2);
  const nf = 1 / (near - far);
  out[0] = f / aspect;
  out[1] = 0;
  out[2] = 0;
  out[3] = 0;
  out[4] = 0;
  out[5] = f;
  out[6] = 0;
  out[7] = 0;
  out[8] = 0;
  out[9] = 0;
  out[10] = -(far + near) * nf;
  out[11] = 1;
  out[12] = 0;
  out[13] = 0;
  out[14] = 2 * far * near * nf;
  out[15] = 0;
  return out;
};

/**
 * Identity transform.
 * Uniform face distribution.
 * @param {number} x
 * @return {number}
 */
const identityTransform = (x) => x;

/**
 * Sigmoid transform.
 * Can be used as the densityTransform in buildFace.
 * Pushes more faces to the corners.
 * @param {number} x
 * @return {number}
 */
const sigmoidTransform = (x) => 0.5 + 0.5 * Math.tanh((x - 0.5) * 10);

/**
 * Builds a rounded cube.
 * @param {number} n Number of quads per axis per face.
 * @param {number} maxRadius Maximum distance of a point from the origin.
 * @param {function(number): number} densityTransform
 * @return {!Float32Array}
 */
const buildRoundedCube = (n, maxRadius, densityTransform) => {
  // Output data
  const data = [];

  // The 8 corners of the unit cube
  const p1 = vec3.fromValues(-1, 1, -1);
  const p2 = vec3.fromValues(1, 1, -1);
  const p3 = vec3.fromValues(1, 1, 1);
  const p4 = vec3.fromValues(-1, 1, 1);
  const p5 = vec3.fromValues(-1, -1, -1);
  const p6 = vec3.fromValues(1, -1, -1);
  const p7 = vec3.fromValues(1, -1, 1);
  const p8 = vec3.fromValues(-1, -1, 1);

  // Temp variables for face edges
  const di = vec3.create();
  const dj = vec3.create();

  // Temp variables for 4 corners of a single quad
  const tmp1 = vec3.create();
  const tmp2 = vec3.create();
  const tmp3 = vec3.create();
  const tmp4 = vec3.create();

  /**
   * Builds a rounded face.
   * @param {!vec3} origin
   * @param {!vec3} topRight
   * @param {!vec3} bottomLeft
   */
  const buildFace = (origin, topRight, bottomLeft) => {
    vec3.subtract(di, topRight, origin);
    vec3.subtract(dj, bottomLeft, origin);

    /**
     * Builds a point for the given i and j.
     * @param {!vec3} out
     * @param {number} i
     * @param {number} j
     */
    const buildPoint = (out, i, j) => {
      vec3.scaleAndAdd(out, origin, di, densityTransform(i / n));
      vec3.scaleAndAdd(out, out, dj, densityTransform(j / n));
      const len = vec3.magnitude(out);
      if (len > maxRadius) {
        vec3.scale(out, out, maxRadius / len);
      }
    };

    for (let i = 0; i < n; i++) {
      for (let j = 0; j < n; j++) {
        buildPoint(tmp1, i, j);
        buildPoint(tmp2, i + 1, j);
        buildPoint(tmp3, i + 1, j + 1);
        buildPoint(tmp4, i, j + 1);
        addQuad(data, tmp1, tmp2, tmp3, tmp4);
      }
    }
  };

  // Top
  buildFace(p1, p2, p4);

  // Bottom
  buildFace(p8, p7, p5);

  // Back / South
  buildFace(p2, p1, p6);

  // Front / North
  buildFace(p4, p3, p8);

  // Left / West
  buildFace(p1, p4, p5);

  // Right / East
  buildFace(p3, p2, p7);

  return new Float32Array(data);
};

/**
 * Adds a quad to the buffer set.
 * @param {!Array.<number>} data
 * @param {!vec3} p1
 * @param {!vec3} p2
 * @param {!vec3} p3
 * @param {!vec3} p4
 */
const addQuad = (data, p1, p2, p3, p4) => {
  addTriangle(data, p1, p2, p3);
  addTriangle(data, p1, p3, p4);
};

/**
 * Adds a triangle to the buffer set.
 * @param {!Array.<number>} data
 * @param {!vec3} p1
 * @param {!vec3} p2
 * @param {!vec3} p3
 */
const addTriangle = (data, p1, p2, p3) => {
  addPoint(data, p1);
  addPoint(data, p2);
  addPoint(data, p3);
};

/**
 * Adds a point
 * @param {!Array.<number>} data
 * @param {!vec3} p
 * @return {number}
 */
const addPoint = (data, p) => data.push(...p);

/**
 * Components refer to the GLSL inputs.
 * They can be 32 bit floats (for vec3 coordinates and transformation matrices),
 * or they can be 32 bit unsigned integers (for colors).
 * @const {number}
 */
const BYTES_PER_COMPONENT = 4;

/**
 * Vertices are simple 3-dimensional vectors.
 * No color or texture data is on the vertex.
 * @const {number}
 */
const COMPONENTS_PER_VERTEX = 3;

/** @const {number} */
const BYTES_PER_VERTEX = COMPONENTS_PER_VERTEX * BYTES_PER_COMPONENT;

/** @const {number} */
const COMPONENTS_PER_MATRIX = 4 * 4;

/** @const {number} */
const BYTES_PER_MATRIX = COMPONENTS_PER_MATRIX * BYTES_PER_COMPONENT;

/**
 * Each instance has one 32-bit color and one 4x4 transofrmation matrix.
 * @const {number}
 */
const COMPONENTS_PER_INSTANCE = 1 + COMPONENTS_PER_MATRIX;

/** @const {number} */
const BYTES_PER_INSTANCE = COMPONENTS_PER_INSTANCE * BYTES_PER_COMPONENT;

/** @typedef {number} */
let GLenum;

/**
 * The BufferSet class represents a collection of WebGL buffers for a render pass.
 *
 * There are 2 buffers:
 * 1) Geometry data.  This is the same for each instance.
 * 2) Instance data.  This is different for each instance.
 *
 * Geometry data includes:
 * 1) Position coordinates (x, y, z) in unit space.
 * 2) That's it.  No color or texture data.
 *
 * Geometry therefore is 3 float components = 12 bytes.
 *
 * Instance data includes:
 * 1) A 32-bit color.
 * 2) Model matrix (4x4 transformation)
 *
 * Instance data therefore is 17 float components = 68 bytes.
 */
class BufferSet {
  /**
   * Creates a new buffer set.
   *
   * @param {!GLenum} usage The usage pattern (either STATIC_DRAW or DYNAMIC_DRAW).
   * @param {!Float32Array} geometry The unit geometry for a single instance.
   * @param {number} maxInstances Maximum number of instances.
   */
  constructor(usage, geometry, maxInstances) {
    /** @const {!GLenum} */
    this.usage = usage;

    /** @const {number} */
    this.verticesPerInstance = geometry.length / COMPONENTS_PER_VERTEX;

    /** @type {number}  */
    this.instanceCount = 0;

    /** @const {!WebGLVertexArrayObject} */
    this.vao = /** @type {!WebGLVertexArrayObject} */ (gl.createVertexArray());
    gl.bindVertexArray(this.vao);

    /** @const {!WebGLBuffer} */
    this.geometryBuffer = /** @type {!WebGLBuffer} */ (gl.createBuffer());

    gl.bindBuffer(ARRAY_BUFFER, this.geometryBuffer);
    gl.bufferData(ARRAY_BUFFER, geometry, STATIC_DRAW);

    // Geometry attributes
    // One vertex is [x, y, z], 3 components, 12 bytes
    gl.enableVertexAttribArray(positionAttrib);
    gl.vertexAttribPointer(positionAttrib, 3, FLOAT, false, BYTES_PER_VERTEX, 0);

    /** @const {!Uint32Array} */
    this.instanceData = new Uint32Array(maxInstances * COMPONENTS_PER_INSTANCE);

    /** @const {!WebGLBuffer} */
    this.instanceBuffer = /** @type {!WebGLBuffer} */ (gl.createBuffer());

    gl.bindBuffer(ARRAY_BUFFER, this.instanceBuffer);
    gl.bufferData(ARRAY_BUFFER, this.instanceData, usage);

    // Instance attributes
    // Colors and model matrices are interleaved
    // One vertex is [color, mat4], 17 components, 68 bytes
    // Actually...
    // In JavaScript code, we refer to color as a single 32-bit number
    // In GLSL code, we refer to color as a vec4, composed of 4 unsigned bytes.
    gl.enableVertexAttribArray(colorAttrib);
    gl.vertexAttribPointer(colorAttrib, 4, UNSIGNED_BYTE, true, BYTES_PER_INSTANCE, 0);
    gl.vertexAttribDivisor(colorAttrib, 1);

    /** @const {!Array.<!mat4>} */
    this.matrices = new Array(maxInstances);
    for (let i = 0; i < maxInstances; i++) {
      // Find the offset for the matrix...
      // Jump to the offset for the instance (i * BYTES_PER_INSTANCE)
      // plus one component for the color (1 * BYTES_PER_COMPONENT)
      const byteOffsetToMatrix = 1 * BYTES_PER_COMPONENT + i * BYTES_PER_INSTANCE;
      this.matrices[i] = new Float32Array(
          this.instanceData.buffer,
          byteOffsetToMatrix,
          COMPONENTS_PER_MATRIX);
    }

    gl.enableVertexAttribArray(worldMatrixAttrib);

    // Set all 4 attributes for matrix
    // Technically a matrix is passed in as 4 separate vec4's
    for (let i = 0; i < 4; i++) {
      const loc = worldMatrixAttrib + i;
      gl.enableVertexAttribArray(loc);
      // Calculate the stride and offset for each matrix row
      // Stride is simple: one stride per instance -> BYTES_PER_INSTANCE
      // Offset is a little more tricky:
      // First, 8 bytes for the texture offset (2 components * 4 bytes per float)
      // Plus i * 16 for 4 floats per row * 4 bytes per float
      const offset = 4 + i * 16;
      gl.vertexAttribPointer(
          loc, // location
          4, // size (num values to pull from buffer per iteration)
          FLOAT, // type of data in buffer
          false, // normalize
          BYTES_PER_INSTANCE, // stride, num bytes to advance to get to next set of values
          offset, // offset in buffer
      );
      // this line says this attribute only changes for each 1 instance
      gl.vertexAttribDivisor(loc, 1);
    }
  }

  /**
   * Resets the buffers to empty state.
   */
  resetBuffers() {
    this.instanceCount = 0;
  }

  /**
   * Adds a new instance to the set.
   * @param {number} color The 32-bit color.
   * @return {!mat4}
   */
  addInstance(color) {
    const i = this.instanceCount++;
    if (DEBUG) {
      if (i * COMPONENTS_PER_INSTANCE >= this.instanceData.length) {
        throw new Error('Out of instances ' +
          '(i=' + i + ', max=' + (this.instanceData.length / COMPONENTS_PER_INSTANCE) + ')');
      }
    }
    this.instanceData[i * COMPONENTS_PER_INSTANCE] = color;
    return mat4.identity(this.matrices[i]);
  }

  /**
   * Updates the WebGL buffers with the current data.
   */
  updateBuffers() {
    gl.bindBuffer(ARRAY_BUFFER, this.instanceBuffer);
    gl.bufferData(ARRAY_BUFFER, this.instanceData, this.usage);
  }

  /**
   * Draws the buffer set.
   */
  render() {
    gl.bindVertexArray(this.vao);

    if (this.usage === DYNAMIC_DRAW) {
      // TODO:  Combine this with updateBuffers
      // Can these be called before bindVertex array?
      // TODO:  Use overload to only update minimum number of elements
      // Use bufferSubData for number of instances * BYTES_PER_INSTANCE
      gl.bindBuffer(ARRAY_BUFFER, this.instanceBuffer);
      // gl.bufferData(ARRAY_BUFFER, this.instanceData, this.usage);
      // void gl.bufferSubData(target, dstByteOffset, ArrayBufferView srcData, srcOffset, length);
      gl.bufferSubData(ARRAY_BUFFER, 0, this.instanceData, 0, this.instanceCount * COMPONENTS_PER_INSTANCE);
    }

    gl.drawArraysInstanced(TRIANGLES, 0, this.verticesPerInstance, this.instanceCount);
  }
}

/**

 * @const {boolean}
 */
const KEYBOARD_ENABLED = true;

const KEY_COUNT = 256;
const KEY_ENTER = 13;
const KEY_SHIFT = 16;

const KEY_7 = 55;
const KEY_8 = 56;
const KEY_9 = 57;
const KEY_A = 65;
const KEY_D = 68;
const KEY_M = 77;
const KEY_Q = 81;
const KEY_R = 82;
const KEY_S = 83;
const KEY_W = 87;
const KEY_X = 88;
const KEY_Z = 90;


/**
 * @typedef {{
 *            down:boolean,
 *            downCount:number,
 *            upCount:number
 *          }}
 */
let Key;

/**
 * Array of keyboard keys.
 * @const {!Array.<!Key>}
 */
const keys = new Array(256).fill(undefined).map(() => ({down: false, downCount: 0, upCount: 1}));

/**
 * All keys update this key.
 */
const anyKey = {down: false, downCount: 0, upCount: 1};

/**
 * Updates keyboard state.
 */
const updateKeys = () => {
  anyKey.down = false;
  keys.forEach((k) => {
    if (k.down) {
      anyKey.down = true;
      k.upCount = 0;
      k.downCount++;
    } else {
      k.upCount++;
      k.downCount = 0;
    }
  });

  if (anyKey.down) {
    anyKey.upCount = 0;
    anyKey.downCount++;
  } else {
    anyKey.upCount++;
    anyKey.downCount = 0;
  }
};

/**
 * Resets keyboard to all keys unpressed.
 */
const resetKeys = () => {
  anyKey.down = false;
  keys.forEach((k) => k.down = false);
  updateKeys();
};

/**
 * Returns if the key is down.
 * @param {number} keyCode
 * @return {boolean}
 */
const isKeyDown = (keyCode) => KEYBOARD_ENABLED && keys[keyCode].down;

/**
 * Returns if the key is down.
 * @param {number} keyCode
 * @return {boolean}
 */
const isKeyPressed = (keyCode) => KEYBOARD_ENABLED && keys[keyCode].upCount === 1;

document.addEventListener('keydown', (e) => {
  killEvent(e);
  keys[e.keyCode].down = true;
});

document.addEventListener('keyup', (e) => {
  killEvent(e);
  keys[e.keyCode].down = false;
});

window.addEventListener('blur', resetKeys);

/**
 * @typedef {{
 *            size:number,
 *            colorTexture:!WebGLTexture,
 *            depthTexture:!WebGLTexture,
 *            frameBuffer:!WebGLFramebuffer
 *          }}
 */
let FBO;

/**
 * Creates a FBO.
 * @param {number} size Size in pixels, both width and height.
 * @return {!FBO}
 */
const createFbo = (size) => {
  const colorTexture = gl.createTexture();
  gl.bindTexture(TEXTURE_2D, colorTexture);

  const level = 0;
  {
    // define size and format of level 0
    const internalFormat = RGBA;
    const border = 0;
    const format = RGBA;
    const type = UNSIGNED_BYTE;
    const data = null;
    gl.texImage2D(TEXTURE_2D, level, internalFormat,
        size, size, border,
        format, type, data);

    // set the filtering so we don't need mips
    gl.texParameteri(TEXTURE_2D, TEXTURE_MIN_FILTER, LINEAR);
    gl.texParameteri(TEXTURE_2D, TEXTURE_WRAP_S, CLAMP_TO_EDGE);
    gl.texParameteri(TEXTURE_2D, TEXTURE_WRAP_T, CLAMP_TO_EDGE);
  }

  const depthTexture = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, depthTexture);
  gl.texImage2D(
      TEXTURE_2D, // target
      0, // mip level
      DEPTH_COMPONENT32F,
      size, // width
      size, // height
      0, // border
      DEPTH_COMPONENT, // format
      FLOAT, // type
      null); // data
  gl.texParameteri(TEXTURE_2D, TEXTURE_MAG_FILTER, NEAREST);
  gl.texParameteri(TEXTURE_2D, TEXTURE_MIN_FILTER, NEAREST);
  gl.texParameteri(TEXTURE_2D, TEXTURE_WRAP_S, CLAMP_TO_EDGE);
  gl.texParameteri(TEXTURE_2D, TEXTURE_WRAP_T, CLAMP_TO_EDGE);

  const framebuffer = gl.createFramebuffer();
  gl.bindFramebuffer(FRAMEBUFFER, framebuffer);
  gl.framebufferTexture2D(
      FRAMEBUFFER, // target
      COLOR_ATTACHMENT0, // attachment point
      TEXTURE_2D, // texture target
      colorTexture, // texture
      0); // mip level
  gl.framebufferTexture2D(
      FRAMEBUFFER, // target
      DEPTH_ATTACHMENT, // attachment point
      TEXTURE_2D, // texture target
      depthTexture, // texture

  overlayCtx.textBaseline = 'top';

  // Reset the dynamic buffers
  buffers.forEach((b) => b.usage === DYNAMIC_DRAW && b.resetBuffers());

  // Expect the global function "update()"
  update();

  // Update buffer data
  buffers.forEach((b) => b.usage === DYNAMIC_DRAW && b.updateBuffers());

  // Draw the scene twice
  // First, draw from the POV of the light
  bindFbo(shadowFbo);
  resetGl();
  setupCamera(lightSource, shadowFbo.size, shadowFbo.size);
  gl.useProgram(shadowProgram);
  gl.uniformMatrix4fv(projectionMatrixUniform1, false, projectionMatrix);
  gl.uniformMatrix4fv(viewMatrixUniform1, false, modelViewMatrix);
  renderScene();

  // Build the texture matrix that maps the world space to the depth texture
  mat4.identity(shadowMapMatrix);
  mat4.translate(shadowMapMatrix, shadowMapMatrix, vec3.fromValues(0.5, 0.5, 0.5));
  mat4.scale(shadowMapMatrix, shadowMapMatrix, vec3.fromValues(0.5, 0.5, 0.5));
  mat4.multiply(shadowMapMatrix, shadowMapMatrix, projectionMatrix);
  mat4.multiply(shadowMapMatrix, shadowMapMatrix, modelViewMatrix);

  // Second, draw the scene from the POV of the camera
  // Use the shadow map for lighting
  bindFbo(mainFbo);
  resetGl();
  setupCamera(camera, WIDTH, HEIGHT);
  gl.useProgram(mainProgram);
  gl.uniformMatrix4fv(projectionMatrixUniform2, false, projectionMatrix);
  gl.uniformMatrix4fv(viewMatrixUniform2, false, modelViewMatrix);
  gl.uniformMatrix4fv(shadowMapMatrixUniform, false, shadowMapMatrix);
  gl.uniform3fv(lightColorsUniform, lightColors);
  gl.uniform3fv(lightPositionsUniform, lightPositions);
  gl.activeTexture(TEXTURE0);
  gl.bindTexture(TEXTURE_2D, shadowFbo.depthTexture);
  gl.uniform1i(depthTextureSamplerUniform, 0);
  renderScene();

  // Second, draw the scene projecting the depth tecture
  // Use the ping pong technique to render back and forth between two FBOs
  // 6 iteration process:
  //  0 = filter for emissive pixels
  //  1 and 3 = blur horizontally
  //  2 and 4 = blur vertically
  //  5 = result to output
  let inputFbo = mainFbo;
  let outputFbo = pingPongFbo1;
  gl.useProgram(bloomProgram);
  const bloomPasses = IS_MOBILE ? 3 : 5;
  for (let i = 0; i < bloomPasses; i++) {
    bindFbo(outputFbo);
    resetGl();
    gl.bindVertexArray(depthOfFieldVao);
    gl.activeTexture(TEXTURE0);
    gl.bindTexture(TEXTURE_2D, inputFbo.colorTexture);
    gl.uniform1i(bloomColorTextureUniform, 0);
    gl.uniform1i(bloomIterationUniform, i);
    gl.drawArrays(TRIANGLES, 0, 6);

    // Swap buffers
    if (i % 2 === 0) {
      inputFbo = pingPongFbo1;
      outputFbo = pingPongFbo2;
    } else {
      inputFbo = pingPongFbo2;
      outputFbo = pingPongFbo1;
    }
  }

  // Lastly, draw the post-processing effects
  // This includes the adding the bloom blur
  // and the depth-of-field blur
  bindScreen();
  gl.useProgram(depthOfFieldProgram);
  gl.clearColor(0, 0, 0, 1.0);
  gl.clear(COLOR_BUFFER_BIT | DEPTH_BUFFER_BIT);
  gl.bindVertexArray(depthOfFieldVao);
  gl.activeTexture(TEXTURE0);
  gl.bindTexture(TEXTURE_2D, mainFbo.colorTexture);
  gl.uniform1i(depthOfFieldColorTextureUniform, 0);
  gl.activeTexture(TEXTURE1);
  gl.bindTexture(TEXTURE_2D, mainFbo.depthTexture);
  gl.uniform1i(depthOfFieldDepthTextureUniform, 1);
  gl.activeTexture(TEXTURE2);
  gl.bindTexture(TEXTURE_2D, pingPongFbo1.colorTexture);
  gl.uniform1i(depthOfFieldBloomTextureUniform, 2);
  gl.drawArrays(TRIANGLES, 0, 6);

  requestAnimationFrame(render);
}
requestAnimationFrame(render);

/**
 * Render the scene using the current camera and buffers.
 */
function renderScene() {
  buffers.forEach((b) => b.render());
}

/**
 * Resets the current lighting values.
 */
function resetLights() {
  lightColors.fill(0);
  lightPositions.fill(0);
  nextLight = 0;
}

/**
 * Adds a light.
 * @param {!vec3} position
 * @param {!vec3} color
 */
function addLight(position, color) {
  lightColors[nextLight * 3] = color[0];
  lightColors[nextLight * 3 + 1] = color[1];
  lightColors[nextLight * 3 + 2] = color[2];
  lightPositions[nextLight * 3] = position[0];
  lightPositions[nextLight * 3 + 1] = position[1];
  lightPositions[nextLight * 3 + 2] = position[2];
  nextLight++;
}

/**
 * The GameEntity class represents an entity in the game.
 */
class GameEntity {
  /**
   * Creates a new game entity.
   * @param {number=} x
   * @param {number=} y
   * @param {number=} z
   */
  constructor(x, y, z) {
    /** @const {!vec3} */
    this.pos = vec3.fromValues(x || 0, y || 0, z || 0);

    /** @const {!vec3} */
    this.velocity = vec3.create();

    /** @const {!mat4} */
    this.transformMatrix = mat4.create();

    /** @type {number} */
    this.health = 100;

    /** @type {number} */
    this.yaw = 0;

    /** @type {boolean} */
    this.accelerating = false;

    /** @type {number} */
    this.groundedTime = 0;

    /** @type {?Platform} */
    this.groundedPlatform = null;

    /** @type {number} */
    this.shootTime = 0;

    /** @type {number} */
    this.bounciness = 0.0;

    /** @type {!Array.<!vec3>} */
    this.waypoints = [];

    /** @type {number} */
    this.waypointIndex = 0;

    /** @type {boolean} */
    this.rendered = true;
  }

  /**
   * Returns true if the entity is on the ground.
   * @return {boolean}
   */
  isGrounded() {
    return this.groundedTime === gameTime;
  }

  /**
   * Returns true if the entity can jump.
   * @return {boolean}
   */
  canShoot() {
    return (gameTime - this.shootTime) > 0.5;
  }

  /**
   * Launches the player.
   */
  jump() {
    this.velocity[1] = JUMP_POWER;
    this.groundedTime = 0;
    this.groundedPlatform = null;
    if (this === player) {
      playJumpSound();
    }
  }

  /**
   * Updates the entity.
   * By default, does nothing.
   */
  update() {
    // Subclasses should override
  }

  /**
   * Renders the entity.
   * By default, does nothing.
   * Static entities can use this default implementation.
   */
  render() {
    // Subclasses should override
  }

  /**
   * Returns the distance to the player.
   * @return {number} Distance to the player.
   */
  getDistanceToPlayer() {
    if (player.health <= 0) {
      return 1000;
    }
    return vec3.distance(player.pos, this.pos);
  }

  /**
   * Updates waypoints.
   * Silently ignores if no waypoints are setup.
   * @return {?vec3} The current waypoint if available.
   */
  updateWaypoints() {
    if (this.waypoints.length === 0) {
      return null;
    }
    const waypoint = this.waypoints[this.waypointIndex];
    if (vec3.distance(this.pos, waypoint) < 0.1) {
      this.waypointIndex = (this.waypointIndex + 1) % this.waypoints.length;
    }
    return waypoint;
  }

  /**
   * Sets up the default transform matrix.
   */
  setupTransformMatrix() {
    const theta = time * 20;
    const speed = Math.hypot(this.velocity[0], this.velocity[2]);
    const bodyOffsetY = this.bounciness * Math.sin(theta) * speed;
    const bodyRotationX = 0.02 * speed;

    vec3.copy(tempVec, this.pos);

    if (this.isGrounded()) {
      tempVec[1] += bodyOffsetY;
    }

    mat4.identity(this.transformMatrix);
    mat4.translate(this.transformMatrix, this.transformMatrix, tempVec);
    mat4.rotateY(this.transformMatrix, this.transformMatrix, this.yaw);
    mat4.rotateX(this.transformMatrix, this.transformMatrix, bodyRotationX);
  }

  /**
   * Creates a new sphere transformed to instance space.
   * @param {number} color
   * @return {!mat4}
   */
  createSphere(color) {
    const m = buffers[DYNAMIC_SPHERES].addInstance(color);
    mat4.multiply(m, m, this.transformMatrix);
    return m;
  }
}

/**
 * The Alien class represents a small mostly harmless enemy.
 */
class Alien extends GameEntity {
  /**
   * Creates a new alien.
   * @param {number=} x
   * @param {number=} y
   * @param {number=} z
   */
  constructor(x, y, z) {
    super(x, y, z);

    /**
     * Alien acceleration power in meters per second per second.
     * @type {number}
     */
    this.acceleration = 60.0;

    /**
     * Distance from player before aggro.
     * @type {number}
     */
    this.aggroRange = 15;

    /**
     * Alien color.
     * @type {number}
     */
    this.color = COLOR_ALIEN_GREEN;

    this.bounciness = 0.01;
  }

  /**
   * Updates the alien.
   * @override
   */
  update() {
    const waypoint = this.updateWaypoints();
    const dist = this.getDistanceToPlayer();
    if (dist < 1.5) {
      if (player.pos[1] > this.pos[1]) {
        this.health = 0;
        player.pos[1] = this.pos[1] + 2.0;
        player.jump();
        createExplosion(this.pos, this.color, 15);
      } else {
        player.health = 0;
        player.rendered = false;
        playerDie();
        createExplosion(player.pos, this.color);
      }
    } else if (dist < this.aggroRange) {
      // Walk toward player
      vec3.subtract(tempVec, player.pos, this.pos);
      tempVec[1] = 0;
      vec3.normalize(tempVec, tempVec);
      vec3.scaleAndAdd(this.velocity, this.velocity, tempVec, dt * this.acceleration);
    } else if (waypoint) {
      // Walk toward waypoint
      vec3.subtract(tempVec, waypoint, this.pos);
      vec3.normalize(tempVec, tempVec);
      vec3.scaleAndAdd(this.velocity, this.velocity, tempVec, dt * this.acceleration);
    }
    updateEntity(this);
  }

  /**
   * Renders the alien.
   * @override
   */
  render() {
    // Draw alien main body
    {
      const m = this.createSphere(this.color);
      mat4.translate(m, m, vec3.fromValues(0, 0.8, 0));
      mat4.scale(m, m, vec3.fromValues(0.8, 0.8, 0.7));
    }

    // Draw left eye
    {
      const m = this.createSphere(COLOR_BLACK);
      mat4.translate(m, m, vec3.fromValues(-0.25, .9, 0.7));
      mat4.rotateZ(m, m, -1);
      mat4.scale(m, m, vec3.fromValues(0.2, 0.1, 0.025));
    }

    // Draw right eye
    {
      const m = this.createSphere(COLOR_BLACK);
      mat4.translate(m, m, vec3.fromValues(0.25, .9, 0.7));
      mat4.rotateZ(m, m, 1);
      mat4.scale(m, m, vec3.fromValues(0.2, 0.1, 0.025));
    }
  }
}

/**
 * The Coin class represents a gold coin that the player can pick up.
 */
class Coin extends GameEntity {
  /**
   * Updates the coin.
   * @override
   */
  update() {
    const dist = this.getDistanceToPlayer();
    if (dist < 1.0) {
      // Give the player a coin
      this.health = 0;
      coins++;
      coinSequence++;
      lastCoinTime = gameTime;
      playCoinSound();
    } else if (dist < 3) {
      // Move the coin toward the player
      this.pos[0] = 0.9 * this.pos[0] + 0.1 * player.pos[0];
      this.pos[1] = 0.9 * this.pos[1] + 0.1 * player.pos[1];
      this.pos[2] = 0.9 * this.pos[2] + 0.1 * player.pos[2];
    }
  }

  /**
   * Renders the coin.
   * @override
   */
  render() {
    const r = (time % 1.0) * 2 * Math.PI;
    const y = 1.5 + 0.2 * Math.sin(r);
    const m = this.createSphere(COLOR_YELLOW);
    mat4.translate(m, m, vec3.fromValues(0, y, 0));
    mat4.rotateY(m, m, r);
    mat4.scale(m, m, vec3.fromValues(0.5, 0.5, 0.1));
  }
}

/**
 * Kang is the final boss.
 */
class Kang extends GameEntity {
  /**
   * Creates Kang.
   */
  constructor() {
    super(16, 5, 16);

    /**
     * The next time Kang will shoot.
     * When gameTime > nextShootTime, Kang shoots,
     * and then the time is reset.
     */
    this.nextShootTime = 0;
  }

  /**
   * Updates Kang.
   * @override
   */
  update() {
    // Face the player
    this.yaw = Math.atan2(player.pos[0] - this.pos[0], player.pos[2] - this.pos[2]);

    // Float up and down
    this.pos[1] = player.pos[1] + 6.0 + Math.sin(time * 2);
    this.velocity[1] = 0;

    if (gameState === GameState.PLAYING &&
      gameTime > this.nextShootTime &&
      player.health > 0) {
      const projectile = new Particle();
      projectile.projectile = ProjectileType.Enemy;
      projectile.color = 0xFF4040FF;
      projectile.deathRate = 10;
      projectile.lightColor = vec3.fromValues(1.0, 0.0, 0.0);
      projectile.size = 0.5;
      vec3.copy(projectile.pos, this.pos);
      projectile.pos[1] += 3.0;
      const target = vec3.fromValues(player.pos[0], player.pos[1] + 1, player.pos[2]);
      vec3.subtract(projectile.velocity, target, projectile.pos);
      vec3.normalize(projectile.velocity, projectile.velocity);
      vec3.scale(projectile.velocity, projectile.velocity, 40);
      entities.push(projectile);
      this.nextShootTime = gameTime + 5;
      playKangShootSound();
    }
  }

  /**
   * Renders the Kang.
   * @override
   */
  render() {
    mat4.identity(this.transformMatrix);
    mat4.translate(this.transformMatrix, this.transformMatrix, this.pos);
    mat4.rotateY(this.transformMatrix, this.transformMatrix, this.yaw);

    // Draw Kang main body
    {
      const m = this.createSphere(COLOR_ALIEN_GREEN);
      mat4.scale(m, m, vec3.fromValues(3, 7, 3));
    }

    // Draw white of eye
    {
      const m = this.createSphere(COLOR_KANG_EYE_YELLOW);
      mat4.translate(m, m, vec3.fromValues(0, 3, 1.2));
      mat4.scale(m, m, vec3.fromValues(2, 2, 2));
    }

    // Draw black of eye
    {
      const remaining = this.nextShootTime - gameTime;
      const charge = Math.min((5.0 - remaining) / 4.5, 1.0);
      const color = 0xFF333333 + charge * 0xCC;
      const m = this.createSphere(color);
      mat4.translate(m, m, vec3.fromValues(0, 3, 3));
      mat4.scale(m, m, vec3.fromValues(0.5, 1.2, 0.3));
    }

const ProjectileType = {

  Player: 1,
  Enemy: 2,
};

/**
 * The Particle class represents a purely visual entity.
 * Particles are used for:
 *   1) Floaties - small specks that rise slowly and fade away.
 *   2) Running dust - dust clouds when entities run around.
 *   3) Explosion particles - flying everywhere.
 */
class Particle extends GameEntity {
  /**
   * Creates a new particle.
   * @param {number=} x
   * @param {number=} y
   * @param {number=} z
   */
  constructor(x, y, z) {
    super(x, y, z);

    /** @type {number} */
    this.size = 0.2;

    /** @type {number} */
    this.deathRate = 100;

    /** @type {number} */
    this.color = COLOR_WHITE;

    /** @const {!vec3} */
    this.acceleration = vec3.create();

    /** @type {?vec3} */
    this.lightColor = null;

    /** @type {!ProjectileType} */
    this.projectile = ProjectileType.None;
  }

  /**
   * Updates the particle.
   * @override
   */
  update() {
    vec3.scaleAndAdd(this.velocity, this.velocity, this.acceleration, dt);
    vec3.scaleAndAdd(this.pos, this.pos, this.velocity, dt);
    this.health -= dt * this.deathRate;

  render() {
    const radius = this.size * (this.health / 100);
    const m = this.createSphere(this.color);
    mat4.scale(m, m, vec3.fromValues(radius, radius, radius));

    if (this.lightColor) {
      addLight(this.pos, this.lightColor);
    }
  }
}

/**

 */
class Shooter extends GameEntity {
  /**
   * Creates Shooter.
   * @param {number} x
   * @param {number} y
   * @param {number} z
   * @param {number} yaw
   * @param {number} nextShootTime
   */
  constructor(x, y, z, yaw, nextShootTime) {
    super(x, y, z);

    this.yaw = yaw;

    /**
     * The next time Shooter will shoot.
     * When gameTime > nextShootTime, Shooter shoots,
     * and then the time is reset.
     */
    this.nextShootTime = nextShootTime;
  }

  /**
   * Updates Shooter.
   * @override
   */
  update() {
    // Float up and down
    this.pos[1] += dt * 0.5 * Math.sin(time * 2);
    this.velocity[1] = 0;

    if (gameState === GameState.PLAYING &&
      gameTime > this.nextShootTime &&
      player.health > 0) {
      const projectile = new Particle();
      projectile.projectile = ProjectileType.Enemy;
      projectile.color = 0xFF4040FF;
      projectile.deathRate = 10;
      projectile.lightColor = vec3.fromValues(1.0, 0.0, 0.0);
      projectile.size = 0.5;
      vec3.copy(projectile.pos, this.pos);
      projectile.pos[1] += 0.75;
      vec3.rotateY(projectile.velocity, forward, origin, this.yaw);
      vec3.scale(projectile.velocity, projectile.velocity, 20);
      entities.push(projectile);
      this.nextShootTime = gameTime + 5;
      playKangShootSound();
    }
  }

  /**
   * Renders the alien.
   * @override
   */
  render() {
    mat4.identity(this.transformMatrix);
    mat4.translate(this.transformMatrix, this.transformMatrix, this.pos);
    mat4.rotateY(this.transformMatrix, this.transformMatrix, this.yaw);

const Channel = {};

const Pattern = {};

/** @typedef {!Array.<number>} */

/**
 * Converts a boolean to integer.
 * Technically, just using a boolean should do this automatically.
 * However...
 * 1) Google Closure does not accept it.
 * 2) It is apparently very slow.
 * @param {boolean} b
 * @return {number}
 */
const boolToInt = (b) => b ? 1 : 0;

/**
 * Generate a song
 *
 * @param {!Array.<!Instrument>} instruments - Array of ZzFX sound paramaters.
 * @param {!Array.<!Pattern>} patterns - Array of pattern data.
 * @param {!Array.<number>} sequence - Array of pattern indexes.
 * @param {number=} BPM - Playback speed of the song (in BPM).
 * @return {!Array.<!Array.<number>>} Left and right channel sample data.
 */
const zzfxM = (instruments, patterns, sequence, BPM = 125) => {
  let instrumentParameters;
  let i;
  let j;
  let k;
  let note;
  let sample;
  let patternChannel;
  let notFirstBeat;
  let stop;
  let instrument;
  let attenuation;
  let outSampleOffset;
  let isSequenceEnd;
  let sampleOffset = 0;
  let nextSampleOffset;
  let sampleBuffer = [];
  const leftChannelBuffer = [];
  const rightChannelBuffer = [];
  let channelIndex = 0;
  let panning = 0;
  let hasMore = 1;
  const sampleCache = {};
  const beatLength = zzfxR / BPM * 60 >> 2;

  // for each channel in order until there are no more
  for (; hasMore; channelIndex++) {
    // reset current values
    sampleBuffer = [hasMore = notFirstBeat = outSampleOffset = 0];

    // for each pattern in sequence
    sequence.map((patternIndex, sequenceIndex) => {
      // get pattern for current channel, use empty 1 note pattern if none found
      patternChannel = patterns[patternIndex][channelIndex] || [0, 0, 0];

      // check if there are more channels
      hasMore |= boolToInt(!!patterns[patternIndex][channelIndex]);

      // get next offset, use the length of first channel
      nextSampleOffset = outSampleOffset +
        (patterns[patternIndex][0].length - 2 - boolToInt(!notFirstBeat)) * beatLength;

      // for each beat in pattern, plus one extra if end of sequence
      isSequenceEnd = sequenceIndex == sequence.length - 1;
      for (i = 2, k = outSampleOffset; i < patternChannel.length + isSequenceEnd; notFirstBeat = ++i) {
        // <channel-note>
        note = patternChannel[i];

        // stop if end, different instrument or new note
        stop = i == patternChannel.length + isSequenceEnd - 1 && isSequenceEnd ||
          boolToInt(instrument != (patternChannel[0] || 0)) | note | 0;

        // fill buffer with samples for previous beat, most cpu intensive part
        j = 0;
        while (j < beatLength && notFirstBeat) {
          // copy sample to stereo buffers with panning
          sample = (1 - attenuation) * sampleBuffer[sampleOffset++] / 2 || 0;
          leftChannelBuffer[k] = (leftChannelBuffer[k] || 0) - sample * panning + sample;
          rightChannelBuffer[k] = (rightChannelBuffer[k++] || 0) + sample * panning + sample;
          if (j++ > beatLength - 99 && stop) {
            attenuation += boolToInt(attenuation < 1) / 99;
          }
        }

        // set up for next note
        if (note) {
          // set attenuation
          attenuation = note % 1;
          panning = patternChannel[1] || 0;
          if (note |= 0) {
            // get cached sample
            sampleBuffer = sampleCache[
                [
                  instrument = patternChannel[sampleOffset = 0] || 0,
                  note,
                ]

              // add sample to cache
              instrumentParameters = [...instruments[instrument]],
              instrumentParameters[2] *= 2 ** ((note - 12) / 12),

              // allow negative values to stop notes
              note > 0 ? zzfxG(...instrumentParameters) : []
            );
          }
        }
      }

      // update the sample offset
      outSampleOffset = nextSampleOffset;
    });
  }

  return [leftChannelBuffer, rightChannelBuffer];
};

/**
* Reference to background music currently playing.

* @type {?AudioBufferSourceNode}
*/
let backgroundMusicNode = null;

/**
* Plays the music.
* @param {!Array} songData The song data.
* @param {boolean=} loop Flag to loop the song continuously.
*/
const playMusic = (songData, loop) => {
  const buffer = zzfxM(...songData); // Generate the sample data
  const node = zzfxP(...buffer); // Play the song
  if (loop) {
    stopBackgroundMusic();
    node.loop = true;
    backgroundMusicNode = node;
  }
};

/**
* Stops current background music.
*/
const stopBackgroundMusic = () => {
  if (backgroundMusicNode) {
    backgroundMusicNode.stop();
    backgroundMusicNode = null;
  }
};

/**
 * Toggles background music.
 * If playing, stops.
 * If not, starts.
 */
const toggleBackgroundMusic = () => {
  if (backgroundMusicNode) {
    stopBackgroundMusic();
    localStorage['music-off'] = 't';
  } else {
    playMusic(milkyWaySong, true);
    localStorage.removeItem('music-off');
  }
};

  if (gameState === GameState.CREDITS && menu !== mainMenu && menu !== levelsMenu) {
    menu = null;
    return;
  }

  if (gameState <= GameState.INTRO_STORY2 || menu === mainMenu || menu == levelsMenu) {
    setTextAlign(ALIGN_CENTER);
    setFontSize(24, 'italic');
    drawShadowText('THE ADVENTURES OF', CENTER_X, 60);
    setFontSize(64, 'italic');
    drawShadowText('CAPTAIN CALLISTO', CENTER_X, 120);

    drawShadowText('CONTINUE', 250, 500, menuY === 1 ? OVERLAY_YELLOW : OVERLAY_WHITE);
    drawShadowText('LEVELS', 250, 600, menuY === 2 ? OVERLAY_YELLOW : OVERLAY_WHITE);

    if (isKeyPressed(KEY_UP) || isKeyPressed(KEY_W)) {
      menuY = (menuY + 2) % 3;
      playMenuBeep();
    }
    if (isKeyPressed(KEY_DOWN) || isKeyPressed(KEY_S)) {
      menuY = (menuY + 1) % 3;
      playMenuBeep();
    }
    if (isKeyPressed(KEY_ESCAPE)) {
      resetKeys();
      setMenu(prevMenu);
      playMenuBeep();
    }
    if (isKeyPressed(KEY_ENTER) || isKeyPressed(KEY_SPACE) || isKeyPressed(KEY_Z)) {
      if (menuY === 0) {
        gameState = GameState.INTRO_STORY1;
        setLevel(0);
        initGame();
        setMenu(clickToStart);
        playMenuBeep();
      }
      if (menuY === 1) {
        setMenu(null);
        playMenuBeep();
      }
      if (menuY === 2) {
        setMenu(levelsMenu);
        playMenuBeep();
      }
    }
    return;
  }

  if (menu === levelsMenu) {
    setFontSize(32, 'italic');

    for (let i = 0; i < 10; i++) {
      setTextAlign(ALIGN_LEFT);
      drawShadowText(`LEVEL ${i + 1}`, 250, 350 + i * 60, menuY === i ? OVERLAY_YELLOW : OVERLAY_WHITE);

      const bestTime = bestTimes[i+1];

    if (isKeyPressed(KEY_DOWN) || isKeyPressed(KEY_S)) {

/**
 * Creates a platform.
 * 1) Makes all of the contained voxels solid.
 * 2) Adds the static geometry.
 * @param {number} x1
 * @param {number} y1
 * @param {number} z1
 * @param {number} x2
 * @param {number} y2
 * @param {number} z2
 * @param {number} color
 */
const createPlatform = (x1, y1, z1, x2, y2, z2, color) => {
  const platform = new Platform();
  vec3.set(platform.pos, (x1 + x2) / 2, (y1 + y2) / 2, (z1 + z2) / 2);
  vec3.set(platform.scale, (x2 - x1) / 2, (y2 - y1) / 2, (z2 - z1) / 2);
  entities.push(platform);
};

/**
 * Creates a grassy platform.
 * @param {number} x1
 * @param {number} y1
 * @param {number} z1
 * @param {number} x2
 * @param {number} y2
 * @param {number} z2
 * @param {boolean=} goombas
 */
const createMetalPlatform = (x1, y1, z1, x2, y2, z2, goombas) => {
  createPlatform(x1, y1, z1, x2, y2, z2, COLOR_SILVER);

  for (let x = x1 + 2; x < x2; x += 4) {
    for (let z = z1 + 2; z < z2; z += 4) {
      const m = buffers[STATIC_CUBES].addInstance(COLOR_DARK_BLUE);
      mat4.translate(m, m, vec3.fromValues(x, y2 + 0.01, z));
      mat4.scale(m, m, vec3.fromValues(1.8, 0.02, 1.8));
    }
  }

  const dx = x2 - x1;
  const dz = z2 - z1;

  // Add goombas
  if (goombas) {
    for (let i = 0; i < dx * dz * 0.01; i++) {
      const x = x1 + 0.5 + rng.nextFloat() * (dx - 1.0);
      const z = z1 + 0.5 + rng.nextFloat() * (dz - 1.0);
      const alien = new Alien();
      vec3.set(alien.pos, x, y2, z);
      entities.push(alien);
    }
  }
};

/**
 * Creates a lift.
 * Vertical moving platform.
 * @param {number} x1
 * @param {number} y1
 * @param {number} z1
 * @param {number} x2
 * @param {number} y2
 * @param {number} z2
 * @return {!Platform}
 */
const createLift = (x1, y1, z1, x2, y2, z2) => {
  const platform = new Platform();
  vec3.set(platform.pos, x1, y1, z1);
  vec3.set(platform.scale, 2, 0.3, 2);
  platform.waypoints = [
    vec3.fromValues(x1, y1, z1),
    vec3.fromValues(x2, y2, z2),
  ];
  entities.push(platform);
  return platform;
};

/**
 * Creates a row of coins.
 * @param {number} x1
 * @param {number} y1
 * @param {number} z1
 * @param {number} dx
 * @param {number} dz
 * @param {number} count
 */
const createCoins = (x1, y1, z1, dx, dz, count) => {
  let x = x1;
  let z = z1;
  for (let i = 0; i < count; i++) {
    const coin = new Coin();
    vec3.set(coin.pos, x, y1, z);
    entities.push(coin);
    x += dx;
    z += dz;
  }
};

/**
 * Creates a stairway.
 * @param {number} x
 * @param {number} y
 * @param {number} z
 * @param {number} dx
 * @param {number} dz
 * @param {number} count
 */
const createStairs = (x, y, z, dx, dz, count) => {
  for (let i = 0; i < count; i++) {
    createPlatform(x, y, z, x + 4, y + 1, z + 4, COLOR_SILVER);
    x += dx;
    y++;
    z += dz;
  }
};

/**
 * Initialize the game.
 */
function initGame() {
  // Clear any existing static geometry
  buffers.forEach((b) => b.usage === STATIC_DRAW && b.resetBuffers());

  // Clear any existing entities
  entities.length = 0;

  // Reset the player
  vec3.set(player.pos, 16, 4, 16);
  vec3.set(player.velocity, 0, 0, 0);
  player.rendered = true;
  player.jetpack = false;
  player.health = 1;
  player.fuel = 0;
  player.yaw = 3.0;
  player.groundedTime = 0;
  player.shootTime = 0;
  coins = 0;
  lastCoinTime = 0;
  coinSequence = 0;
  entities.push(player);
  stopJetpackSound();

  // Sky box
  {
    const m = buffers[STATIC_CUBES].addInstance(COLOR_STARS);
    mat4.scale(m, m, vec3.fromValues(500, 500, 500));
  }

  // Level definition
  const levelDef = levelDefinitions[level % levelDefinitions.length];
  levelDef();

  // entities.forEach(e => i)
  availableCoins = entities.filter((e) => e instanceof Coin).length;
  buffers.forEach((b) => b.usage === STATIC_DRAW && b.updateBuffers());
}

}

/**

 */
const GameState = {
  WAITING_FOR_FIRST_CLICK: 0,
  INTRO_STORY1: 1,
  INTRO_STORY2: 2,
  BEFORE_LEVEL: 3,
  PLAYING: 4,
  AFTER_LEVEL: 5,
  MAIN_MENU: 99,
  CREDITS: 100,
};

/**
 * Global game state.
 * @type {!GameState}
 */

initGame();
registerSong('Milky Way by Ben Prunty', milkyWaySong);

/**
 * Sets the current level.
 * @param {number} l
 */
function setLevel(l) {
  level = l;
}

/**
 * Camera flies over the city.
 */
const flyoverCamera = () => {
  const theta = 0.2 * time;
  const rho = 0.05 * time;
  const radius = 50 + 20 * Math.sin(0.2 * time);
  const x = radius * Math.sin(rho) * Math.sin(theta);
  const y = radius * Math.abs(Math.cos(rho));
  const z = radius * Math.sin(rho) * Math.cos(theta);
  vec3.set(camera.source, x, y, z);
};

/**
 * Updates game state.
 */
function update() {
  updateWorld();

  if (menu !== mainMenu && isKeyPressed(KEY_ESCAPE)) {
    resetKeys();
    setMenu(mainMenu);
    playMenuBeep();
  }

  if (menu) {
    drawMenu();
  } else {
    handleInput();
    drawHud();
  }

  if (DEBUG) {
    drawDebugOverlay();
  }

  if (gameState === GameState.CREDITS) {
    player.yaw = 0;
    player.jetpack = true;
    vec3.lerp(camera.source, camera.source, vec3.fromValues(0, 50, -15), 0.01);
    vec3.lerp(player.pos, player.pos, vec3.fromValues(0, 80, 0), 0.01);
    vec3.set(player.velocity, 0, 0, 0);
    lookAt(camera, camera.source, vec3.fromValues(player.pos[0], player.pos[1] + 15, player.pos[2]), 0.4);
    createJetpackParticles();
  } else if (gameState === GameState.AFTER_LEVEL) {
    // After level success
    player.yaw += 5 * dt;
    player.jetpack = true;
    vec3.lerp(camera.source, camera.source, vec3.fromValues(0, 90, -25), 0.01);
    vec3.lerp(player.pos, player.pos, vec3.fromValues(0, 80, 0), 0.01);
    vec3.set(player.velocity, 0, 0, 0);
    cameraTarget[0] = player.pos[0];
    cameraTarget[1] = player.pos[1] + 2;
    cameraTarget[2] = player.pos[2];
    lookAt(camera, camera.source, cameraTarget, 0.4);
    createJetpackParticles();
  } else if (gameState === GameState.BEFORE_LEVEL || gameState === GameState.PLAYING) {
    // Normal gameplay mode
    lightSource[0] = player.pos[0] + 8;
    lightSource[1] = 80;
    lightSource[2] = player.pos[2] - 16;

    cameraTarget[0] = 0.5 * 16 + 0.5 * player.pos[0];
    // cameraTarget[0] = player.pos[0];
    cameraTarget[1] = 0.9 * cameraTarget[1] + 0.1 * player.pos[1];
    cameraTarget[2] = 0.25 * 16 + 0.75 * player.pos[2];

    vec3.set(
        preferredCameraPosition,
        0.2 * 16 + 0.8 * cameraTarget[0],
        cameraTarget[1] + cameraDistance,
        (0.25 * 8 + 0.75 * cameraTarget[2]) - cameraDistance);

    camera.source[0] = preferredCameraPosition[0]; // X-position is locked
    vec3.lerp(camera.source, camera.source, preferredCameraPosition, 0.02);
    lookAt(camera, camera.source, cameraTarget, 0.4);
  } else if (gameState <= GameState.INTRO_STORY2) {
    // Camera circles the game world
    // and looks at the center
    // vec3.set(camera.source, 0, 40, -40);
    flyoverCamera();
    vec3.set(cameraTarget, 0, 0, 0);
    lookAt(camera, camera.source, cameraTarget, 0.4);

    // Force player off screen
    player.pos[1] = 400;
    player.velocity[1] = 0;

    if (time - lastEngineBurst > 0.08) {
      lastEngineBurst = time;

      const leftBurst = new Particle();
      const rightBurst = new Particle();
      leftBurst.size = rightBurst.size = 0.25;
      leftBurst.color = rightBurst.color = 0xFFFF0030;
      vec3.set(leftBurst.pos, -6, 0.3, 0.7);
      vec3.set(leftBurst.velocity, -10, 0, 0);
      vec3.set(rightBurst.pos, -6, 0.3, -0.7);
      vec3.set(rightBurst.velocity, -10, 0, 0);
      entities.push(leftBurst, rightBurst);
    }
  }

  // lookAt(lightSource, lightPosition, cameraTarget, 0.1);
  lookAt(lightSource, lightPosition, vec3.fromValues(16, 0, 16), 0.1);
  renderEntities(entities);
}

/**
 * Returns true if the entity is within "range" of the player.
 * This is a fast check if the entity is within ~20 meters of the player.
 * Note that it uses manhattan distance rather than true distance for performance.
 * @param {!GameEntity} entity
 * @return {boolean}
 */
function inRangeOfPlayer(entity) {
  return entity.pos[0] > player.pos[0] - 20 &&
    entity.pos[0] < player.pos[0] + 20 &&
    entity.pos[2] > player.pos[2] - 15 &&
    entity.pos[2] < player.pos[2] + 40;
}

/**
 * Renders an array of game entities to the dynamic buffer.
 * @param {!Array.<!GameEntity>} entities
 */
function renderEntities(entities) {
  resetLights();
  for (let i = entities.length - 1; i >= 0; i--) {
    const entity = entities[i];
    if (entity !== player && entity.health <= 0) {
      entities.splice(i, 1);
      continue;
    }
    if (entity.rendered) {
      entity.setupTransformMatrix();
      entity.render();
    }
  }
}

/**
 * Player died.
 */
function playerDie() {
  playMusic(deathSongData);
  stopJetpackSound();
  setMenu(deathScreen);
}

/**
 * Handles player input.
 */
function handleInput() {
  player.accelerating = false;

  if (gameState !== GameState.AFTER_LEVEL && gameState !== GameState.CREDITS) {
    if (isKeyDown(KEY_UP) || isKeyDown(KEY_W)) {
      player.velocity[2] += dt * ACCELERATION;
      player.accelerating = true;
    }
    if (isKeyDown(KEY_DOWN) || isKeyDown(KEY_S)) {
      player.velocity[2] -= dt * ACCELERATION;
      player.accelerating = true;
    }
    if (isKeyDown(KEY_LEFT) || isKeyDown(KEY_A)) {
      player.velocity[0] -= dt * ACCELERATION;
      player.accelerating = true;
    }
    if (isKeyDown(KEY_RIGHT) || isKeyDown(KEY_D)) {
      player.velocity[0] += dt * ACCELERATION;
      player.accelerating = true;
    }
    if ((isKeyDown(KEY_X) || isKeyDown(KEY_SHIFT)) && player.fuel > 0) {
      // Jetpack
      player.velocity[1] += dt * 60;
      player.jetpack = true;
      player.fuel = Math.max(0, player.fuel - dt * 20);
      createJetpackParticles();
    } else {
      player.jetpack = false;
    }
    if (player.jetpack && !jetpackSound) {
      startJetpackSound();
    }
    if (!player.jetpack && jetpackSound) {
      stopJetpackSound();
    }
    if (player.isGrounded() && (keys[KEY_Z].downCount === 1 || keys[KEY_SPACE].downCount === 1)) {
      player.jump();
    }
    if (isKeyPressed(KEY_R)) {
      playerDie();
    }
    if (isKeyPressed(KEY_M)) {
      toggleBackgroundMusic();
    }
  }
}

/**
 * Creates jetpack particles.
 */
function createJetpackParticles() {
  if (Math.random() < 0.3) {
    const blast = new Particle();
    blast.size = 0.2;
    blast.velocity[1] = (gameState === GameState.AFTER_LEVEL || gameState === GameState.CREDITS) ? -10 : -0.3;
    vec3.copy(blast.pos, player.pos);
    blast.pos[0] -= 0.3 * Math.sin(player.yaw);
    blast.pos[1] += 0.8;
    blast.pos[2] -= 0.3 * Math.cos(player.yaw);
    entities.push(blast);
  }
}

/**
 * Updates everything.
 */
function updateWorld() {
  if (Math.random() < 0.02) {
    const floaty = new Particle();
    floaty.size = 0.08;
    floaty.velocity[1] = 1;
    vec3.copy(floaty.pos, player.pos);
    floaty.pos[0] += (Math.random() - 0.5) * 30.0;
    floaty.pos[2] += (Math.random() - 0.5) * 30.0;
    entities.push(floaty);
  }

  if (gameTime - lastCoinTime > 1.0) {
    coinSequence = 0;
  }

  for (let i = 0; i < entities.length; i++) {
    entities[i].update();
  }

  const playerWasAlive = player.health > 0;

  for (let i = 0; i < entities.length; i++) {
    for (let j = 0; j < entities.length; j++) {
      if ((entities[i] instanceof Platform) && !(entities[j] instanceof Platform)) {
        const platform = /** @type {!Platform} */ (entities[i]);
        const actor = entities[j];
        // Need actor size
        // Assume actor is a cylinder
        // Assume radius 1.0 and height 3.0
        // actor.pos represents center of feet
        const actorX = actor.pos[0];
        const actorY = actor.pos[1];
        const actorZ = actor.pos[2];
        const projectile = actor instanceof Particle && actor.projectile > 0;
        const actorRadius = projectile ? 0.1 : 0.7;
        const actorHeight = projectile ? 0.1 : 2.5;

        const platformMinX = platform.pos[0] - platform.scale[0] - actorRadius;
        const platformMinY = platform.pos[1] - platform.scale[1];
        const platformMinZ = platform.pos[2] - platform.scale[2] - actorRadius;

        const platformMaxX = platform.pos[0] + platform.scale[0] + actorRadius;
        const platformMaxY = platform.pos[1] + platform.scale[1];
        const platformMaxZ = platform.pos[2] + platform.scale[2] + actorRadius;

        const graceY = 1.0;

        if (actorX > platformMinX && actorX < platformMaxX && actorZ > platformMinZ && actorZ < platformMaxZ) {
          if (projectile && actorY < platformMaxY && actorY > platformMinY) {
            // Destroy the projectile
            actor.health = 0;
          } else if (actorY > platformMaxY - graceY && actorY < platformMaxY) {
            // Put the actor on top of the platform
            actor.pos[1] = platformMaxY;
            if (actor.velocity[1] < 0) {
              actor.velocity[1] = 0;
              actor.groundedTime = gameTime;
              actor.groundedPlatform = platform;
            }
          } else if (actorY < platformMaxY && actorY + actorHeight > platformMinY) {
            // Determine which edge to use
            // Push the actor away from the platform
            if (actorX < platform.pos[0] - platform.scale[0]) {
              actor.pos[0] = platformMinX;
            } else if (actorX > platform.pos[0] + platform.scale[0]) {
              actor.pos[0] = platformMaxX;
            } else if (actorZ < platform.pos[2] - platform.scale[2]) {
              actor.pos[2] = platformMinZ;
            } else {
              actor.pos[2] = platformMaxZ;
            }
          }
        }
      }

      vec3.copy(tempVec, player.pos);
      tempVec[1] += 1;
      if (entities[i] instanceof Hero &&
        entities[j] instanceof Particle &&
        (/** @type {!Particle} */ (entities[j])).projectile === ProjectileType.Enemy &&
        vec3.distance(tempVec, entities[j].pos) < 1.5 &&
        gameState === GameState.PLAYING) {
        player.health = 0;
        player.rendered = false;
        entities[j].health = 0;

        playExplosionSound();
        createExplosion(player.pos, COLOR_WHITE);
      }
    }
  }

  updateEntity(player);

  if (playerWasAlive && player.health <= 0) {
    playerDie();
  }
}

/**
 * Creates an explosion.
 * @param {!vec3} startPos
 * @param {number=} color
 * @param {number=} count
 */
function createExplosion(startPos, color = COLOR_WHITE, count = 40) {
  log('Create explosion');
  for (let k = 0; k < count; k++) {
    const explosion = new Particle();
    vec3.copy(explosion.pos, startPos);
    explosion.pos[1] += 1.0;
    explosion.color = color;
    explosion.size = 0.4;
    const speed = 0.2 + Math.random() * 5.0;
    const direction = Math.random() * 6.28;
    explosion.velocity[0] = Math.sin(direction) * speed;
    explosion.velocity[1] = 2;
    explosion.velocity[2] = Math.cos(direction) * speed;
    explosion.acceleration[1] = -0.5;
    entities.push(explosion);
  }
}

/**
 * Updates a game entity for the frame.
 * @param {!GameEntity} entity
 */
function updateEntity(entity) {
  if (entity.isGrounded() && entity.groundedPlatform) {
    // Move the player with the platform
    vec3.scaleAndAdd(entity.pos, entity.pos, entity.groundedPlatform.velocity, dt);
  }

  entity.velocity[0] *= (1.0 - dt * FRICTION);
  entity.velocity[2] *= (1.0 - dt * FRICTION);

  entity.pos[0] += dt * entity.velocity[0];
  entity.pos[2] += dt * entity.velocity[2];

  const speed = vec3.magnitude(entity.velocity);
  if (vec3.magnitude(entity.velocity) > 0.1) {
    entity.yaw = Math.atan2(entity.velocity[0], entity.velocity[2]);
  } else {
    vec3.set(entity.velocity, 0, 0, 0);
  }

  if (gameState === GameState.CREDITS) {
    player.yaw = 0;
    if (Math.random() < 0.5) {
      const box = new Mystery(
          (Math.random() < 0.5 ? -1 : 1) * (10 + 40 * Math.random()), 600, (Math.random() < 0.5 ? -1 : 1) * (10 + 40 * Math.random()),
          2 + 2 * Math.random(), 4 + 20 * Math.random(), 2 + 2 * Math.random());
      box.velocity[1] = -100 - 400 * Math.random();
      entities.push(box);
    }
  } else if (gameState !== GameState.AFTER_LEVEL) {
    const gravity = GRAVITY;
    entity.velocity[1] -= dt * gravity;
    entity.pos[1] += dt * entity.velocity[1];
  }

  if (entity.isGrounded() && speed > 5 && Math.random() < 0.2) {
    const dust = new Particle();
    dust.velocity[1] = 0.1;
    vec3.copy(dust.pos, entity.pos);
    entities.push(dust);
  }

  if (entity.pos[1] < -30) {
    entity.pos[1] = -30;
    entity.health = 0;
  }
}

const bestTimesStr = localStorage['callisto-times'];
const bestTimes = bestTimesStr ? JSON.parse(bestTimesStr) : [];


// ============================================================
// TOUCH CONTROLS
// ============================================================
(function() {
  // Detect if touch device
  const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

  const touchControls = document.getElementById('touch-controls');
  if (!isTouchDevice) {
    touchControls.style.display = 'none';
    return;
  }

  const dpadUp = document.getElementById('dpad-up');
  const dpadDown = document.getElementById('dpad-down');
  const dpadLeft = document.getElementById('dpad-left');
  const dpadRight = document.getElementById('dpad-right');
  const btnJump = document.getElementById('btn-jump');
  const btnJetpack = document.getElementById('btn-jetpack');
  const btnRestart = document.getElementById('btn-restart');
  const btnMute = document.getElementById('btn-mute');
  const btnMenu = document.getElementById('btn-menu');

  // Key code constants (matching keyboard.js)
  const K_UP = 38, K_DOWN = 40, K_LEFT = 37, K_RIGHT = 39;
  const K_W = 87, K_A = 65, K_S = 83, K_D = 68;
  const K_Z = 90, K_SPACE = 32;
  const K_X = 88, K_SHIFT = 16;
  const K_R = 82, K_M = 77;
  const K_ENTER = 13, K_ESCAPE = 27;

  function setKey(code, down) {
    if (keys && keys[code]) {
      keys[code].down = down;
    }
  }

  function clearDirectionKeys() {
    setKey(K_UP, false);
    setKey(K_DOWN, false);
    setKey(K_LEFT, false);
    setKey(K_RIGHT, false);
    setKey(K_W, false);
    setKey(K_A, false);
    setKey(K_S, false);
    setKey(K_D, false);
  }

  // D-pad setup
  function setupDpadBtn(btn, keyPrimary, keyAlt) {
    btn.addEventListener('touchstart', function(e) {
      e.preventDefault();
      e.stopPropagation();
      setKey(keyPrimary, true);
      setKey(keyAlt, true);
    }, {passive: false});
    btn.addEventListener('touchend', function(e) {
      e.preventDefault();
      e.stopPropagation();
      setKey(keyPrimary, false);
      setKey(keyAlt, false);
    }, {passive: false});
    btn.addEventListener('touchcancel', function(e) {
      setKey(keyPrimary, false);
      setKey(keyAlt, false);
    }, {passive: false});
  }

  setupDpadBtn(dpadUp, K_UP, K_W);
  setupDpadBtn(dpadDown, K_DOWN, K_S);
  setupDpadBtn(dpadLeft, K_LEFT, K_A);
  setupDpadBtn(dpadRight, K_RIGHT, K_D);

  // Action buttons
  function setupButton(btn, keyCodes, momentary) {
    btn.addEventListener('touchstart', function(e) {
      e.preventDefault();
      e.stopPropagation();
      keyCodes.forEach(function(code) { setKey(code, true); });
      // Also trigger anyKey for menu screens
      if (typeof anyKey !== 'undefined') {
        anyKey.down = true;
      }
    }, {passive: false});

    btn.addEventListener('touchend', function(e) {
      e.preventDefault();
      e.stopPropagation();
      keyCodes.forEach(function(code) { setKey(code, false); });
    }, {passive: false});

    btn.addEventListener('touchcancel', function(e) {
      keyCodes.forEach(function(code) { setKey(code, false); });
    }, {passive: false});
  }

  setupButton(btnJump, [K_Z, K_SPACE]);
  setupButton(btnJetpack, [K_X, K_SHIFT]);
  setupButton(btnRestart, [K_R]);
  setupButton(btnMute, [K_M]);
  setupButton(btnMenu, [K_ESCAPE]);

  // Tap on overlay canvas for "press any key" on menu screens
  const overlayEl = document.querySelectorAll('canvas')[1];
  if (overlayEl) {
    overlayEl.addEventListener('touchstart', function(e) {
      // Only trigger if there is a menu active and touch is not on a button
      if (typeof menu !== 'undefined' && menu) {
        if (typeof anyKey !== 'undefined') {
          anyKey.down = true;
          anyKey.upCount = 1;
        }
      }
      // Also resume audio context on first touch
      if (typeof zzfxX !== 'undefined' && zzfxX.state === 'suspended') {
        zzfxX.resume();
      }
    }, {passive: true});

    overlayEl.addEventListener('touchend', function(e) {
      if (typeof anyKey !== 'undefined') {
        anyKey.down = false;
      }
    }, {passive: true});
  }
})();
</script>
