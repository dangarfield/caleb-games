function drawLevelSelect(){
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  const gs=getGridSize();ctx.strokeStyle='rgba(0,0,0,0.06)';ctx.lineWidth=1;
  const startX=EB_X%gs,startY=EB_Y%gs;
  for(let x=startX;x<=W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=startY;y<=H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  const ts=Math.max(18,Math.min(30,Math.min(W,H)*0.045));
  ctx.fillStyle='#29b6f6';ctx.font=`bold ${ts}px Segoe UI,system-ui,sans-serif`;ctx.textAlign='center';ctx.textBaseline='top';
  ctx.shadowColor='rgba(0,0,0,0.08)';ctx.shadowBlur=3;ctx.shadowOffsetY=1;
  ctx.fillText('Happy Glass',W/2,10);
  ctx.shadowBlur=0;ctx.shadowOffsetY=0;
  buttons=[];
  const visibleLevels=50;
  const cols=10,rows=Math.ceil(visibleLevels/cols);
  const headerH=10+ts+10;
  const availW=W-20,availH=H-headerH-40;
  const cellW=availW/cols,cellH=availH/rows;
  const size=Math.floor(Math.min(cellW,cellH)*0.7);
  const gapX=(availW-size*cols)/(cols+1),gapY=(availH-size*rows)/(rows+1);
  const gridStartX=10+gapX,gridStartY=headerH;
  for(let i=0;i<visibleLevels;i++){
    const col=i%cols,row=Math.floor(i/cols);
    const bx=gridStartX+col*(size+gapX),by=gridStartY+gapY+row*(size+gapY);
    addButton('lvl_'+i,bx,by,size,size,''+(i+1),'#fff','#29b6f6');
    if(levelStars[i]>0){const starSize=Math.max(4,size*0.12);drawStars(bx+size/2,by+size+starSize+1,levelStars[i],starSize);}
  }
  // "More levels coming soon" message
  const msgY=gridStartY+gapY+rows*(size+gapY)+10;
  ctx.fillStyle='rgba(0,0,0,0.35)';ctx.font=`bold ${Math.max(12,size*0.3)}px Segoe UI,system-ui,sans-serif`;ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('More levels coming soon!',W/2,msgY);
  addButton('editor',W-44,8,34,34,'','rgba(0,0,0,0.0)','rgba(0,0,0,0.0)');
  const fontSize=Math.max(10,size*0.35);
  const r=Math.max(4,size*0.18);
  for(const b of buttons){
    if(!b.text)continue; // skip invisible editor button
    const i=parseInt(b.text)-1;
    const hasStars=levelStars[i]>0;
    // Button gradient
    const grad=ctx.createLinearGradient(b.x,b.y,b.x,b.y+b.h);
    grad.addColorStop(0,hasStars?'#66bb6a':'#4fc3f7');grad.addColorStop(1,hasStars?'#43a047':'#29b6f6');
    ctx.fillStyle=grad;ctx.shadowColor='rgba(0,0,0,0.15)';ctx.shadowBlur=5;ctx.shadowOffsetY=2;
    ctx.beginPath();ctx.roundRect(b.x,b.y,b.w,b.h,r);ctx.fill();
    ctx.shadowBlur=0;ctx.shadowOffsetY=0;
    // Shine highlight
    ctx.fillStyle='rgba(255,255,255,0.2)';
    ctx.beginPath();ctx.roundRect(b.x+2,b.y+1,b.w-4,b.h*0.4,r);ctx.fill();
    // Text
    ctx.fillStyle='#fff';ctx.font=`bold ${fontSize}px Segoe UI,system-ui,sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(b.text,b.x+b.w/2,b.y+b.h/2);
  }
  // Draw subtle cog icon for editor button
  const cogX=W-27,cogY=25,cogR=10,teeth=6;
  ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=2;ctx.beginPath();
  for(let i=0;i<teeth*2;i++){const a=i*Math.PI/teeth-Math.PI/2;const r=i%2===0?cogR:cogR*0.65;ctx.lineTo(cogX+Math.cos(a)*r,cogY+Math.sin(a)*r);}
  ctx.closePath();ctx.stroke();
  ctx.beginPath();ctx.arc(cogX,cogY,cogR*0.3,0,Math.PI*2);ctx.stroke();
}

function drawEditorGlassShape(gx,gy,gw,gh,rotation){
  ctx.save();ctx.translate(gx,gy);ctx.rotate(rotation||0);
  const topW=gw,botW=gw*TAPER;
  const topY=-gh/2,botY=gh/2;
  const topL=-topW/2,topR=topW/2;
  const botL=-botW/2,botR=botW/2;
  ctx.strokeStyle='rgba(33,150,243,0.8)';ctx.lineWidth=4;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(topL-6,topY);ctx.lineTo(topL,topY);ctx.lineTo(botL,botY);ctx.lineTo(botR,botY);ctx.lineTo(topR,topY);ctx.lineTo(topR+6,topY);ctx.stroke();
  ctx.fillStyle='rgba(33,150,243,0.08)';
  ctx.beginPath();ctx.moveTo(topL+3,topY+3);ctx.lineTo(topR-3,topY+3);ctx.lineTo(botR-3,botY-3);ctx.lineTo(botL+3,botY-3);ctx.closePath();ctx.fill();
  ctx.restore();
}

function drawEditor(){
  ctx.fillStyle='#eceff1';ctx.fillRect(0,0,W,H);

  // Reference image background
  loadRefImage(editorLevelIdx);
  if(editorRefMode!=='off'){
    const refs=editorRefImages[editorLevelIdx];
    const img=refs&&refs[editorRefMode];
    if(img){
      // Fit to editor boundary width, aligned to bottom
      const imgAspect=img.naturalWidth/img.naturalHeight;
      let dw,dh,dx,dy;
      dw=EB_W;dh=dw/imgAspect;
      dx=EB_X;dy=EB_Y+EB_H-dh; // align bottom
      ctx.globalAlpha=0.4;
      ctx.drawImage(img,dx,dy,dw,dh);
      ctx.globalAlpha=1.0;
    }
  }

  // Mini reference thumbnail (full image) in top-right corner
  if(editorRefMode!=='off'){
    const refs=editorRefImages[editorLevelIdx];
    const img=refs&&refs[editorRefMode];
    if(img){
      const sw=img.naturalWidth, sh=img.naturalHeight;
      const thumbH=560, thumbW=thumbH*(sw/sh);
      const tx=W-thumbW-10, ty=6;
      ctx.drawImage(img, tx,ty,thumbW,thumbH);
      ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1;
      ctx.strokeRect(tx,ty,thumbW,thumbH);
    }
  }

  // Grid (aligned to editor boundary)
  const gs=getGridSize();
  ctx.strokeStyle='rgba(0,0,0,0.06)';ctx.lineWidth=1;
  for(let i=0;i<=EB_COLS;i++){const x=EB_X+i*gs;ctx.beginPath();ctx.moveTo(x,EB_Y);ctx.lineTo(x,EB_Y+EB_H);ctx.stroke();}
  for(let i=0;i<=EB_ROWS;i++){const y=EB_Y+i*gs;ctx.beginPath();ctx.moveTo(EB_X,y);ctx.lineTo(EB_X+EB_W,y);ctx.stroke();}

  // Editor boundary (31:43 area)
  ctx.strokeStyle='rgba(30,136,229,0.5)';ctx.lineWidth=2;ctx.setLineDash([8,6]);
  ctx.strokeRect(EB_X,EB_Y,EB_W,EB_H);
  ctx.setLineDash([]);

  const l=levels[editorLevelIdx];const scale=getScale();

  // Blocks (no-draw zones) - rendered at back
  if(l.blocks){
    for(let bi=0;bi<l.blocks.length;bi++){
      const b=l.blocks[bi];
      const isSelected=editorSelected&&editorSelected.type==='block'&&editorSelected.idx===bi;
      ctx.fillStyle='rgba(255,138,128,0.3)';
      ctx.strokeStyle=isSelected?'#1e88e5':'rgba(255,82,82,0.5)';
      ctx.lineWidth=isSelected?3:2;ctx.setLineDash([6,4]);
      ctx.beginPath();
      if(b.vertices){
        ctx.moveTo(nx(b.vertices[0].x),ny(b.vertices[0].y));
        for(let vi=1;vi<b.vertices.length;vi++)ctx.lineTo(nx(b.vertices[vi].x),ny(b.vertices[vi].y));
        ctx.closePath();
      } else {
        ctx.roundRect(nx(b.x),ny(b.y),b.w*EB_W,b.h*EB_H,6);
      }
      ctx.fill();ctx.stroke();ctx.setLineDash([]);
      // Label at centroid
      let cx,cy;
      if(b.vertices){cx=b.vertices.reduce((s,v)=>s+nx(v.x),0)/b.vertices.length;cy=b.vertices.reduce((s,v)=>s+ny(v.y),0)/b.vertices.length;}
      else{cx=nx(b.x)+b.w*EB_W/2;cy=ny(b.y)+b.h*EB_H/2;}
      ctx.fillStyle='rgba(211,47,47,0.6)';ctx.font='bold 10px Segoe UI,system-ui,sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('NO DRAW',cx,cy);
    }
  }

  // Hint lines (shown in editor only)
  if(l.hints&&l.hints.length>0){
    ctx.strokeStyle='rgba(255,193,7,0.5)';ctx.lineWidth=4;ctx.lineCap='round';ctx.lineJoin='round';ctx.setLineDash([6,14]);
    for(const h of l.hints){
      if(h.points.length<2)continue;
      ctx.beginPath();ctx.moveTo(nx(h.points[0].x),ny(h.points[0].y));
      for(let i=1;i<h.points.length;i++)ctx.lineTo(nx(h.points[i].x),ny(h.points[i].y));
      ctx.stroke();
    }
    ctx.setLineDash([]);
  }
  // In-progress hint line
  if(editorHintLine&&editorHintLine.points.length>=2){
    ctx.strokeStyle='rgba(255,193,7,0.7)';ctx.lineWidth=6;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(nx(editorHintLine.points[0].x),ny(editorHintLine.points[0].y));
    for(let i=1;i<editorHintLine.points.length;i++)ctx.lineTo(nx(editorHintLine.points[i].x),ny(editorHintLine.points[i].y));
    ctx.stroke();
  }

  // Obstacles - coloured by physType
  for(let oi=0;oi<l.obstacles.length;oi++){
    const o=l.obstacles[oi];
    const pt=o.physType||'fixed';
    const col=OBS_COLORS[pt]||OBS_COLORS.fixed;
    const isSelected=editorSelected&&editorSelected.type==='obstacle'&&editorSelected.idx===oi;
    ctx.fillStyle=col;ctx.strokeStyle=isSelected?'#fff':col;ctx.lineWidth=isSelected?4:2;
    if(o.type==='circle'){
      const r=nsize(o.r);
      ctx.beginPath();ctx.arc(nx(o.x),ny(o.y),r,0,Math.PI*2);ctx.fill();ctx.stroke();
      if(isSelected){ctx.strokeStyle='#1e88e5';ctx.lineWidth=2;ctx.setLineDash([5,4]);ctx.beginPath();ctx.arc(nx(o.x),ny(o.y),r+6,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);}
    } else if(o.type==='line'){
      ctx.strokeStyle=col;ctx.lineWidth=isSelected?getLineWidth()+2:getLineWidth();ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(nx(o.x1),ny(o.y1));ctx.lineTo(nx(o.x2),ny(o.y2));ctx.stroke();
      if(isSelected){ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.setLineDash([4,4]);
        ctx.beginPath();ctx.moveTo(nx(o.x1),ny(o.y1));ctx.lineTo(nx(o.x2),ny(o.y2));ctx.stroke();ctx.setLineDash([]);}
    } else if(o.type==='point'){
      ctx.beginPath();ctx.arc(nx(o.x),ny(o.y),7,0,Math.PI*2);ctx.fill();ctx.stroke();
      if(isSelected){ctx.strokeStyle='#1e88e5';ctx.lineWidth=2;ctx.setLineDash([4,3]);ctx.beginPath();ctx.arc(nx(o.x),ny(o.y),14,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);}
    } else if(o.type==='cross'){
      const arm=nsize(o.armLength||0.08);const cx=nx(o.x),cy=ny(o.y);
      ctx.save();ctx.translate(cx,cy);ctx.rotate(Math.PI/4);
      ctx.strokeStyle=col;ctx.lineWidth=isSelected?getLineWidth()+2:getLineWidth();ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(-arm,0);ctx.lineTo(arm,0);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,-arm);ctx.lineTo(0,arm);ctx.stroke();
      ctx.restore();
      // Fixed center pin
      ctx.fillStyle='#37474f';ctx.beginPath();ctx.arc(cx,cy,8,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#78909c';ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#b0bec5';ctx.beginPath();ctx.arc(cx-1.5,cy-1.5,2,0,Math.PI*2);ctx.fill();
      if(isSelected){ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.setLineDash([3,3]);ctx.beginPath();ctx.arc(cx,cy,arm+4,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);}
    } else if(o.vertices){
      ctx.lineWidth=isSelected?8:6;ctx.lineCap='round';ctx.lineJoin='round';
      ctx.beginPath();ctx.moveTo(nx(o.vertices[0].x),ny(o.vertices[0].y));
      for(let i=1;i<o.vertices.length;i++)ctx.lineTo(nx(o.vertices[i].x),ny(o.vertices[i].y));
      ctx.closePath();ctx.fill();ctx.stroke();
      if(isSelected){ctx.strokeStyle='#1e88e5';ctx.lineWidth=2;ctx.setLineDash([5,4]);ctx.stroke();ctx.setLineDash([]);}
    } else {
      ctx.beginPath();ctx.roundRect(nx(o.x),ny(o.y),o.w*EB_W,o.h*EB_H,3);ctx.fill();ctx.stroke();
      if(isSelected){ctx.strokeStyle='#1e88e5';ctx.lineWidth=2;ctx.setLineDash([5,4]);ctx.stroke();ctx.setLineDash([]);}
    }
  }

  // Drawing preview (polygon/line points in progress)
  if(editorPolyPoints.length>0){
    const polyCol=editorTool==='block'?'#e53935':'#1e88e5';
    ctx.strokeStyle=polyCol;ctx.lineWidth=2;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(editorPolyPoints[0].x,editorPolyPoints[0].y);
    for(let i=1;i<editorPolyPoints.length;i++)ctx.lineTo(editorPolyPoints[i].x,editorPolyPoints[i].y);
    ctx.stroke();ctx.setLineDash([]);
    for(const p of editorPolyPoints){
      ctx.fillStyle=polyCol;ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);ctx.fill();
    }
    if(editorPolyPoints.length>=3&&(editorTool==='polygon'||editorTool==='block')){
      ctx.strokeStyle='rgba(76,175,80,0.6)';ctx.lineWidth=2;ctx.setLineDash([3,3]);
      ctx.beginPath();ctx.arc(editorPolyPoints[0].x,editorPolyPoints[0].y,getGridSize()*1.5,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
    }
  }

  // Glasses
  for(let i=0;i<l.glasses.length;i++){
    const g=l.glasses[i];
    const gx=nx(g.x),gy=ny(g.y);
    const gw=Math.max(60,Math.min(GLASS_W*scale,200)),gh=Math.max(80,Math.min(GLASS_H*scale,225));
    const glassSel=editorSelected&&editorSelected.type==='glass'&&editorSelected.idx===i;
    if(glassSel){ctx.strokeStyle='#1e88e5';ctx.lineWidth=3;ctx.setLineDash([6,4]);ctx.beginPath();ctx.roundRect(gx-gw/2-6,gy-gh/2-6,gw+12,gh+12,8);ctx.stroke();ctx.setLineDash([]);}
    drawEditorGlassShape(gx,gy,gw,gh,g.rotation||0);
    ctx.fillStyle='#555';ctx.font='bold 10px Segoe UI,system-ui,sans-serif';ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillText(`GLASS ${i+1}`,gx,gy-gh/2-4);
  }

  // Taps
  for(let i=0;i<l.taps.length;i++){
    const t=l.taps[i];
    const fx=nx(t.x),fy=ny(t.y);
    const tapSel=editorSelected&&editorSelected.type==='tap'&&editorSelected.idx===i;
    if(tapSel){ctx.strokeStyle='#1e88e5';ctx.lineWidth=3;ctx.setLineDash([6,4]);ctx.beginPath();ctx.roundRect(fx-28,fy-28,56,56,6);ctx.stroke();ctx.setLineDash([]);}
    drawTapIcon(ctx,fx,fy,t.dir,20);
    ctx.fillStyle='#555';ctx.font='bold 10px Segoe UI,system-ui,sans-serif';ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillText(`TAP ${i+1}`,fx,fy-22);
  }

  // Editor UI is HTML-based
  updateEditorPanel();
}

// Main loop
let lastTime=0;
let editorTestWon=false;
let edTestSpeed=1;

function gameLoop(time){
  const rawDt=Math.min((time-lastTime)/1000,0.1);lastTime=time;
  bgTween+=((state==='simulating'||state==='editorTest'?1:0)-bgTween)*Math.min(1,rawDt*4);

  if(state==='levelSelect'){clearAllCanvases();document.getElementById('hud').classList.add('hidden');document.getElementById('hintBtn').classList.add('hidden');document.getElementById('gameButtons').classList.add('hidden');document.getElementById('winBanner').classList.add('hidden');document.getElementById('loseBanner').classList.add('hidden');document.getElementById('editorPanel').classList.add('hidden');document.getElementById('editorActions').classList.add('hidden');document.getElementById('propsPanel').classList.add('hidden');applyViewport(ctx);drawLevelSelect();restoreViewport(ctx);requestAnimationFrame(gameLoop);return;}
  if(state==='editor'){clearAllCanvases();document.getElementById('hud').classList.add('hidden');document.getElementById('hintBtn').classList.add('hidden');document.getElementById('gameButtons').classList.add('hidden');document.getElementById('winBanner').classList.add('hidden');document.getElementById('loseBanner').classList.add('hidden');applyViewport(ctx);drawEditor();restoreViewport(ctx);requestAnimationFrame(gameLoop);return;}

  // Physics
  const isSimming=(state==='simulating'||state==='editorTest'||state==='won')&&simTime>0;
  if(isSimming){
    const speedMul=(state==='editorTest')?edTestSpeed:1;
    for(let sm=0;sm<speedMul;sm++){
    // Planck.js step: fixed timestep with velocity/position iterations
    const substeps=3;const subDt=rawDt/substeps;
    for(let ss=0;ss<substeps;ss++)pWorld.step(subDt,8,3);
    simTime+=rawDt;
    const geom=getLevelGeom(currentLevel);
    glassSettled=checkGlassSettled();
    if(glassSettled){spawnTimer+=rawDt;const iv=1/PARTICLE_RATE;while(spawnTimer>=iv&&waterBodies.length<getMaxParticles()){spawnTimer-=iv;spawnWaterDrop();}}
    if(Math.floor(simTime*2)!==Math.floor((simTime-rawDt)*2))console.log('[spawn] bodies:',waterBodies.length,'settled:',glassSettled,'spawnTimer:',spawnTimer.toFixed(3));
    for(let i=waterBodies.length-1;i>=0;i--){
      const pos=waterBodies[i].getPosition();
      if(m2px(pos.y)>H+100){waterBodySet.delete(waterBodies[i]);pWorld.destroyBody(waterBodies[i]);waterBodies.splice(i,1);continue;}
      // Fire contact: destroy water marked by contact listener
      if(waterToDestroy.has(waterBodies[i])){
        const wb=waterBodies[i];waterToDestroy.delete(wb);waterBodySet.delete(wb);
        const wpos=wb.getPosition();
        steamParticles.push({x:m2px(wpos.x),y:m2px(wpos.y),life:1,vx:(Math.random()-0.5)*60,vy:-80-Math.random()*40});
        playHiss();
        pWorld.destroyBody(wb);waterBodies.splice(i,1);continue;
      }
    }
    // Debug: log glass fill status every 100ms
    if(Math.floor(simTime*10)!==Math.floor((simTime-rawDt)*10)){
      const counts=countWaterPerGlass();
      const rects=getGlassRects();
      const status=rects.map((g,i)=>{
        const target=glassTargetCount(g);
        return `#${i+1}: ${counts[i]}/${target} (${(counts[i]/target*100).toFixed(0)}%)`;
      });
      console.log(`[${simTime.toFixed(1)}s] total:${waterBodies.length}/${getMaxParticles()} | ${status.join(', ')} | won:${allGlassesFilled()}`);
    }
    if(state!=='won'&&allGlassesFilled()){
      if(state==='editorTest'){editorTestWon=true;}
      else{state='won';fadeAlpha=0;const stars=calcStars();if(stars>(levelStars[currentLevel]||0)){levelStars[currentLevel]=stars;saveProgress();}playSuccess();}
      break;
    } else if(simTime>=SIM_DURATION&&state!=='editorTest'&&state!=='won'){state='lost';fadeAlpha=0;levelFailCount++;playFail();break;}
    } // end speed loop
  }

  if((state==='simulating'||state==='editorTest')&&simTime===0&&pWorld){simTime=0.001;}

  if(state==='won'||state==='lost')fadeAlpha=Math.min(1,fadeAlpha+rawDt*3);

  // Render
  clearAllCanvases();
  applyViewport(ctx);applyViewport(gCtx);applyViewport(wCtx);
  drawBg();
  const geom=getLevelGeom(currentLevel);
  if(geom){
    drawBlocks(geom);
    drawHintOverlay();
    drawObstaclesVisual(geom);
    const waterCounts=isSimming?countWaterPerGlass():geom.glasses.map(()=>0);
    const rects=getGlassRects();
    for(let i=0;i<rects.length;i++)drawGlassShape(rects[i],waterCounts[i]);
    for(const tap of geom.taps)drawTap(tap);
    drawUserLines();
    if(isSimming){drawWaterBodies();if(state==='editorTest')debugDrawPhysics();}
    if(steamParticles.length>0)updateAndDrawSteam(rawDt);
    updateHUD(geom);
  } else {
    document.getElementById('hud').classList.add('hidden');
  }
  if(state==='editorTest'&&editorTestWon)drawEditorTestWin();
  restoreViewport(wCtx);restoreViewport(gCtx);restoreViewport(ctx);
  document.getElementById('editorPanel').classList.add('hidden');
  document.getElementById('editorActions').classList.add('hidden');
  document.getElementById('propsPanel').classList.add('hidden');
  updateBanners();
  updateButtons();

  requestAnimationFrame(gameLoop);
}

// Hint button
document.getElementById('hintBtn').addEventListener('click',function(){
  showingHint=!showingHint;
  this.textContent=showingHint?'💡 Hide Hint':'💡 Hint';
});

function drawHintOverlay(){
  const l=levels[currentLevel];
  if(!showingHint||!l||!l.hints||!l.hints.length)return;
  ctx.strokeStyle='rgba(255,193,7,0.5)';ctx.lineWidth=4;ctx.lineCap='round';ctx.lineJoin='round';ctx.setLineDash([6,14]);
  for(const h of l.hints){
    if(h.points.length<2)continue;
    ctx.beginPath();ctx.moveTo(nx(h.points[0].x),ny(h.points[0].y));
    for(let i=1;i<h.points.length;i++)ctx.lineTo(nx(h.points[i].x),ny(h.points[i].y));
    ctx.stroke();
  }
  ctx.setLineDash([]);
}

// Start
function startAsPlayer(player){
  currentPlayer=player;
  document.getElementById('overlay').classList.add('hidden');
  ensureAudio();loadProgress();state='levelSelect';lastTime=performance.now();requestAnimationFrame(gameLoop);
}
document.getElementById('startCaleb').addEventListener('click',function(){startAsPlayer('caleb');});
document.getElementById('startEzra').addEventListener('click',function(){startAsPlayer('ezra');});

})();
</script>
